<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos Premium</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --accent: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* HEADER STYLE */
        .header-main { text-align: center; margin-bottom: 30px; }
        .header-main h1 { font-size: 28px; font-weight: 800; color: #1e293b; margin: 0; }
        .header-main p { color: #64748b; font-size: 14px; }

        /* GRID RIFAS - CARDS */
        .grid-rifas { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .card-rifa { position: relative; border-radius: 20px; overflow: hidden; background: white; border: 1px solid #e2e8f0; transition: transform 0.2s; }
        .card-rifa:active { transform: scale(0.98); }
        .card-rifa-img { width: 100%; height: 200px; object-fit: cover; }
        .card-tag { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); color: white; padding: 5px 12px; border-radius: 10px; font-size: 12px; backdrop-filter: blur(5px); }
        .card-info { padding: 15px; }
        .card-title { font-size: 18px; font-weight: 700; color: #1e293b; margin: 0; }

        /* TABLERO DE NÚMEROS */
        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 10px; margin: 20px 0; max-height: 400px; overflow-y: auto; padding: 10px; border-radius: 15px; background: #f1f5f9; }
        .numero { height: 55px; display: flex; align-items: center; justify-content: center; background: white; border-radius: 12px; font-weight: 800; color: #1e293b; cursor: pointer; border: 1px solid #e2e8f0; transition: 0.2s; }
        .numero.seleccionado { background: var(--primary) !important; color: white; transform: scale(1.1); box-shadow: 0 5px 15px rgba(37,99,235,0.4); }
        .numero.ocupado { background: #cbd5e1 !important; color: #94a3b8 !important; text-decoration: line-through; cursor: not-allowed; }

        /* BOTONES */
        button { border: none; padding: 16px; border-radius: 15px; font-weight: 700; font-size: 16px; transition: 0.3s; cursor: pointer; width: 100%; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(37,99,235,0.3); }
        .btn-success { background: var(--secondary); color: white; margin-top: 10px; }
        .btn-history { background: #f1f5f9; color: #475569; margin-top: 15px; }

        /* FORM */
        input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #e2e8f0; margin-bottom: 12px; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }

        /* FLOATING WHATSAPP */
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 100; text-decoration: none; font-size: 30px; }

        #rifaContenedor, #historialSeccion, #adminPanel { display: none; }
        .admin-box { background: #fffbeb; border: 1px solid #fde68a; padding: 15px; border-radius: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="pantallaInicio" class="animate__animated animate__fadeIn">
    <div class="header-main">
        <h1>Sorteos Impacto</h1>
        <p>¡Tu oportunidad de ganar está aquí!</p>
    </div>
    <div id="gridRifasActivas" class="grid-rifas">Cargando sorteos...</div>
    <button onclick="toggleHistorial()" class="btn-history">📜 Ver Ganadores Anteriores</button>
</div>

<div id="rifaContenedor" class="animate__animated animate__fadeIn">
    <button onclick="volverInicio()" style="width: auto; background: none; color: var(--primary); padding: 5px;">← Volver</button>
    <img id="premioImgVer" src="" class="card-rifa-img" style="border-radius: 20px; margin-top: 10px;">
    <h2 id="tituloRifa" style="margin: 15px 0 5px 0;"></h2>
    <p id="precioInfo" style="font-size: 20px; color: var(--secondary); font-weight: 800; margin: 0;"></p>
    
    <div id="userForm" style="margin-top: 20px;">
        <input type="text" id="nombre" placeholder="Tu Nombre">
        <input type="tel" id="telefono" placeholder="WhatsApp">
        <div id="tablero" class="grid-numeros"></div>
        <button onclick="registrar()" class="btn-primary">APARTAR MI NÚMERO</button>
    </div>
</div>

<div id="historialSeccion" class="animate__animated animate__fadeIn">
    <button onclick="volverInicio()" style="width: auto; background: none; color: var(--primary);">← Volver</button>
    <h2 style="text-align: center;">🏆 Historial de Éxito</h2>
    <div id="listaHistorial"></div>
</div>

<a href="https://wa.me/523310711283" class="wa-float" target="_blank">🟢</a>

<button onclick="accesoAdmin()" style="opacity: 0.05; margin-top: 100px;">Admin</button>
<div id="adminPanel" class="container">
    <h3 style="color: red;">🛠️ Control Master</h3>
    <div class="admin-box">
        <input type="text" id="confTitulo" placeholder="Título Premio">
        <input type="text" id="confFoto" placeholder="Link Foto (Postimages)">
        <input type="number" id="confTotal" placeholder="Total Números">
        <input type="number" id="confPrecio" placeholder="Precio $">
        <button onclick="guardarConfig()" class="btn-primary">PUBLICAR</button>
    </div>
    <div class="admin-box" style="background:#fef2f2;">
        <p>Rifa actual: <b id="adminRifaNombre">-</b></p>
        <input type="text" id="histGanador" placeholder="Ganador">
        <input type="text" id="histFoto" placeholder="Foto Ganador">
        <button onclick="finalizarRifa()" style="background: orange; color: white;">FINALIZAR</button>
        <button onclick="borrarSinHistorial()" style="background: black; color: white; margin-top:10px;">BORRAR ERROR</button>
    </div>
    <div id="listaAdmin" style="margin-top: 15px; font-size: 12px;"></div>
</div>

<script>
    // USAR TU MISMA CONFIGURACIÓN DE FIREBASE DE ANTES
    const firebaseConfig = {
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M",
        authDomain: "rifa01-6ff39.firebaseapp.com",
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com",
        projectId: "rifa01-6ff39",
        storageBucket: "rifa01-6ff39.firebasestorage.app",
        messagingSenderId: "644348151229",
        appId: "1:644348151229:web:c71ed82967edecb6a7bed4",
        measurementId: "G-X287LPW130"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let rifaActualID = "", numeroSeleccionado = null, compradores = [], configRifa = {};

    db.ref('rifas_activas').on('value', snap => {
        const grid = document.getElementById('gridRifasActivas');
        grid.innerHTML = '';
        const data = snap.val();
        if(!data) { grid.innerHTML = "No hay sorteos activos."; return; }
        for(let id in data) {
            grid.innerHTML += `
                <div class="card-rifa animate__animated animate__zoomIn" onclick="abrirRifa('${id}')">
                    <div class="card-tag">🔥 Activo</div>
                    <img src="${data[id].config.foto}" class="card-rifa-img">
                    <div class="card-info">
                        <p class="card-title">${id}</p>
                        <p style="color:var(--secondary); font-weight:800; margin:5px 0;">$${data[id].config.precio} MXN</p>
                    </div>
                </div>`;
        }
    });

    db.ref('global_historial').on('value', snap => {
        const lista = document.getElementById('listaHistorial');
        lista.innerHTML = '';
        const data = snap.val();
        if(!data) { lista.innerHTML = "No hay registros."; return; }
        for(let k in data) {
            lista.innerHTML += `
                <div class="card-rifa" style="margin-bottom:15px;">
                    <img src="${data[k].foto}" class="card-rifa-img">
                    <div class="card-info">
                        <p class="card-title">🏆 ${data[k].premio}</p>
                        <p>Ganador: ${data[k].ganador}</p>
                    </div>
                </div>`;
        }
    });

    function abrirRifa(id) {
        rifaActualID = id;
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'block';
        document.getElementById('adminRifaNombre').innerText = id;
        db.ref('rifas_activas/'+id+'/config').on('value', snap => {
            configRifa = snap.val();
            document.getElementById('tituloRifa').innerText = id;
            document.getElementById('premioImgVer').src = configRifa.foto;
            document.getElementById('precioInfo').innerText = "$"+configRifa.precio + " por número";
            dibujarTablero();
        });
        db.ref('rifas_activas/'+id+'/participantes').on('value', snap => {
            compradores = [];
            const d = snap.val();
            for(let k in d) compradores.push({key:k, ...d[k]});
            dibujarTablero();
            actualizarAdmin();
        });
    }

    function dibujarTablero() {
        const tab = document.getElementById('tablero');
        tab.innerHTML = '';
        const ocupados = compradores.map(c => parseInt(c.numero));
        for(let i=1; i<=configRifa.total; i++) {
            const div = document.createElement('div');
            const isOcu = ocupados.includes(i);
            div.className = 'numero' + (isOcu ? ' ocupado':'');
            div.innerText = i;
            if(!isOcu) div.onclick = () => {
                document.querySelectorAll('.numero').forEach(n => n.classList.remove('seleccionado'));
                div.classList.add('seleccionado');
                numeroSeleccionado = i;
            };
            tab.appendChild(div);
        }
    }

    function registrar() {
        if(!numeroSeleccionado) return alert("Selecciona un número");
        const n = document.getElementById('nombre').value;
        const t = document.getElementById('telefono').value;
        if(!n || !t) return alert("Faltan datos");
        db.ref('rifas_activas/'+rifaActualID+'/participantes').push({nombre:n, tel:t, numero:numeroSeleccionado, pagado:false});
        alert("¡Número apartado! Te contactaremos.");
        numeroSeleccionado = null;
    }

    function volverInicio() { location.reload(); }
    function toggleHistorial() {
        document.getElementById('pantallaInicio').style.display='none';
        document.getElementById('historialSeccion').style.display='block';
    }
    function accesoAdmin() { if(prompt("Pass:")==="1234") document.getElementById('adminPanel').style.display='block'; }
    function guardarConfig() {
        const tit = document.getElementById('confTitulo').value;
        const fot = document.getElementById('confFoto').value;
        const tot = document.getElementById('confTotal').value;
        const pre = document.getElementById('confPrecio').value;
        db.ref('rifas_activas/'+tit+'/config').set({foto:fot, total:parseInt(tot), precio:parseInt(pre)});
        alert("Publicado.");
    }
    function finalizarRifa() {
        const g = document.getElementById('histGanador').value;
        const f = document.getElementById('histFoto').value;
        db.ref('global_historial').push({premio:rifaActualID, ganador:g, foto:f});
        db.ref('rifas_activas/'+rifaActualID).remove();
        location.reload();
    }
    function borrarSinHistorial() {
        if(confirm("¿Borrar?")) { db.ref('rifas_activas/'+rifaActualID).remove(); location.reload(); }
    }
    function actualizarAdmin() {
        const l = document.getElementById('listaAdmin');
        l.innerHTML = '<table>';
        compradores.sort((a,b)=>a.numero-b.numero).forEach(u => {
            l.innerHTML += `<tr><td>#${u.numero}</td><td>${u.nombre}</td><td><button onclick="db.ref('rifas_activas/${rifaActualID}/participantes/${u.key}').update({pagado:true})">${u.pagado?'✅':'$'}</button></td></tr>`;
        });
        l.innerHTML += '</table>';
    }
</script>
</body>
</html>

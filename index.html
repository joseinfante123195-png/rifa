<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos Pro - Individual</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 700px; margin: auto; padding: 10px; background: #f4f6f9; color: #333; }
        .container { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .grid-rifas { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .card-rifa { background: white; border-radius: 12px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .card-rifa-img { width: 100%; height: 120px; object-fit: cover; }
        .card-rifa-txt { padding: 10px; text-align: center; font-weight: bold; color: #007bff; font-size: 0.9em; margin: 0; }
        .premio-img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); gap: 6px; margin: 10px 0; max-height: 320px; overflow-y: auto; padding: 8px; border: 2px solid #f0f0f0; border-radius: 10px; background: #fafafa; }
        .numero { border: 1px solid #ddd; padding: 10px 3px; text-align: center; cursor: pointer; background: #fff; font-weight: bold; border-radius: 6px; font-size: 0.85em; }
        .numero.seleccionado { background: #007bff !important; color: white; }
        .numero.ocupado { background: #e9ecef !important; color: #adb5bd !important; cursor: not-allowed; text-decoration: line-through; }
        input, button { padding: 10px; width: 100%; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 8px; box-sizing: border-box; }
        .btn-success { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-whatsapp { background: #25D366; color: white; border: none; font-weight: bold; text-decoration: none; display: block; text-align: center; padding: 12px; border-radius: 8px; margin-top: 10px; }
        #adminPanel, #historialSeccion, #rifaContenedor { display: none; }
        .historial-card { border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin-bottom: 12px; background: white; }
        .historial-img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin-top: 8px; }
        .btn-back { background: #6c757d; color: white; border: none; margin-bottom: 12px; cursor: pointer; padding: 8px; width: auto; display: inline-block; font-size: 0.8em; }
        .admin-box { background:#f8f9fa; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px; }
    </style>
</head>
<body>

<div id="pantallaInicio" class="container">
    <h2 style="text-align: center; margin-top: 0;">🔥 Rifas en Juego</h2>
    <div id="gridRifasActivas" class="grid-rifas">Cargando...</div>
    <a href="https://wa.me/523310711283?text=Hola,%20me%20interesa%20rifar%20un%20artículo." class="btn-whatsapp">🤝 ¿Quieres rifar algo? Contáctanos</a>
    <button onclick="toggleHistorial()" style="margin-top: 15px; background: #343a40; color: white; border: none;">📜 Ver Ganadores Anteriores</button>
</div>

<div id="rifaContenedor" class="container">
    <button class="btn-back" onclick="volverInicio()">⬅️ Volver</button>
    <img id="premioImgVer" src="" class="premio-img" onerror="this.src='https://via.placeholder.com/600x200?text=Foto+no+disponible'">
    <h2 id="tituloRifa" style="text-align: center; color: #007bff; margin: 0;"></h2>
    <p id="precioInfo" style="text-align: center; font-weight: bold; color: #28a745; margin: 5px 0;"></p>
    
    <div id="userForm">
        <input type="text" id="nombre" placeholder="Tu nombre">
        <input type="tel" id="telefono" placeholder="WhatsApp">
        <div id="tablero" class="grid-numeros"></div>
        <button onclick="registrar()" class="btn-success">RESERVAR NÚMERO</button>
    </div>
</div>

<div id="historialSeccion" class="container">
    <button class="btn-back" onclick="volverInicio()">⬅️ Volver</button>
    <h2 style="text-align: center; margin-top:0;">🏆 Rifas Finalizadas</h2>
    <div id="listaHistorial"></div>
</div>

<button onclick="accesoAdmin()" style="margin-top:50px; opacity: 0.05; border:none; background:none; width:100%;">⚙️ Admin</button>

<div id="adminPanel" class="container">
    <h2 style="color:red; text-align:center;">🛠️ PANEL DE CONTROL</h2>
    
    <div class="admin-box">
        <h4>1. Crear Nueva Rifa</h4>
        <input type="text" id="confTitulo" placeholder="Nombre (ej. iPhone 15)">
        <input type="text" id="confFoto" placeholder="Link de la Foto (Postimages)">
        <input type="number" id="confTotal" placeholder="Cantidad números">
        <input type="number" id="confPrecio" placeholder="Precio $">
        <button onclick="guardarConfig()" style="background:#007bff; color:white;">PUBLICAR NUEVA RIFA</button>
    </div>

    <div id="seccionGestionIndividual" class="admin-box" style="background:#fffcf0; border:1px solid #ffc107;">
        <h4>2. Gestionar Rifa Seleccionada</h4>
        <p>Rifa actual: <b id="adminRifaNombre">Ninguna seleccionada</b></p>
        <input type="text" id="histGanador" placeholder="Nombre del Ganador">
        <input type="text" id="histFoto" placeholder="Foto de Entrega">
        <button onclick="finalizarRifa()" style="background:orange; color:white;">CERRAR Y MANDAR A HISTORIAL</button>
        <hr>
        <button onclick="borrarSinHistorial()" style="background:black; color:white;">❌ ELIMINAR ESTA RIFA (BORRADO TOTAL)</button>
    </div>

    <h4>Participantes de la rifa seleccionada:</h4>
    <div id="listaAdmin" style="font-size: 0.85em;"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M",
        authDomain: "rifa01-6ff39.firebaseapp.com",
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com",
        projectId: "rifa01-6ff39",
        storageBucket: "rifa01-6ff39.firebasestorage.app",
        messagingSenderId: "644348151229",
        appId: "1:644348151229:web:c71ed82967edecb6a7bed4",
        measurementId: "G-X287LPW130"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let rifaActualID = "", numeroSeleccionado = null, compradores = [], configRifa = { total: 0, precio: 0 };

    // Cargar galería de rifas activas
    db.ref('rifas_activas').on('value', (snap) => {
        const grid = document.getElementById('gridRifasActivas');
        grid.innerHTML = '';
        const data = snap.val();
        if(!data) { grid.innerHTML = "<p>No hay rifas activas.</p>"; return; }
        for(let id in data) {
            grid.innerHTML += `
                <div class="card-rifa" onclick="abrirRifa('${id}')">
                    <img src="${data[id].config.foto}" class="card-rifa-img">
                    <p class="card-rifa-txt">${id}</p>
                </div>`;
        }
    });

    // Cargar Historial Global
    db.ref('global_historial').on('value', (snap) => {
        const lista = document.getElementById('listaHistorial');
        lista.innerHTML = '';
        const data = snap.val();
        if(!data) { lista.innerHTML = "<p style='text-align:center;'>Aún no hay rifas finalizadas.</p>"; return; }
        for(let key in data) {
            lista.innerHTML += `
                <div class="historial-card">
                    <h3 style="margin:0;">🏆 ${data[key].premio}</h3>
                    <p>Ganador: <b>${data[key].ganador}</b></p>
                    <img src="${data[key].foto}" class="historial-img">
                </div>`;
        }
    });

    function abrirRifa(id) {
        rifaActualID = id;
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'block';
        document.getElementById('tituloRifa').innerText = id;
        document.getElementById('adminRifaNombre').innerText = id; // Actualiza el nombre en el panel admin

        db.ref('rifas_activas/'+id+'/config').on('value', snap => {
            configRifa = snap.val();
            if(configRifa) {
                document.getElementById('premioImgVer').src = configRifa.foto;
                document.getElementById('precioInfo').innerText = "Costo: $" + configRifa.precio;
                dibujarTablero();
            }
        });

        db.ref('rifas_activas/'+id+'/participantes').on('value', snap => {
            compradores = [];
            const data = snap.val();
            for(let k in data) compradores.push({key: k, ...data[k]});
            dibujarTablero();
            actualizarUIAdmin();
        });
    }

    function dibujarTablero() {
        const tablero = document.getElementById('tablero');
        tablero.innerHTML = '';
        const ocupados = compradores.map(c => parseInt(c.numero));
        for (let i = 1; i <= configRifa.total; i++) {
            const div = document.createElement('div');
            const esOcupado = ocupados.includes(i);
            div.className = 'numero' + (esOcupado ? ' ocupado' : '');
            div.innerText = i;
            if(!esOcupado) div.onclick = () => {
                document.querySelectorAll('.numero').forEach(n => n.classList.remove('seleccionado'));
                div.classList.add('seleccionado');
                numeroSeleccionado = i;
            };
            tablero.appendChild(div);
        }
    }

    function registrar() {
        if(!numeroSeleccionado) return alert("Elige un número");
        const nom = document.getElementById('nombre').value;
        const tel = document.getElementById('telefono').value;
        if(!nom || !tel) return alert("Faltan datos");
        db.ref('rifas_activas/'+rifaActualID+'/participantes').push({nombre: nom, tel: tel, numero: numeroSeleccionado, pagado: false});
        alert("¡Apartado!");
        document.getElementById('nombre').value=""; document.getElementById('telefono').value="";
        numeroSeleccionado = null;
    }

    function guardarConfig() {
        const tit = document.getElementById('confTitulo').value;
        const fot = document.getElementById('confFoto').value;
        const t = document.getElementById('confTotal').value;
        const p = document.getElementById('confPrecio').value;
        if(!tit || !fot || !t) return alert("Llena todos los campos");
        db.ref('rifas_activas/'+tit+'/config').set({total: parseInt(t), precio: parseInt(p), foto: fot});
        alert("Rifa publicada correctamente.");
    }

    function finalizarRifa() {
        if(!rifaActualID) return alert("Primero selecciona una rifa del inicio");
        const gan = document.getElementById('histGanador').value;
        const fot = document.getElementById('histFoto').value;
        if(!gan || !fot) return alert("Falta el nombre del ganador o la foto de evidencia");
        
        db.ref('global_historial').push({premio: rifaActualID, ganador: gan, foto: fot});
        db.ref('rifas_activas/'+rifaActualID).remove();
        alert("Rifa finalizada y movida al historial.");
        volverInicio();
    }

    function borrarSinHistorial() {
        if(!rifaActualID) return alert("Selecciona una rifa primero");
        if(confirm(`¿Estás SEGURO de eliminar "${rifaActualID}"? Esto NO se guardará en el historial.`)){
            db.ref('rifas_activas/'+rifaActualID).remove();
            alert("Rifa eliminada definitivamente.");
            volverInicio();
        }
    }

    function volverInicio() {
        document.getElementById('pantallaInicio').style.display='block';
        document.getElementById('rifaContenedor').style.display='none';
        document.getElementById('historialSeccion').style.display='none';
        document.getElementById('adminPanel').style.display='none';
        rifaActualID = "";
    }

    function toggleHistorial() {
        document.getElementById('pantallaInicio').style.display='none';
        document.getElementById('historialSeccion').style.display='block';
    }

    function accesoAdmin() { if(prompt("Clave:") === "1234") document.getElementById('adminPanel').style.display='block'; }

    function actualizarUIAdmin() {
        const list = document.getElementById('listaAdmin');
        list.innerHTML = '<table style="width:100%"><tr><th>#</th><th>Nombre</th><th>Acción</th></tr>';
        compradores.sort((a,b)=>a.numero-b.numero).forEach(u => {
            list.innerHTML += `<tr><td>${u.numero}</td><td>${u.nombre}</td><td>
                <button onclick="db.ref('rifas_activas/${rifaActualID}/participantes/${u.key}').update({pagado:true})" style="width:auto; padding:5px;">${u.pagado?'✅':'$'}</button>
                <button onclick="db.ref('rifas_activas/${rifaActualID}/participantes/${u.key}').remove()" style="background:red; color:white; width:auto; padding:5px;">X</button></td></tr>`;
        });
        list.innerHTML += '</table>';
    }
</script>
</body>
</html>

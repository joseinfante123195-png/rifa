<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifas El Tapatío 🍀</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
:root {
  --gold:#d4af37;
  --dark:#0f172a;
}

body{
  background:var(--dark);
  color:white;
  font-family:sans-serif;
}

.numero{
  padding:10px;
  margin:3px;
  background:#334155;
  display:inline-block;
  cursor:pointer;
}

.numero.seleccionado{
  background:gold;
  color:black;
}

.numero.ocupado{
  background:black;
  opacity:.3;
  pointer-events:none;
}

.container{
  max-width:600px;
  margin:auto;
}
</style>
</head>

<body>

<div class="container">
<h2 onclick="accesoAdmin()">🍀 Rifas El Tapatío</h2>

<div id="tablero"></div>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">

<button onclick="registrar()">Apartar</button>
</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M",
  databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔐 LOGIN
const _u = "am9zZS5pbmZhbnRlMTIzMTk1QGdtYWlsLmNvbQ==";
const _p = "cmlmYTIzNjk=";

// 📊 DATA
let seleccionados = [];
let ocupados = [];

// 🎯 GENERAR TABLERO
function dibujar(){

  const tab = document.getElementById("tablero");
  tab.innerHTML="";

  for(let i=0;i<100;i++){

    const d=document.createElement("div");
    d.className="numero";

    if(ocupados.includes(i)){
      d.classList.add("ocupado");
    }

    if(seleccionados.includes(i)){
      d.classList.add("seleccionado");
    }

    d.innerText = i.toString().padStart(2,"0");

    d.onclick=()=>{

      if(ocupados.includes(i)) return;

      if(seleccionados.includes(i)){
        seleccionados = seleccionados.filter(n=>n!==i);
      }else{
        seleccionados.push(i);
      }

      dibujar();
    }

    tab.appendChild(d);
  }
}

dibujar();

// 💾 REGISTRO
function registrar(){

  const nombre=document.getElementById("nombre").value;
  const tel=document.getElementById("telefono").value;

  if(!nombre || !tel || seleccionados.length===0){
    alert("Completa todo");
    return;
  }

  seleccionados.forEach(n=>{
    db.ref("rifa/participantes").push({
      nombre,
      tel,
      numero:n
    });
    ocupados.push(n);
  });

  seleccionados=[];
  dibujar();

  alert("Registrado");
}

// 🔐 ADMIN
function accesoAdmin(){

  const u=prompt("Correo");
  const p=prompt("Clave");

  if(btoa(u)===_u && btoa(p)===_p){
    alert("Acceso correcto");
  }else{
    alert("Error");
  }
}

</script>

</body>
</html>

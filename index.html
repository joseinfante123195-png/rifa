<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifas El Tapatío 🍀</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --gold-light: #f1d592; --dark-100: #0f172a; --dark-200: #1e293b; --success: #22c55e; --danger: #ff4d4d; --info: #3b82f6; }
        body { background-color: var(--dark-100) !important; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: var(--dark-200); border-radius: 20px; padding: 15px; border: 1px solid #334155; }
        
        #btnAdminOculto { position: fixed; top: 0; right: 0; width: 60px; height: 60px; background: none; border: none; z-index: 9999; opacity: 0; }
        
        @keyframes blinker { 50% { opacity: 0; } }
        .oferta-tag { background: var(--danger); color: white; font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 5px; margin-top: 5px; display: inline-block; animation: blinker 1s linear infinite; text-transform: uppercase; }

        .rifa-card { background: #1e293b; border-radius: 15px; padding: 12px; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; border: 1px solid #334155; position: relative; overflow: hidden; }
        .rifa-card img { width: 95px; height: 95px; border-radius: 10px; object-fit: cover; border: 1px solid var(--gold); }
        .rifa-info { margin-left: 15px; flex: 1; }
        .rifa-badge { position: absolute; top: 0; right: 0; background: var(--gold); color: black; font-size: 10px; padding: 5px 12px; font-weight: bold; border-bottom-left-radius: 12px; text-transform: uppercase; }
        
        .timer-text { font-size: 11px; color: var(--gold-light); font-weight: bold; margin-top: 4px; display: block; }
        .winner-tag { color: var(--success); font-weight: bold; font-size: 11px; margin-top: 5px; border: 1px solid var(--success); padding: 2px 6px; border-radius: 4px; display: inline-block; }
        
        .progress-container { background: #0f172a; border-radius: 10px; height: 8px; margin-top: 8px; border: 1px solid #334155; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, var(--gold), #fbbf24); height: 100%; width: 0%; transition: 0.8s; }
        .stats-text { font-size: 10px; color: #94a3b8; font-weight: bold; margin-top: 4px; text-align: right; display: block; }

        .tabs-tapatio { display: flex; gap: 10px; margin-bottom: 20px; padding: 0 5px; }
        .tab-btn-tapatio { flex: 1; background: #1e293b; color: white; border: 1px solid var(--gold); padding: 14px 10px; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .tab-btn-tapatio.active { background: var(--gold); color: black; }

        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 5px; max-height: 280px; overflow-y: auto; padding: 10px; background: #0f172a; border-radius: 12px; }
        .numero { height: 38px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; border: 1px solid #475569; color: white; }
        .numero.ocupado { opacity: 0.1; background: #000 !important; pointer-events: none; }
        .numero.seleccionado { background: var(--gold) !important; color: black !important; }

        .btn-azar { background: #334155; color: var(--gold-light); border: 1px solid var(--gold); padding: 10px; border-radius: 10px; width: 100%; margin-bottom: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }

        #adminPanel { background: #f8fafc; color: #1e293b; border-radius: 20px; padding: 15px; margin-top: 20px; display: none; min-height: 80vh; }
        .admin-nav-btn { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #ddd; background: white; font-weight: bold; cursor: pointer; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .admin-section-content { display: none; }
        .admin-section-content.active { display: block; }
        .admin-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        
        input, select, textarea { padding: 12px; border-radius: 10px; border: 1px solid #ccc; width: 100%; margin-bottom: 12px; box-sizing: border-box; font-family: inherit; }
        .btn-gold { background: linear-gradient(45deg, var(--gold), #fbbf24); color: black; font-weight: 900; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; }
        .btn-finish { background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: 900; margin-top: 10px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #64748b; margin-bottom: 4px; }
    </style>
</head>
<body>

<button id="btnAdminOculto" onclick="accesoAdmin()"></button>

<div id="pantallaInicio">
    <div style="text-align:center; padding: 25px 15px;">
        <h1 style="color:var(--gold); margin:0; font-size: 26px; font-weight: 900;">RIFAS EL TAPATÍO 🍀</h1>
        <div style="width: 40px; height: 2px; background: var(--gold); margin: 8px auto;"></div>
    </div>
    <div class="tabs-tapatio">
        <button id="btnTabActivas" class="tab-btn-tapatio active" onclick="cambiarSeccion('activas')">Rifas Activas</button>
        <button id="btnTabHistorial" class="tab-btn-tapatio" onclick="cambiarSeccion('historial')">Historial</button>
    </div>
    <div id="listaRifas"></div>
</div>

<div id="rifaContenedor" class="container animate__animated animate__fadeIn" style="display:none;">
    <button onclick="volverInicio()" style="background:none; color:#94a3b8; border:none; cursor:pointer; margin-bottom:15px; font-weight:bold;">❮ VOLVER</button>
    <div id="contenidoRifa">
        <img id="premioImgVer" src="" style="width:100%; border-radius:15px; border: 1px solid var(--gold); margin-bottom:15px;">
        <h2 id="tituloRifa" style="text-align:center; color:var(--gold-light); margin-bottom:10px;"></h2>
        <div id="infoGanadorUsuario" style="display:none; background:#1e293b; border:1px solid var(--success); padding:10px; border-radius:10px; margin-bottom:15px; text-align:center;">
            <h4 style="color:var(--success); margin:0;">🏆 ¡GANADOR ENCONTRADO!</h4>
            <p id="txtGanadorDetalle" style="margin:5px 0; font-weight:bold;"></p>
        </div>
        <div id="galeriaEvidencia" style="display:flex; gap:10px; overflow-x:auto; margin-bottom:15px;"></div>
        
        <div id="barraProgresoUser">
            <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold; margin-bottom:5px;">
                <span>DISPONIBLES: <span id="txtDisponibles" style="color:var(--gold)">0</span></span>
                <span id="txtPorcentaje">0%</span>
            </div>
            <div class="progress-container" style="margin-bottom:20px;"><div id="bar" class="progress-bar"></div></div>
        </div>
        
        <div id="seccionCompra">
            <input type="text" id="nombre" placeholder="Nombre completo">
            <input type="tel" id="telefono" placeholder="WhatsApp (10 dígitos)">
            <button class="btn-azar" onclick="seleccionarAlAzar()"><span>🎲 SELECCIÓN AL AZAR</span></button>
            <div id="tablero" class="grid-numeros"></div>
            <button onclick="registrarPro()" class="btn-gold" style="margin-top:20px;">APARTAR MI LUGAR 🚀</button>
        </div>
    </div>
</div>

<div id="adminPanel" class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 id="panelHeaderTitle">⚙️ PANEL DE CONTROL</h3>
        <button onclick="volverInicio()" style="background:none; border:none; font-size: 20px;">✕</button>
    </div>
    
    <div id="adminMenuPrincipal">
        <button class="admin-nav-btn" onclick="verSeccionAdmin('sec-papelera')"><span>🗑️ 1. PAPELERÍA DE RECICLAJE</span> ❯</button>
        <button class="admin-nav-btn" onclick="verSeccionAdmin('sec-proceso')"><span>📊 2. RIFAS EN PROCESO</span> ❯</button>
        <button class="admin-nav-btn" onclick="verSeccionAdmin('sec-creador')"><span>🆕 3. CREADOR DE NUEVA RIFA</span> ❯</button>
    </div>

    <div id="sec-proceso" class="admin-section-content">
        <button onclick="regresarMenuAdmin()" style="margin-bottom:15px; border:none; background:none; color:var(--info); font-weight:bold;">❮ REGRESAR</button>
        <div id="listaGestionRifas"></div>
        <div id="detalleGestion" style="display:none; border-top: 2px solid #ddd; padding-top: 15px;">
            <div id="listaPagosSmart" class="admin-card" style="padding:0;"></div>
        </div>
    </div>

    <div id="sec-creador" class="admin-section-content">
        <button onclick="regresarMenuAdmin()" style="margin-bottom:15px; border:none; background:none; color:var(--info); font-weight:bold;">❮ REGRESAR</button>
        <div class="admin-card">
            <h4 id="creadorTitulo">Configuración</h4>
            <label>Nombre de la rifa</label><input type="text" id="newRifaNombre">
            <label>Total de números</label><input type="number" id="newRifaTotal">
            <label>Precio Final ($)</label><input type="number" id="newRifaPrecio">
            <label>Link de foto principal</label><input type="text" id="newRifaFoto">
            <label>Fecha del Sorteo</label><input type="datetime-local" id="newRifaFecha">
            <label>Modo de Venta</label>
            <select id="newRifaModo"><option value="1">Individual</option><option value="2">Combo 2</option><option value="4">Combo 4</option><option value="5">Combo 5</option></select>
            
            <div style="background:#fff5f5; padding:10px; border-radius:10px; margin:15px 0; border:1px solid #feb2b2;">
                <label style="color:#c53030">Oferta (Parpadeante)</label><input type="text" id="ofertaTexto">
                <label style="color:#c53030">Expira oferta:</label><input type="datetime-local" id="ofertaExpira">
            </div>

            <div id="seccionFinalizar" style="display:none; background:#f0f9ff; padding:10px; border-radius:10px; border:1px solid #bae6fd;">
                <h4 style="color:#0369a1; margin-top:0;">🏆 DATOS DEL GANADOR</h4>
                <label>Nombre Ganador</label><input type="text" id="winNombre">
                <label>Boleto Ganador</label><input type="number" id="winNumero">
                <label>Fotos de Evidencia (links separados por comas)</label>
                <textarea id="winFotos" placeholder="http://link1.jpg, http://link2.png" rows="3"></textarea>
                <button onclick="finalizarRifa()" class="btn-finish">FINALIZAR RIFA 🏆</button>
            </div>

            <button id="btnGuardarRifa" onclick="crearNuevaRifa()" class="btn-gold" style="margin-top:15px;">LANZAR RIFA 🚀</button>
        </div>
    </div>

    <div id="sec-papelera" class="admin-section-content">
        <button onclick="regresarMenuAdmin()" style="margin-bottom:15px; border:none; background:none; color:var(--info); font-weight:bold;">❮ REGRESAR</button>
        <div id="listaPapelera"></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M", authDomain: "rifa01-6ff39.firebaseapp.com", databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com", projectId: "rifa01-6ff39" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let rifaActualID = "", seleccionados = [], compradores = [], configRifa = {}, vistaActiva = 'activas', modoEdicion = false;

    setInterval(() => {
        const ahora = new Date().getTime();
        document.querySelectorAll('.timer-display').forEach(el => {
            const target = new Date(el.dataset.fecha).getTime();
            const diff = target - ahora;
            if(diff <= 0) { el.innerText = "¡Sorteo en curso! 🏁"; return; }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24)), h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)), m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            el.innerText = `Faltan: ${d}d ${h}h ${m}m`;
        });
    }, 60000);

    function cargarLista() {
        const path = vistaActiva === 'activas' ? 'rifas_activas' : 'historial_rifas';
        db.ref(path).on('value', snap => {
            const container = document.getElementById('listaRifas'); container.innerHTML = '';
            const data = snap.val(); if(!data) return;
            for(let id in data) {
                const conf = data[id].config;
                const apartados = data[id].participantes ? Object.keys(data[id].participantes).length : 0;
                const porc = Math.floor((apartados / conf.total) * 100);
                const oferta = conf.ofertaTexto ? `<div class="oferta-tag">${conf.ofertaTexto}</div>` : '';
                const ganador = conf.winNombre ? `<div class="winner-tag">🏆 Ganador: ${conf.winNombre} (#${conf.winNumero})</div>` : '';
                
                container.innerHTML += `
                <div class="rifa-card" onclick="abrirRifa('${id}', '${vistaActiva}')">
                    <div class="rifa-badge">$${conf.precio}</div>
                    <img src="${conf.foto}">
                    <div class="rifa-info">
                        <h4 style="margin:0; color:var(--gold);">${id}</h4>
                        ${oferta} ${ganador}
                        <span class="timer-text timer-display" data-fecha="${conf.fecha || ''}">Calculando...</span>
                        <div class="progress-container"><div class="progress-bar" style="width:${porc}%"></div></div>
                    </div>
                </div>`;
            }
        });
    }

    function editarRifa(id) {
        modoEdicion = true; rifaActualID = id;
        db.ref('rifas_activas/' + id + '/config').once('value', snap => {
            const conf = snap.val();
            document.getElementById('newRifaNombre').value = id;
            document.getElementById('newRifaTotal').value = conf.total;
            document.getElementById('newRifaPrecio').value = conf.precio;
            document.getElementById('newRifaFoto').value = conf.foto;
            document.getElementById('newRifaFecha').value = conf.fecha;
            document.getElementById('newRifaModo').value = conf.numPorCombo;
            document.getElementById('ofertaTexto').value = conf.ofertaTexto || "";
            document.getElementById('ofertaExpira').value = conf.ofertaExpira || "";
            document.getElementById('winNombre').value = conf.winNombre || "";
            document.getElementById('winNumero').value = conf.winNumero || "";
            document.getElementById('winFotos').value = conf.winFotos || "";
            
            document.getElementById('creadorTitulo').innerText = "Editar Rifa";
            document.getElementById('seccionFinalizar').style.display = 'block';
            verSeccionAdmin('sec-creador');
        });
    }

    function finalizarRifa() {
        const wn = document.getElementById('winNombre').value;
        const wnum = document.getElementById('winNumero').value;
        if(!wn || !wnum) return alert("Pon el nombre y número del ganador para finalizar.");
        if(!confirm("¿Seguro? Se moverá al historial y no podrá comprarse más.")) return;

        db.ref('rifas_activas/' + rifaActualID).once('value', snap => {
            const data = snap.val();
            data.config.winNombre = wn;
            data.config.winNumero = wnum;
            data.config.winFotos = document.getElementById('winFotos').value;
            data.config.ofertaTexto = ""; // Limpiar oferta al finalizar
            
            db.ref('historial_rifas/' + rifaActualID).set(data).then(() => {
                db.ref('rifas_activas/' + rifaActualID).remove();
                alert("¡Rifa Finalizada con éxito!");
                regresarMenuAdmin();
            });
        });
    }

    function abrirRifa(id, tipo) {
        rifaActualID = id; seleccionados = [];
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'block';
        db.ref((tipo === 'activas' ? 'rifas_activas/' : 'historial_rifas/') + id).on('value', snap => {
            const data = snap.val(); if(!data) return;
            configRifa = data.config;
            compradores = data.participantes ? Object.entries(data.participantes).map(([k,v]) => ({id:k, ...v})) : [];
            
            document.getElementById('tituloRifa').innerText = id;
            document.getElementById('premioImgVer').src = configRifa.foto;
            
            // Lógica para historial
            if(tipo === 'historial' || configRifa.winNombre) {
                document.getElementById('seccionCompra').style.display = 'none';
                document.getElementById('barraProgresoUser').style.display = 'none';
                document.getElementById('infoGanadorUsuario').style.display = 'block';
                document.getElementById('txtGanadorDetalle').innerText = `${configRifa.winNombre} con el boleto #${configRifa.winNumero}`;
                
                const galeria = document.getElementById('galeriaEvidencia'); galeria.innerHTML = '';
                if(configRifa.winFotos) {
                    configRifa.winFotos.split(',').forEach(url => {
                        galeria.innerHTML += `<img src="${url.trim()}" style="height:150px; border-radius:10px; border:1px solid var(--gold);">`;
                    });
                }
            } else {
                document.getElementById('seccionCompra').style.display = 'block';
                document.getElementById('barraProgresoUser').style.display = 'block';
                document.getElementById('infoGanadorUsuario').style.display = 'none';
                document.getElementById('galeriaEvidencia').innerHTML = '';
                dibujarTablero();
            }
        });
    }

    // Funciones Base (Se mantienen sin cambios)
    function crearNuevaRifa() { const n = document.getElementById('newRifaNombre').value, t = document.getElementById('newRifaTotal').value, p = document.getElementById('newRifaPrecio').value, f = document.getElementById('newRifaFoto').value, m = document.getElementById('newRifaModo').value, d = document.getElementById('newRifaFecha').value; if(!n || !t || !p || !f || !d) return alert("Faltan datos"); const payload = { foto: f, precio: parseInt(p), total: parseInt(t), numPorCombo: parseInt(m), fecha: d, ofertaTexto: document.getElementById('ofertaTexto').value, ofertaExpira: document.getElementById('ofertaExpira').value }; db.ref('rifas_activas/' + n + '/config').update(payload).then(() => { alert("Guardado!"); regresarMenuAdmin(); }); }
    function seleccionarAlAzar() { const limite = configRifa.numPorCombo || 1; const ocupados = compradores.map(c => parseInt(c.numero)); const disponibles = []; for(let i=0; i < configRifa.total; i++) { if(!ocupados.includes(i)) disponibles.push(i); } if(disponibles.length < limite) return alert("Sin cupo"); seleccionados = []; while(seleccionados.length < limite) { const num = disponibles[Math.floor(Math.random() * disponibles.length)]; if(!seleccionados.includes(num)) seleccionados.push(num); } dibujarTablero(); }
    function dibujarTablero() { const tab = document.getElementById('tablero'); tab.innerHTML = ''; const ocupados = compradores.map(c => parseInt(c.numero)); for(let i=0; i < (configRifa.total || 100); i++) { const div = document.createElement('div'); const ocu = ocupados.includes(i); div.className = 'numero' + (ocu ? ' ocupado' : (seleccionados.includes(i) ? ' seleccionado' : '')); div.innerText = i < 10 ? "0" + i : i; if(!ocu) div.onclick = () => { const limite = configRifa.numPorCombo || 1; if(seleccionados.includes(i)) seleccionados = seleccionados.filter(n => n !== i); else if(seleccionados.length < limite) seleccionados.push(i); dibujarTablero(); }; tab.appendChild(div); } document.getElementById('txtDisponibles').innerText = configRifa.total - ocupados.length; document.getElementById('txtPorcentaje').innerText = Math.floor((ocupados.length/configRifa.total)*100) + "%"; document.getElementById('bar').style.width = Math.floor((ocupados.length/configRifa.total)*100) + "%"; }
    function registrarPro() { const n = document.getElementById('nombre').value, t = document.getElementById('telefono').value; const req = configRifa.numPorCombo || 1; if(!n || t.length < 10) return alert("Datos incompletos"); if(seleccionados.length !== req) return alert("Selecciona tus números"); const vID = Date.now(); seleccionados.forEach(num => { db.ref('rifas_activas/'+rifaActualID+'/participantes').push({ nombre:n, tel:t, numero:num, pagado:false, ventaID: vID }); }); window.open(`https://wa.me/523310711283?text=Apartado en ${rifaActualID}: ${n} (#${seleccionados.join(',')})`, '_blank'); volverInicio(); }
    function cargarListaGestion() { db.ref('rifas_activas').on('value', snap => { const container = document.getElementById('listaGestionRifas'); container.innerHTML = ''; const data = snap.val(); if(!data) return; for(let id in data) { container.innerHTML += `<div class="admin-card" style="display:flex; justify-content:space-between; align-items:center;"><strong onclick="abrirRifaAdmin('${id}')" style="cursor:pointer; color:var(--info);">${id}</strong><div><button onclick="editarRifa('${id}')" style="background:#ddd; border:none; padding:5px 10px; border-radius:5px; margin-right:5px;">EDITAR</button><button onclick="enviarAPapelera('${id}')" style="background:none; border:none;">🗑️</button></div></div>`; } }); }
    function abrirRifaAdmin(id) { rifaActualID = id; document.getElementById('detalleGestion').style.display = 'block'; db.ref('rifas_activas/' + id).on('value', snap => { const data = snap.val(); if(!data) return; configRifa = data.config; compradores = data.participantes ? Object.entries(data.participantes).map(([k,v]) => ({id:k, ...v})) : []; actualizarListaPagosAdmin(); }); }
    function actualizarListaPagosAdmin() { const container = document.getElementById('listaPagosSmart'); container.innerHTML = ''; compradores.forEach(c => { container.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;"><span>${c.nombre} (#${c.numero})</span><button onclick="db.ref('rifas_activas/${rifaActualID}/participantes/${c.id}').remove()">🗑️</button></div>`; }); }
    function verSeccionAdmin(id) { document.getElementById('adminMenuPrincipal').style.display='none'; document.querySelectorAll('.admin-section-content').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='sec-proceso') cargarListaGestion(); }
    function regresarMenuAdmin() { modoEdicion = false; document.getElementById('seccionFinalizar').style.display = 'none'; document.getElementById('adminMenuPrincipal').style.display='block'; document.querySelectorAll('.admin-section-content').forEach(s => s.classList.remove('active')); document.getElementById('detalleGestion').style.display='none'; }
    function accesoAdmin() { if(prompt("Clave:")==="rifa2369") { document.getElementById('adminPanel').style.display='block'; document.getElementById('pantallaInicio').style.display='none'; } }
    function volverInicio() { document.getElementById('adminPanel').style.display='none'; document.getElementById('rifaContenedor').style.display='none'; document.getElementById('pantallaInicio').style.display='block'; cargarLista(); }
    function cambiarSeccion(t) { vistaActiva = t; document.getElementById('btnTabActivas').classList.toggle('active', t==='activas'); document.getElementById('btnTabHistorial').classList.toggle('active', t==='historial'); cargarLista(); }
    function enviarAPapelera(id) { if(confirm("¿A papelera?")) { db.ref('rifas_activas/'+id).once('value', snap => { const d = snap.val(); d.fechaEliminado = Date.now(); db.ref('papelera/'+id).set(d).then(() => db.ref('rifas_activas/'+id).remove()); }); } }
    cargarLista();
</script>
</body>
</html>

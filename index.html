<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos Elite 🍀</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --gold-light: #f1d592; --dark-100: #0f172a; --dark-200: #1e293b; --danger: #ff4d4d; --success: #22c55e; }
        body { background-color: var(--dark-100) !important; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: auto; background: var(--dark-200); border-radius: 25px; padding: 20px; border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        /* BOTÓN HISTORIAL */
        .btn-history-top { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; text-transform: uppercase; }

        .header { text-align: center; padding: 10px 0 20px 0; }
        .header h1 { color: var(--gold); font-size: 32px; margin: 0; letter-spacing: 2px; font-weight: 900; }

        /* CARDS INICIO */
        .grid-rifas { display: grid; gap: 20px; }
        .card-rifa { background: #1e293b; border-radius: 20px; overflow: hidden; border: 1px solid #334155; position: relative; cursor: pointer; }
        .card-rifa img { width: 100%; height: 200px; object-fit: cover; }
        .card-timer-mini { background: rgba(0,0,0,0.8); color: var(--gold-light); font-size: 11px; font-weight: bold; padding: 6px; text-align: center; border-top: 1px solid var(--gold); }

        .promo-badge { position: absolute; top: 12px; left: 12px; background: var(--danger); color: white; padding: 4px 12px; border-radius: 50px; font-weight: 900; font-size: 11px; z-index: 10; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* CONTADORES INTERNOS */
        .timer-main { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 15px; border: 1px solid var(--gold); margin: 10px 0; text-align: center; }
        .timer-promo-box { background: var(--danger); color: white; padding: 12px; border-radius: 15px; margin: 10px 0; text-align: center; font-weight: bold; box-shadow: 0 0 15px rgba(255,77,77,0.4); }
        .clock-text { font-family: monospace; font-size: 22px; display: block; letter-spacing: 1px; }

        /* TABLERO */
        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); gap: 8px; margin: 15px 0; max-height: 300px; overflow-y: auto; padding: 10px; background: #0f172a; border-radius: 15px; }
        .numero { height: 48px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 10px; font-weight: bold; border: 1px solid #475569; }
        .numero.seleccionado { background: var(--gold) !important; color: black; box-shadow: 0 0 15px var(--gold); }
        .numero.ocupado { opacity: 0.2; background: #000 !important; text-decoration: line-through; }
        
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(45deg, var(--gold), #fbbf24); color: black; font-weight: 900; border: none; padding: 18px; border-radius: 15px; cursor: pointer; width: 100%; font-size: 16px; }

        #rifaContenedor, #historialSeccion, #adminPanel { display: none; }
        
        /* ADMIN STYLES */
        .admin-box { background: #f8fafc; color: #1e293b; padding: 20px; border-radius: 20px; border: 2px solid var(--gold); }
        .switch-container { display: flex; align-items: center; gap: 10px; background: #e2e8f0; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="pantallaInicio">
    <div class="header"><h1>SORTEOS ELITE 🍀</h1></div>
    <button onclick="toggleHistorial()" class="btn-history-top">🏆 VER GANADORES ANTERIORES</button>
    <div id="gridRifasActivas" class="grid-rifas"></div>
</div>

<div id="rifaContenedor" class="container animate__animated animate__fadeIn">
    <button onclick="volverInicio()" style="background:none; color:#94a3b8; border:none; margin-bottom:10px; cursor:pointer; font-weight:bold;">✕ VOLVER</button>
    
    <img id="premioImgVer" src="" style="width:100%; border-radius:20px; border: 2px solid var(--gold);">

    <div id="seccionPromoReloj" class="timer-promo-box" style="display:none;">
        <span id="textoPromoAdmin">OFERTA ACTIVA 🔥</span>
        <span id="relojPromo" class="clock-text">00:00:00</span>
    </div>

    <div class="timer-main">
        <span style="font-size:10px; color:var(--gold); font-weight:bold;">EL SORTEO CIERRA EN (8PM):</span>
        <span id="relojSorteo" class="clock-text">00:00:00:00</span>
    </div>

    <h2 id="tituloRifa" style="margin:10px 0; color:var(--gold-light); text-align:center;"></h2>
    <p id="precioInfo" style="font-size: 28px; font-weight: 900; color:var(--success); margin:0; text-align:center;"></p>
    
    <div style="margin-top:20px;">
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="tel" id="telefono" placeholder="WhatsApp">
        <div id="tablero" class="grid-numeros"></div>
        <button onclick="registrar()" class="btn-gold">APARTAR MI NÚMERO 🚀</button>
    </div>
</div>

<div id="historialSeccion" class="container">
    <button onclick="volverInicio()" style="background:none; border:none; color:white; cursor:pointer; margin-bottom:10px;">← ATRÁS</button>
    <h2 style="text-align:center;">🏆 SALÓN DE LA FAMA</h2>
    <div id="listaHistorial"></div>
</div>

<button onclick="accesoAdmin()" style="opacity:0.02; margin-top:50px; width:100%; height:30px; border:none;">ADMIN</button>

<div id="adminPanel" class="container">
    <div class="admin-box">
        <h3 style="margin-top:0;">🛠 EDITOR DE RIFA</h3>
        
        <label>Título</label><input type="text" id="confTitulo">
        <label>Foto URL</label><input type="text" id="confFoto">
        <label>Números</label><input type="number" id="confTotal">
        <label>Precio $</label><input type="number" id="confPrecio">
        <label>Fecha Sorteo</label><input type="date" id="confFecha">
        
        <hr>
        <div class="switch-container">
            <input type="checkbox" id="confPromoActiva" style="width:25px; margin:0;">
            <label style="margin:0; font-size:14px; color:red;">¿ACTIVAR CONTADOR DE OFERTA? 🔥</label>
        </div>
        
        <label>Texto de la Oferta (Ej: 2x1 solo hoy)</label>
        <input type="text" id="confPromoTexto" placeholder="Escribe el porcentaje o frase">
        
        <button onclick="guardarConfig()" class="btn-gold">💾 ACTUALIZAR SORTEO</button>
        <button onclick="borrarSinHistorial()" style="background:red; color:white; border:none; padding:10px; border-radius:10px; width:100%; margin-top:10px; font-weight:bold;">🗑 ELIMINAR RIFA</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M",
        authDomain: "rifa01-6ff39.firebaseapp.com",
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com",
        projectId: "rifa01-6ff39",
        storageBucket: "rifa01-6ff39.firebasestorage.app",
        messagingSenderId: "644348151229",
        appId: "1:644348151229:web:c71ed82967edecb6a7bed4",
        measurementId: "G-X287LPW130"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let rifaActualID = "", numeroSeleccionado = null, compradores = [], configRifa = {}, intervalMain, intervalCards = [];

    db.ref('rifas_activas').on('value', snap => {
        const grid = document.getElementById('gridRifasActivas');
        grid.innerHTML = '';
        const data = snap.val();
        if(!data) return;
        intervalCards.forEach(i => clearInterval(i));
        for(let id in data) {
            const rId = id.replace(/\s+/g, '-');
            grid.innerHTML += `
                <div class="card-rifa" onclick="abrirRifa('${id}')">
                    ${data[id].config.promoActiva ? `<div class="promo-badge">${data[id].config.promoTexto} 🔥</div>` : ''}
                    <img src="${data[id].config.foto}">
                    <div id="mini-clock-${rId}" class="card-timer-mini">CIERRA: --:--:--</div>
                    <div style="padding:12px; text-align:center;">
                        <h4 style="margin:0; color:var(--gold-light)">${id}</h4>
                        <span style="color:var(--success); font-weight:900; font-size:18px;">$${data[id].config.precio}</span>
                    </div>
                </div>`;
            const interval = setInterval(() => {
                const el = document.getElementById(`mini-clock-${rId}`);
                if(!el) return;
                const dist = new Date(data[id].config.fechaSorteo + "T20:00:00").getTime() - new Date().getTime();
                if(dist < 0) { el.innerText = "¡SORTEO FINALIZADO!"; return; }
                const d = Math.floor(dist/86400000), h = Math.floor((dist%86400000)/3600000), m = Math.floor((dist%3600000)/60000);
                el.innerText = `CIERRA EN: ${d}d ${h}h ${m}m`;
            }, 1000);
            intervalCards.push(interval);
        }
    });

    function abrirRifa(id) {
        rifaActualID = id;
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'block';
        
        db.ref('rifas_activas/'+id+'/config').on('value', snap => {
            configRifa = snap.val();
            if(!configRifa) return;
            document.getElementById('tituloRifa').innerText = id;
            document.getElementById('premioImgVer').src = configRifa.foto;
            document.getElementById('precioInfo').innerText = "$"+configRifa.precio;
            
            // Llenar Admin
            document.getElementById('confTitulo').value = id;
            document.getElementById('confFoto').value = configRifa.foto;
            document.getElementById('confTotal').value = configRifa.total;
            document.getElementById('confPrecio').value = configRifa.precio;
            document.getElementById('confFecha').value = configRifa.fechaSorteo || "";
            document.getElementById('confPromoActiva').checked = configRifa.promoActiva || false;
            document.getElementById('confPromoTexto').value = configRifa.promoTexto || "";

            if(intervalMain) clearInterval(intervalMain);
            intervalMain = setInterval(() => {
                const ahora = new Date().getTime();
                const finSorteo = new Date(configRifa.fechaSorteo + "T20:00:00").getTime();
                
                // Reloj Sorteo
                const distS = finSorteo - ahora;
                const rS = document.getElementById('relojSorteo');
                if(distS < 0) rS.innerText = "FINALIZADO";
                else {
                    const dd = Math.floor(distS/86400000), hh = Math.floor((distS%86400000)/3600000), mm = Math.floor((distS%3600000)/60000), ss = Math.floor((distS%60000)/1000);
                    rS.innerText = `${dd}d ${hh}h ${mm}m ${ss}s`;
                }

                // Reloj Promo (Solo si está activado el checkbox)
                const secP = document.getElementById('seccionPromoReloj');
                if(configRifa.promoActiva) {
                    secP.style.display = 'block';
                    document.getElementById('textoPromoAdmin').innerText = configRifa.promoTexto + " TERMINA EN: 🔥";
                    const finPromo = finSorteo - (1000 * 60 * 60 * 12); // Acaba 12h antes
                    const distP = finPromo - ahora;
                    if(distP < 0) secP.style.display = 'none';
                    else {
                        const ph = Math.floor(distP/3600000), pm = Math.floor((distP%3600000)/60000), ps = Math.floor((distP%60000)/1000);
                        document.getElementById('relojPromo').innerText = `${ph}h ${pm}m ${ps}s`;
                    }
                } else { secP.style.display = 'none'; }
            }, 1000);
            dibujarTablero();
        });
        db.ref('rifas_activas/'+id+'/participantes').on('value', snap => {
            compradores = [];
            const d = snap.val();
            for(let k in d) compradores.push({key:k, ...d[k]});
            dibujarTablero();
        });
    }

    function dibujarTablero() {
        const tab = document.getElementById('tablero'); tab.innerHTML = '';
        const ocupados = compradores.map(c => parseInt(c.numero));
        for(let i=1; i<=configRifa.total; i++) {
            const div = document.createElement('div');
            const ocu = ocupados.includes(i);
            div.className = 'numero' + (ocu ? ' ocupado':'');
            div.innerText = i;
            if(!ocu) div.onclick = () => {
                document.querySelectorAll('.numero').forEach(n => n.classList.remove('seleccionado'));
                div.classList.add('seleccionado');
                numeroSeleccionado = i;
            };
            tab.appendChild(div);
        }
    }

    function guardarConfig() {
        const tit = document.getElementById('confTitulo').value;
        db.ref('rifas_activas/'+tit+'/config').update({
            foto: document.getElementById('confFoto').value,
            total: parseInt(document.getElementById('confTotal').value),
            precio: parseInt(document.getElementById('confPrecio').value),
            fechaSorteo: document.getElementById('confFecha').value,
            promoActiva: document.getElementById('confPromoActiva').checked,
            promoTexto: document.getElementById('confPromoTexto').value
        }).then(() => { alert("Configuración guardada 🚀"); location.reload(); });
    }

    function registrar() {
        if(!numeroSeleccionado) return alert("Elige un número");
        const n = document.getElementById('nombre').value, t = document.getElementById('telefono').value;
        if(!n || !t) return alert("Faltan datos");
        db.ref('rifas_activas/'+rifaActualID+'/participantes').push({nombre:n, tel:t, numero:numeroSeleccionado, pagado:false});
        window.open(`https://wa.me/523310711283?text=Aparté el # ${numeroSeleccionado} para ${rifaActualID}. Nombre: ${n}`, '_blank');
    }

    function volverInicio() { location.reload(); }
    function accesoAdmin() { if(prompt("Pass:")==="1234") document.getElementById('adminPanel').style.display='block'; }
    function toggleHistorial() { document.getElementById('pantallaInicio').style.display='none'; document.getElementById('historialSeccion').style.display='block'; }
    function borrarSinHistorial() { if(confirm("¿Borrar?")) { db.ref('rifas_activas/'+rifaActualID).remove(); volverInicio(); } }
</script>
</body>
</html>

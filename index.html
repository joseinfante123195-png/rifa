<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifas El Tapatío 🍀</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
:root {
    --gold: #d4af37;
    --dark: #0f172a;
    --card: #1e293b;
    --success: #22c55e;
    --danger: #ef4444;
}

/* 🔥 NUEVO DISEÑO */
body {
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
    font-family: 'Segoe UI', sans-serif;
    margin:0;
}

/* CONTENEDOR */
.container {
    max-width:600px;
    margin:auto;
    padding:15px;
}

/* TARJETAS */
.rifa-card {
    background: var(--card);
    border-radius:15px;
    padding:10px;
    display:flex;
    gap:10px;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
    transition:0.3s;
}
.rifa-card:hover { transform: scale(1.02); }

/* IMAGEN */
.rifa-card img {
    width:90px;
    height:90px;
    border-radius:10px;
}

/* BOTONES */
.btn-gold {
    background: linear-gradient(45deg,#d4af37,#fbbf24);
    border:none;
    padding:15px;
    width:100%;
    border-radius:12px;
    font-weight:bold;
    color:black;
    font-size:16px;
    box-shadow:0 5px 15px rgba(212,175,55,0.5);
}

/* NUMEROS */
.numero {
    background:#334155;
    border-radius:6px;
    padding:10px;
    text-align:center;
}
.numero.seleccionado {
    background:var(--gold);
    color:black;
}

/* GRID */
.grid-numeros {
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(40px,1fr));
    gap:5px;
}

/* HEADER */
h1 {
    text-align:center;
    color:var(--gold);
}

/* PROGRESS */
.progress-container {
    background:#020617;
    height:8px;
    border-radius:10px;
}
.progress-bar {
    background:linear-gradient(90deg,#d4af37,#fbbf24);
    height:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>RIFAS EL TAPATÍO 🍀</h1>

    <div id="listaRifas"></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M",
    databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function cargarLista(){
    db.ref('rifas_activas').on('value', snap=>{
        const data = snap.val();
        let html = "";

        for(let id in data){
            const r = data[id];
            const vendidos = r.participantes ? Object.keys(r.participantes).length : 0;
            const porcentaje = Math.floor((vendidos / r.config.total) * 100);

            html += `
            <div class="rifa-card" onclick="alert('Aquí abre rifa')">
                <img src="${r.config.foto}">
                <div style="flex:1;">
                    <h3>${id}</h3>
                    <p>$${r.config.precio}</p>

                    <div class="progress-container">
                        <div class="progress-bar" style="width:${porcentaje}%"></div>
                    </div>

                    <small>${porcentaje}% vendido</small>
                </div>
            </div>
            `;
        }

        document.getElementById('listaRifas').innerHTML = html;
    });
}

cargarLista();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifas El Tapatío 🍀</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --gold-light: #f1d592; --dark-100: #0f172a; --dark-200: #1e293b; --success: #22c55e; --danger: #ff4d4d; --info: #3b82f6; }
        body { background-color: var(--dark-100) !important; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: var(--dark-200); border-radius: 20px; padding: 15px; border: 1px solid #334155; }
        
        #btnAdminOculto { position: fixed; top: 0; right: 0; width: 60px; height: 60px; background: none; border: none; z-index: 9999; opacity: 0; }
        .header-stats { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 11px; font-weight: bold; }
        .progress-container { background: #0f172a; border-radius: 10px; height: 10px; margin-bottom: 15px; border: 1px solid #334155; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, var(--gold), #fbbf24); height: 100%; width: 0%; transition: 0.8s; }
        
        /* Estilos de botones de navegación principal */
        .tabs-tapatio { display: flex; gap: 10px; margin-bottom: 20px; padding: 0 5px; }
        .tab-btn-tapatio { flex: 1; background: #1e293b; color: white; border: 1px solid var(--gold); padding: 14px 10px; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .tab-btn-tapatio.active { background: var(--gold); color: black; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 5px; max-height: 280px; overflow-y: auto; padding: 8px; background: #0f172a; border-radius: 12px; }
        .numero { height: 38px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; border: 1px solid #475569; }
        .numero.ocupado { opacity: 0.1; background: #000 !important; pointer-events: none; }
        .numero.seleccionado { background: var(--gold) !important; color: black !important; transform: scale(1.05); }
        
        #adminPanel { background: #f8fafc; color: #1e293b; border-radius: 20px; padding: 15px; margin-top: 20px; display: none; }
        .admin-section { background: white; padding: 12px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #ddd; }
        input, select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(45deg, var(--gold), #fbbf24); color: black; font-weight: 900; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; }
        .db-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .db-card { background: #1e293b; color: white; padding: 10px; border-radius: 12px; border-left: 4px solid var(--gold); }
        .db-card h5 { margin: 0; font-size: 10px; text-transform: uppercase; color: #94a3b8; }
        .db-card p { margin: 5px 0 0 0; font-size: 16px; font-weight: bold; }
        .btn-csv { background: #22c55e; color: white; font-weight: bold; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; }
        .btn-random { background: rgba(212, 175, 55, 0.1); color: var(--gold); border: 2px solid var(--gold); padding: 12px; border-radius: 12px; font-weight: 900; width: 100%; margin: 10px 0; cursor: pointer; display: none; font-size: 14px; }
    </style>
</head>
<body>

<button id="btnAdminOculto" onclick="accesoAdmin()"></button>

<div id="pantallaInicio">
    <div style="text-align:center; padding: 25px 15px;">
        <h1 style="color:var(--gold); margin:0; font-size: 28px; letter-spacing: 2px; text-transform: uppercase; font-weight: 900;">
            RIFAS EL TAPATÍO 🍀
        </h1>
        <div style="width: 50px; height: 2px; background: var(--gold); margin: 10px auto;"></div>
    </div>

    <div class="tabs-tapatio">
        <button id="btnTabActivas" class="tab-btn-tapatio active" onclick="cambiarSeccion('activas')">
            1. Rifas en Proceso
        </button>
        <button id="btnTabHistorial" class="tab-btn-tapatio" onclick="cambiarSeccion('historial')">
            2. Historial de Rifas
        </button>
    </div>

    <div id="listaRifas" style="padding: 0 5px;"></div>
</div>

<div id="rifaContenedor" class="container animate__animated animate__fadeIn" style="display:none;">
    <button onclick="volverInicio()" style="background:none; color:#94a3b8; border:none; cursor:pointer; margin-bottom:10px; font-weight: bold;">✕ VOLVER AL INICIO</button>
    <div id="contenidoRifa">
        <div class="header-stats">
            <span>QUEDAN: <span id="txtDisponibles" style="color:var(--gold)">0</span></span>
            <span id="txtPorcentaje">0%</span>
        </div>
        <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
        <img id="premioImgVer" src="" style="width:100%; border-radius:12px; border: 1px solid var(--gold); margin-bottom:10px; min-height: 100px; background: #000; object-fit: cover;">
        <h2 id="tituloRifa" style="text-align:center; color:var(--gold-light); margin: 5px 0; font-size: 18px;"></h2>
        <div id="seccionCompra">
            <input type="text" id="nombre" placeholder="Nombre completo">
            <input type="tel" id="telefono" placeholder="WhatsApp (10 dígitos)">
            <button id="btnAzar" onclick="completarConAzar()" class="btn-random animate__animated animate__pulse animate__infinite">COMPLETAR COMBO AL AZAR 🎲</button>
            <div id="tablero" class="grid-numeros"></div>
            <button onclick="registrarPro()" class="btn-gold" style="margin-top:15px;">RESERVAR AHORA 🚀</button>
        </div>
    </div>
</div>

<div id="adminPanel" class="container">
    <h3 style="text-align:center; margin-top:0;">⚙️ PANEL DE CONTROL</h3>
    
    <div class="admin-section" style="border: 2px solid var(--gold);">
        <h4 style="margin:0 0 10px 0;">🆕 CREAR NUEVA RIFA</h4>
        <input type="text" id="newRifaNombre" placeholder="Nombre de la Rifa">
        <input type="number" id="newRifaTotal" placeholder="Total de números">
        <input type="number" id="newRifaPrecio" placeholder="Precio ($)">
        <input type="text" id="newRifaFoto" placeholder="URL de la imagen">
        <button onclick="crearNuevaRifa()" class="btn-gold">LANZAR RIFA 🚀</button>
    </div>

    <div class="admin-section" style="background: #0f172a; border: 1px solid var(--gold);">
        <h4 style="color: var(--gold); margin-top: 0; font-size: 14px; text-align: center;">📊 ESTADO: <span id="adminTituloRifa"></span></h4>
        <div class="db-grid">
            <div class="db-card"><h5>Vendidos</h5><p id="db-vendidos">0</p></div>
            <div class="db-card" style="border-left-color: var(--info);"><h5>Meta Total</h5><p id="db-meta">$0</p></div>
            <div class="db-card" style="border-left-color: var(--success);"><h5>En Caja</h5><p id="db-caja">$0</p></div>
            <div class="db-card" style="border-left-color: var(--danger);"><h5>Por Cobrar</h5><p id="db-deuda">$0</p></div>
        </div>
        <button onclick="exportarUsuariosCSV()" class="btn-csv">📥 DESCARGAR BASE (.CSV)</button>
    </div>

    <div class="admin-section" style="background: #eef2ff; border: 2px solid var(--info);">
        <h4 style="margin:0 0 10px 0;">🎯 CONFIGURACIÓN COMBO</h4>
        <select id="configModoVenta">
            <option value="1">Individual (1x1)</option>
            <option value="2">Par en Par (2x1)</option>
            <option value="4">Combo 4 (Paga 1, lleva 4)</option>
            <option value="5">Combo 5 (Paga 1, lleva 5)</option>
        </select>
        <button onclick="guardarModoVenta()" class="btn-gold" style="background:var(--info); color:white;">ACTUALIZAR MODO</button>
    </div>

    <div class="admin-section">
        <h4>👥 CONTROL DE PAGOS</h4>
        <div style="overflow-x:auto;">
            <table style="width:100%; font-size:10px; text-align:center;">
                <thead><tr><th>#</th><th>Nombre</th><th>Pago</th><th>X</th></tr></thead>
                <tbody id="cuerpoTablaAdmin"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M",
        authDomain: "rifa01-6ff39.firebaseapp.com",
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com",
        projectId: "rifa01-6ff39",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const audioExito = new Audio('https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3');

    let rifaActualID = "", seleccionados = [], compradores = [], configRifa = {}, vistaActiva = 'activas';

    // NUEVA FUNCIÓN DE CAMBIO DE SECCIÓN (BLINDADA)
    function cambiarSeccion(tipo) {
        vistaActiva = tipo;
        document.getElementById('btnTabActivas').classList.toggle('active', tipo === 'activas');
        document.getElementById('btnTabHistorial').classList.toggle('active', tipo === 'historial');
        cargarLista();
    }

    function cargarLista() {
        const path = vistaActiva === 'activas' ? 'rifas_activas' : 'historial_rifas';
        db.ref(path).on('value', snap => {
            const container = document.getElementById('listaRifas'); 
            container.innerHTML = '';
            const data = snap.val(); 
            if(!data) {
                container.innerHTML = '<p style="text-align:center; color:#94a3b8; margin-top:20px;">No hay rifas en esta sección.</p>';
                return;
            }
            for(let id in data) {
                container.innerHTML += `
                    <div onclick="abrirRifa('${id}', '${vistaActiva}')" style="background:#1e293b; border-radius:15px; padding:12px; cursor:pointer; margin-bottom:12px; display:flex; align-items:center; border: 1px solid #334155; transition: 0.3s;">
                        <img src="${data[id].config.foto}" style="width:65px; height:65px; border-radius:10px; object-fit:cover; border: 1px solid var(--gold);">
                        <div style="margin-left:15px;">
                            <h4 style="margin:0; color:var(--gold); font-size: 16px;">${id}</h4>
                            <p style="margin:3px 0 0 0; font-size: 11px; color: #94a3b8;">Toca para ver detalles y apartar</p>
                        </div>
                    </div>`;
            }
        });
    }

    function abrirRifa(id, tipo) {
        rifaActualID = id; seleccionados = [];
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'block';
        document.getElementById('adminTituloRifa').innerText = id;
        
        const path = tipo === 'activas' ? 'rifas_activas/' : 'historial_rifas/';
        db.ref(path + id).on('value', snap => {
            const data = snap.val(); if(!data) return;
            configRifa = data.config;
            compradores = data.participantes ? Object.entries(data.participantes).map(([k,v]) => ({id:k, ...v})) : [];
            document.getElementById('tituloRifa').innerText = id;
            document.getElementById('premioImgVer').src = configRifa.foto;
            actualizarVisuales(); dibujarTablero();
        });
    }

    function dibujarTablero() {
        const tab = document.getElementById('tablero'); tab.innerHTML = '';
        const ocupados = compradores.map(c => parseInt(c.numero));
        const modo = parseInt(configRifa.modoVenta || 1);
        const btnAzar = document.getElementById('btnAzar');
        btnAzar.style.display = (seleccionados.length > 0 && seleccionados.length % modo !== 0) ? 'block' : 'none';

        const totalMax = configRifa.total || 100;
        for(let i=0; i < totalMax; i++) {
            const numFormateado = i < 10 ? "0" + i : i;
            const div = document.createElement('div');
            const ocu = ocupados.includes(i);
            div.className = 'numero' + (ocu ? ' ocupado' : (seleccionados.includes(i) ? ' seleccionado' : ''));
            div.innerText = numFormateado;
            if(!ocu) div.onclick = () => { 
                if(seleccionados.includes(i)) seleccionados = seleccionados.filter(n => n !== i);
                else seleccionados.push(i);
                dibujarTablero();
            };
            tab.appendChild(div);
        }
        actualizarAdmin();
    }

    function completarConAzar() {
        const modo = parseInt(configRifa.modoVenta || 1);
        const ocupados = compradores.map(c => parseInt(c.numero));
        audioExito.currentTime = 0; audioExito.play();
        while(seleccionados.length % modo !== 0) {
            let numAzar = Math.floor(Math.random() * (configRifa.total || 100));
            if(!ocupados.includes(numAzar) && !seleccionados.includes(numAzar)) seleccionados.push(numAzar);
        }
        dibujarTablero();
    }

    async function registrarPro() {
        const n = document.getElementById('nombre').value, t = document.getElementById('telefono').value;
        const modo = parseInt(configRifa.modoVenta || 1);
        if(seleccionados.length === 0 || !n || t.length < 10) return alert("Completa tus datos");
        if(seleccionados.length % modo !== 0) return alert(`Completa el combo de ${modo}`);
        
        const numTxt = seleccionados.map(n => n < 10 ? "0"+n : n).join(', ');
        let msj = `¡Hola! Aparté mis números: ${numTxt} para ${rifaActualID}. Soy ${n}.`;
        if(modo > 1) msj = `¡Hola! Aparté mi *COMBO ELITE* (${modo} números) por el precio de 1. Mis números son: ${numTxt}. Soy ${n}.`;
        
        seleccionados.forEach(num => { db.ref('rifas_activas/'+rifaActualID+'/participantes').push({nombre:n, tel:t, numero:num, pagado:false}); });
        window.open(`https://wa.me/523310711283?text=${encodeURIComponent(msj)}`, '_blank');
        volverInicio();
    }

    function crearNuevaRifa() {
        const nombre = document.getElementById('newRifaNombre').value;
        const total = document.getElementById('newRifaTotal').value;
        const precio = document.getElementById('newRifaPrecio').value;
        const foto = document.getElementById('newRifaFoto').value;
        if(!nombre || !total || !precio || !foto) return alert("Llena todos los campos");

        db.ref('rifas_activas/' + nombre + '/config').set({
            foto: foto, precio: parseInt(precio), total: parseInt(total), modoVenta: 1
        }).then(() => { alert("Rifa creada con éxito"); location.reload(); });
    }

    function marcarPago(id, estadoActual) {
        db.ref('rifas_activas/' + rifaActualID + '/participantes/' + id).update({ pagado: !estadoActual });
    }

    function borrarP(id) {
        if(confirm("¿Liberar este número?")) db.ref('rifas_activas/' + rifaActualID + '/participantes/' + id).remove();
    }

    function exportarUsuariosCSV() {
        if(compradores.length === 0) return alert("No hay datos");
        const res = {}; compradores.forEach(c => {
            if(!res[c.tel]) res[c.tel] = { n: c.nombre, nums: [] };
            res[c.tel].nums.push(c.numero < 10 ? "0"+c.numero : c.numero);
        });
        let csv = "data:text/csv;charset=utf-8,\uFEFFNOMBRE,TELEFONO,NUMEROS\r\n";
        for(let t in res) csv += `"${res[t].n}","${t}","${res[t].nums.join(' - ')}"\r\n`;
        const link = document.createElement("a"); link.setAttribute("href", encodeURI(csv)); link.setAttribute("download", `Elite_Data_${rifaActualID}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function actualizarAdmin() {
        const cuerpo = document.getElementById('cuerpoTablaAdmin'); cuerpo.innerHTML = '';
        const modo = parseInt(configRifa.modoVenta || 1), precio = configRifa.precio || 0;
        const perTel = {};
        compradores.sort((a,b) => a.numero - b.numero).forEach(c => {
            if(!perTel[c.tel]) perTel[c.tel] = { pagado: c.pagado, n: 0 };
            perTel[c.tel].n++;
            cuerpo.innerHTML += `<tr><td>#${c.numero<10?"0"+c.numero:c.numero}</td><td>${c.nombre.substring(0,8)}</td><td><button onclick="marcarPago('${c.id}', ${c.pagado})" style="background:${c.pagado?'var(--success)':'var(--danger)'};color:white;border:none;border-radius:4px;">${c.pagado?'SI':'NO'}</button></td><td><button onclick="borrarP('${c.id}')" style="background:none; border:none;">🗑️</button></td></tr>`;
        });
        let ing = 0, deu = 0;
        Object.values(perTel).forEach(p => { 
            const monto = (Math.floor(p.n/modo) * precio);
            if(p.pagado) ing += monto; else deu += monto;
        });
        document.getElementById('db-caja').innerText = "$" + ing.toLocaleString();
        document.getElementById('db-deuda').innerText = "$" + deu.toLocaleString();
        document.getElementById('db-meta').innerText = "$" + (ing + deu).toLocaleString();
        document.getElementById('db-vendidos').innerText = compradores.length;
    }

    function guardarModoVenta() { db.ref('rifas_activas/'+rifaActualID+'/config/modoVenta').set(document.getElementById('configModoVenta').value).then(()=>alert("Modo actualizado")); }
    function accesoAdmin() { if(prompt("Clave:")==="rifa2369") document.getElementById('adminPanel').style.display='block'; }
    function volverInicio() { document.getElementById('rifaContenedor').style.display='none'; document.getElementById('adminPanel').style.display='none'; document.getElementById('pantallaInicio').style.display='block'; cargarLista(); }
    function actualizarVisuales() { const total = configRifa.total || 100, ocu = compradores.length; document.getElementById('txtDisponibles').innerText = total - ocu; document.getElementById('bar').style.width = Math.floor((ocu/total)*100) + "%"; }
    
    // Inicialización
    cargarLista();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo Lotería Nacional</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 600px; margin: auto; padding: 15px; background: #f0f2f5; color: #333; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Dashboard Admin */
        .dash { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; text-align: center; }
        .card b { display: block; font-size: 1.2em; color: #007bff; }

        /* Tablero */
        .grid-numeros { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); 
            gap: 8px; margin: 15px 0; max-height: 300px; overflow-y: auto; padding: 10px; border: 2px solid #eee; border-radius: 10px;
        }
        .numero { border: 1px solid #ddd; padding: 15px 5px; text-align: center; cursor: pointer; background: #fff; font-weight: bold; border-radius: 8px; transition: 0.2s; }
        .numero.seleccionado { background: #007bff !important; color: white; transform: scale(1.05); }
        .numero.ocupado { background: #e9ecef !important; color: #adb5bd !important; cursor: not-allowed; text-decoration: line-through; }

        /* Formularios y Botones */
        input, button { padding: 12px; width: 100%; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-success { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
        #adminPanel { display: none; margin-top: 30px; padding: 15px; border: 2px solid #dc3545; border-radius: 10px; background: #fffcfc; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .pago-si { color: #28a745; font-weight: bold; }
        .pago-no { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">🎟️ Reserva tu Número</h2>
    
    <div id="userForm">
        <input type="text" id="nombre" placeholder="Tu nombre completo">
        <input type="tel" id="telefono" placeholder="WhatsApp (10 dígitos)">
        <p style="font-size: 0.9em;">¿Deseas info de próximas rifas? 
            <input type="radio" name="info" value="si" checked> Sí 
            <input type="radio" name="info" value="no"> No
        </p>
        <div id="tablero" class="grid-numeros">Cargando tablero...</div>
        <button onclick="registrar()" class="btn-success">RESERVAR AHORA</button>
    </div>

    <button onclick="accesoAdmin()" style="margin-top:50px; background:none; border:none; color:#ccc; width:100%; cursor:pointer;">⚙️ Panel Organizador</button>

    <div id="adminPanel">
        <h3 style="color:#dc3545;">Panel de Control</h3>
        
        <div style="margin-bottom:15px;">
            <label>Precio por boleto: $</label>
            <input type="number" id="precioBoleto" value="100" style="width:80px;" onchange="actualizarUI()">
            <button onclick="verificarVencidos()" style="background:#ffc107; border:none; padding:5px; margin-top:5px;">⏰ Revisar Vencidos</button>
        </div>

        <div class="dash">
            <div class="card">Pagados <b id="dashPagados">0</b></div>
            <div class="card">Total $<b id="dashDinero">0</b></div>
        </div>

        <table>
            <thead>
                <tr><th>#</th><th>Nombre</th><th>Pago</th><th>Acción</th></tr>
            </thead>
            <tbody id="listaAdmin"></tbody>
        </table>
        <br>
        <button onclick="descargarCSV()" style="background:#17a2b8; color:white; border:none;">📥 Descargar Reporte</button>
    </div>
</div>

<script>
    // --- TU CONFIGURACIÓN DE FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M",
        authDomain: "rifa01-6ff39.firebaseapp.com",
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com",
        projectId: "rifa01-6ff39",
        storageBucket: "rifa01-6ff39.firebasestorage.app",
        messagingSenderId: "644348151229",
        appId: "1:644348151229:web:c71ed82967edecb6a7bed4",
        measurementId: "G-X287LPW130"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let numeroSeleccionado = null;
    let compradores = [];

    // --- ESCUCHAR LA NUBE EN TIEMPO REAL ---
    db.ref('rifa/participantes').on('value', (snapshot) => {
        compradores = [];
        const data = snapshot.val();
        for (let key in data) {
            compradores.push({ key, ...data[key] });
        }
        dibujarTablero();
        actualizarUI();
    });

    function dibujarTablero() {
        const tablero = document.getElementById('tablero');
        tablero.innerHTML = '';
        const ocupados = compradores.map(c => parseInt(c.numero));

        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            const esOcupado = ocupados.includes(i);
            div.className = 'numero' + (esOcupado ? ' ocupado' : '');
            div.innerText = i;
            if (!esOcupado) {
                div.onclick = () => {
                    document.querySelectorAll('.numero').forEach(n => n.classList.remove('seleccionado'));
                    div.classList.add('seleccionado');
                    numeroSeleccionado = i;
                };
            }
            tablero.appendChild(div);
        }
    }

    function registrar() {
        const nom = document.getElementById('nombre').value;
        const tel = document.getElementById('telefono').value;
        const info = document.querySelector('input[name="info"]:checked').value;

        if (!nom || !tel || !numeroSeleccionado) return alert("Llena tus datos y elige un número");

        const nuevoComprador = {
            nombre: nom,
            tel: tel,
            numero: numeroSeleccionado,
            info: info,
            pagado: false,
            fecha: new Date().getTime()
        };

        db.ref('rifa/participantes').push(nuevoComprador);
        alert("¡Número " + numeroSeleccionado + " reservado con éxito!");
        
        document.getElementById('nombre').value = "";
        document.getElementById('telefono').value = "";
        numeroSeleccionado = null;
    }

    function accesoAdmin() {
        if (prompt("Contraseña Admin:") === "1234") {
            document.getElementById('adminPanel').style.display = 'block';
        }
    }

    function actualizarUI() {
        const cuerpo = document.getElementById('listaAdmin');
        cuerpo.innerHTML = '';
        let pagadosCont = 0;
        const precio = document.getElementById('precioBoleto').value;

        compradores.forEach(u => {
            if(u.pagado) pagadosCont++;
            cuerpo.innerHTML += `
                <tr>
                    <td><b>${u.numero}</b></td>
                    <td>${u.nombre}</td>
                    <td class="${u.pagado ? 'pago-si' : 'pago-no'}">${u.pagado ? 'SÍ' : 'NO'}</td>
                    <td>
                        ${!u.pagado ? `<button onclick="marcarPago('${u.key}')" style="width:auto; padding:3px;">$</button>` : ''}
                        <button onclick="eliminar('${u.key}')" style="width:auto; padding:3px; background:red; color:white;">X</button>
                    </td>
                </tr>`;
        });

        document.getElementById('dashPagados').innerText = pagadosCont;
        document.getElementById('dashDinero').innerText = pagadosCont * precio;
    }

    function marcarPago(key) {
        db.ref('rifa/participantes/' + key).update({ pagado: true });
    }

    function eliminar(key) {
        if(confirm("¿Liberar este número?")) db.ref('rifa/participantes/' + key).remove();
    }

    function verificarVencidos() {
        const hoy = new Date().getTime();
        const limite = 5 * 24 * 60 * 60 * 1000;
        let lista = "";
        compradores.forEach(u => {
            if (!u.pagado && (hoy - u.fecha) > limite) lista += `- ${u.nombre} (#${u.numero})\n`;
        });
        alert(lista ? "Vencidos (5 días sin pago):\n" + lista : "No hay vencidos.");
    }

    function descargarCSV() {
        let csv = "Numero,Nombre,Telefono,Pagado\n";
        compradores.forEach(u => csv += `${u.numero},${u.nombre},${u.tel},${u.pagado?'SI':'NO'}\n`);
        const blob = new Blob(["\ufeff", csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'rifa_reporte.csv';
        a.click();
    }
</script>
</body>
</html>

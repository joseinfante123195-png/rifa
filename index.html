<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos Elite 🍀</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --gold-light: #f1d592; --dark-100: #0f172a; --dark-200: #1e293b; --danger: #ff4d4d; --success: #22c55e; }
        body { background-color: var(--dark-100) !important; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: auto; background: var(--dark-200); border-radius: 25px; padding: 20px; border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        /* BOTÓN HISTORIAL PREMIUM */
        .btn-history-top { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 10px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; text-transform: uppercase; }

        .header { text-align: center; padding: 10px 0 20px 0; }
        .header h1 { color: var(--gold); font-size: 32px; margin: 0; letter-spacing: 2px; font-weight: 900; }

        /* CARDS */
        .grid-rifas { display: grid; gap: 20px; }
        .card-rifa { background: #1e293b; border-radius: 20px; overflow: hidden; border: 1px solid #334155; position: relative; cursor: pointer; transition: 0.3s; }
        .card-rifa:hover { border-color: var(--gold); }
        .card-rifa img { width: 100%; height: 230px; object-fit: cover; }
        .promo-badge { position: absolute; top: 15px; left: 15px; background: var(--danger); color: white; padding: 6px 15px; border-radius: 50px; font-weight: 900; font-size: 13px; z-index: 10; box-shadow: 0 0 15px rgba(255,0,0,0.5); }

        /* RELOJ REDISEÑADO */
        .timer-container { background: linear-gradient(180deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0.4) 100%); padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin: 15px 0; text-align: center; box-shadow: inset 0 0 15px rgba(212,175,55,0.1); }
        .timer-clock { font-size: 28px; font-weight: 900; color: var(--gold-light); font-family: 'Courier New', Courier, monospace; letter-spacing: 2px; text-shadow: 0 0 10px rgba(212,175,55,0.5); }

        /* TABLERO */
        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 8px; margin: 15px 0; max-height: 350px; overflow-y: auto; padding: 10px; background: #0f172a; border-radius: 15px; border: 1px solid #334155; }
        .numero { height: 50px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 10px; font-weight: bold; border: 1px solid #475569; transition: 0.2s; }
        .numero.seleccionado { background: var(--gold) !important; color: black; transform: scale(1.1); box-shadow: 0 0 15px var(--gold); }
        .numero.ocupado { opacity: 0.2; background: #000 !important; text-decoration: line-through; }

        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(45deg, var(--gold), #fbbf24); color: black; font-weight: 900; border: none; padding: 18px; border-radius: 15px; cursor: pointer; width: 100%; font-size: 16px; box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        
        #adminPanel, #historialSeccion { background: #f8fafc; color: #1e293b; display: none; margin-top: 30px; border-radius: 20px; }
        .admin-section { background: #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; color: #475569; display: block; margin-bottom: 4px; text-transform: uppercase; }
        
        .historial-card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 15px; border: 1px solid #ddd; }
        .historial-card img { width: 100%; height: 180px; object-fit: cover; }
    </style>
</head>
<body>

<div id="pantallaInicio" class="animate__animated animate__fadeIn">
    <div class="header">
        <h1>SORTEOS ELITE 🍀</h1>
        <p style="color: #94a3b8; font-size: 12px; margin: 5px 0 20px 0;">TU SUERTE EMPIEZA AQUÍ</p>
    </div>

    <button onclick="toggleHistorial()" class="btn-history-top">🏆 SALÓN DE GANADORES</button>

    <div id="gridRifasActivas" class="grid-rifas">Cargando sorteos...</div>
</div>

<div id="rifaContenedor" class="container animate__animated animate__fadeInUp">
    <button onclick="volverInicio()" style="background:none; color:#94a3b8; border:none; margin-bottom:10px; cursor:pointer; font-weight:bold;">✕ SALIR</button>
    <div id="badgePromoVer" class="promo-badge animate__animated animate__pulse animate__infinite"></div>
    <img id="premioImgVer" src="" style="width:100%; border-radius:20px; border: 2px solid var(--gold);">
    
    <div class="timer-container">
        <div style="font-size:11px; color:var(--gold); margin-bottom:5px; font-weight:bold;">🚨 SORTEO FINALIZA (8:00 PM):</div>
        <span id="relojCalculado" class="timer-clock">00:00:00:00</span>
    </div>

    <h2 id="tituloRifa" style="margin:10px 0; color:var(--gold-light); text-align:center;"></h2>
    <p id="precioInfo" style="font-size: 28px; font-weight: 900; color:var(--success); margin:0; text-align:center;"></p>
    
    <div style="margin-top:20px;">
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="tel" id="telefono" placeholder="WhatsApp">
        <div id="tablero" class="grid-numeros"></div>
        <button onclick="registrar()" class="btn-gold">APARTAR MI NÚMERO 🚀</button>
    </div>
</div>

<div id="historialSeccion" class="container">
    <button onclick="volverInicio()" style="background:none; border:none; color:#1e293b; font-weight:bold; cursor:pointer; margin-bottom:10px;">← VOLVER</button>
    <h2 style="text-align:center;">🏆 NUESTROS GANADORES</h2>
    <div id="listaHistorial"></div>
</div>

<button onclick="accesoAdmin()" style="opacity:0.03; margin-top:80px; width:100%; height:40px; border:none;">ADMIN</button>

<div id="adminPanel" class="container">
    <h2 style="text-align:center;">🛠 CONFIGURAR RIFA</h2>
    <div class="admin-section">
        <label>Nombre de Rifa</label>
        <input style="background:white; color:black;" type="text" id="confTitulo">
        <label>Foto URL</label>
        <input style="background:white; color:black;" type="text" id="confFoto">
        <label>Números totales</label>
        <input style="background:white; color:black;" type="number" id="confTotal">
        <label>Precio $</label>
        <input style="background:white; color:black;" type="number" id="confPrecio">
        <label>Texto Promo (Ej: 30% OFF)</label>
        <input style="background:white; color:black;" type="text" id="confPromo">
        <label>Fecha del Sorteo</label>
        <input style="background:white; color:black;" type="date" id="confFecha">
        <button onclick="guardarConfig()" class="btn-gold">💾 ACTUALIZAR SORTEO</button>
    </div>
    <div class="admin-section" style="background:#fee2e2; text-align:center;">
        <p>Gestionando: <b id="adminRifaNombre">-</b></p>
        <input style="background:white; color:black;" type="text" id="histGanador" placeholder="Nombre Ganador">
        <input style="background:white; color:black;" type="text" id="histFoto" placeholder="Foto Entrega">
        <button onclick="finalizarRifa()" style="background:orange; color:white; border:none; padding:10px; width:100%; border-radius:10px; font-weight:bold; margin-bottom:5px;">✅ CERRAR Y MANDAR A HISTORIAL</button>
        <button onclick="borrarSinHistorial()" style="background:red; color:white; border:none; padding:10px; border-radius:10px; width:100%; font-weight:bold;">🗑️ ELIMINAR POR ERROR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M",
        authDomain: "rifa01-6ff39.firebaseapp.com",
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com",
        projectId: "rifa01-6ff39",
        storageBucket: "rifa01-6ff39.firebasestorage.app",
        messagingSenderId: "644348151229",
        appId: "1:644348151229:web:c71ed82967edecb6a7bed4",
        measurementId: "G-X287LPW130"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let rifaActualID = "", numeroSeleccionado = null, compradores = [], configRifa = {}, timerInterval;

    db.ref('rifas_activas').on('value', snap => {
        const grid = document.getElementById('gridRifasActivas');
        grid.innerHTML = '';
        const data = snap.val();
        if(!data) return;
        for(let id in data) {
            grid.innerHTML += `
                <div class="card-rifa animate__animated animate__zoomIn" onclick="abrirRifa('${id}')">
                    ${data[id].config.promo ? `<div class="promo-badge">${data[id].config.promo} 🔥</div>` : ''}
                    <img src="${data[id].config.foto}">
                    <div style="padding:15px; text-align:center;">
                        <h3 style="margin:0; color:var(--gold-light)">${id}</h3>
                        <p style="color:var(--success); font-weight:900; margin:5px 0; font-size:18px;">$${data[id].config.precio} MXN</p>
                    </div>
                </div>`;
        }
    });

    db.ref('global_historial').on('value', snap => {
        const lista = document.getElementById('listaHistorial');
        lista.innerHTML = '';
        const data = snap.val();
        if(!data) return;
        for(let k in data) {
            lista.innerHTML += `
                <div class="historial-card">
                    <img src="${data[k].foto}">
                    <div style="padding:15px; text-align:center;">
                        <h3 style="margin:0;">🏆 ${data[k].premio}</h3>
                        <p style="margin:5px 0;">Ganador: <b>${data[k].ganador}</b></p>
                    </div>
                </div>`;
        }
    });

    function abrirRifa(id) {
        rifaActualID = id;
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'block';
        
        db.ref('rifas_activas/'+id+'/config').on('value', snap => {
            configRifa = snap.val();
            if(!configRifa) return;
            document.getElementById('tituloRifa').innerText = id;
            document.getElementById('premioImgVer').src = configRifa.foto;
            document.getElementById('precioInfo').innerText = "$"+configRifa.precio;
            
            const b = document.getElementById('badgePromoVer');
            b.style.display = configRifa.promo ? "block" : "none";
            b.innerText = (configRifa.promo || "") + " 🔥";
            
            document.getElementById('adminRifaNombre').innerText = id;
            document.getElementById('confTitulo').value = id;
            document.getElementById('confFoto').value = configRifa.foto;
            document.getElementById('confTotal').value = configRifa.total;
            document.getElementById('confPrecio').value = configRifa.precio;
            document.getElementById('confPromo').value = configRifa.promo || "";
            document.getElementById('confFecha').value = configRifa.fechaSorteo || "";

            actualizarContador(configRifa.fechaSorteo);
            dibujarTablero();
        });

        db.ref('rifas_activas/'+id+'/participantes').on('value', snap => {
            compradores = [];
            const d = snap.val();
            for(let k in d) compradores.push({key:k, ...d[k]});
            dibujarTablero();
        });
    }

    function actualizarContador(f) {
        if(timerInterval) clearInterval(timerInterval);
        const reloj = document.getElementById('relojCalculado');
        function calcular() {
            if(!f) { reloj.innerText = "00:00:00:00"; return; }
            // FECHA FINAL CON HORA FIJA A LAS 8:00 PM (20:00)
            const fin = new Date(f + "T20:00:00").getTime();
            const ahora = new Date().getTime();
            const diff = fin - ahora;

            if(diff <= 0) {
                clearInterval(timerInterval);
                reloj.innerText = "¡TIEMPO AGOTADO! 🎰";
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            reloj.innerText = `${d.toString().padStart(2,'0')}:${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
        calcular();
        timerInterval = setInterval(calcular, 1000);
    }

    function dibujarTablero() {
        const tab = document.getElementById('tablero'); tab.innerHTML = '';
        const ocupados = compradores.map(c => parseInt(c.numero));
        for(let i=1; i<=configRifa.total; i++) {
            const div = document.createElement('div');
            const ocu = ocupados.includes(i);
            div.className = 'numero' + (ocu ? ' ocupado':'');
            div.innerText = i;
            if(!ocu) div.onclick = () => {
                document.querySelectorAll('.numero').forEach(n => n.classList.remove('seleccionado'));
                div.classList.add('seleccionado');
                numeroSeleccionado = i;
            };
            tab.appendChild(div);
        }
    }

    function registrar() {
        if(!numeroSeleccionado) return alert("Selecciona un número 🍀");
        const n = document.getElementById('nombre').value, t = document.getElementById('telefono').value;
        if(!n || !t) return alert("Faltan datos");
        db.ref('rifas_activas/'+rifaActualID+'/participantes').push({nombre:n, tel:t, numero:numeroSeleccionado, pagado:false});
        const msg = `¡Hola! Aparté el # ${numeroSeleccionado} para ${rifaActualID}. Mi nombre: ${n}. ¿Cómo pago?`;
        window.open(`https://wa.me/523310711283?text=${encodeURIComponent(msg)}`, '_blank');
        numeroSeleccionado = null;
    }

    function guardarConfig() {
        const tit = document.getElementById('confTitulo').value;
        const fot = document.getElementById('confFoto').value;
        const tot = document.getElementById('confTotal').value;
        const pre = document.getElementById('confPrecio').value;
        const pro = document.getElementById('confPromo').value;
        const fec = document.getElementById('confFecha').value;
        if(!tit) return alert("El título es obligatorio.");
        db.ref('rifas_activas/'+tit+'/config').update({
            foto: fot, total: parseInt(tot), precio: parseInt(pre), promo: pro, fechaSorteo: fec
        }).then(() => { alert("✅ Sorteo Actualizado"); location.reload(); });
    }

    function finalizarRifa() {
        const gan = document.getElementById('histGanador').value;
        const fot = document.getElementById('histFoto').value;
        if(!gan || !fot) return alert("Necesitas nombre y foto del ganador.");
        db.ref('global_historial').push({premio: rifaActualID, ganador: gan, foto: fot});
        db.ref('rifas_activas/'+rifaActualID).remove();
        alert("¡Éxito! Rifa enviada al historial.");
        volverInicio();
    }

    function volverInicio() { location.reload(); }
    function toggleHistorial() {
        document.getElementById('pantallaInicio').style.display='none';
        document.getElementById('historialSeccion').style.display='block';
    }
    function accesoAdmin() { if(prompt("Pass:")==="1234") document.getElementById('adminPanel').style.display='block'; }
    function borrarSinHistorial() { if(confirm("¿Seguro?")) { db.ref('rifas_activas/'+rifaActualID).remove(); volverInicio(); } }
</script>
</body>
</html>

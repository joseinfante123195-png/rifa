<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifas El Tapatío 🍀</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #d4af37; --gold-light: #f1d592; --dark-bg: #0f172a; --card-bg: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; line-height: 1.6; }
        .container { max-width: 550px; margin: auto; }
        
        /* Encabezado y Pestañas */
        .header { text-align: center; padding: 20px 0; }
        .header h1 { color: var(--gold); margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 15px; border: 1px solid var(--gold); border-radius: 12px; background: transparent; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab.active { background: var(--gold); color: black; }

        /* Tarjetas de Rifa */
        .rifa-card { background: var(--card-bg); border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid #334155; position: relative; cursor: pointer; display: flex; align-items: center; transition: transform 0.2s; }
        .rifa-card:active { transform: scale(0.98); }
        .rifa-card img { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; border: 2px solid var(--gold); }
        .rifa-details { margin-left: 15px; flex: 1; }
        .rifa-details h3 { margin: 0; color: var(--gold-light); }
        .price-tag { position: absolute; top: 0; right: 0; background: var(--gold); color: black; padding: 5px 15px; font-weight: 900; border-bottom-left-radius: 15px; font-size: 14px; }

        /* Pantalla de Selección (Tablero) */
        .grid-numbers { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 8px; background: #000; padding: 15px; border-radius: 15px; max-height: 350px; overflow-y: auto; margin: 15px 0; border: 1px solid #334155; }
        .n-box { height: 45px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 8px; font-weight: bold; cursor: pointer; border: 1px solid #475569; }
        .n-box.taken { opacity: 0.15; pointer-events: none; background: #000; }
        .n-box.selected { background: var(--gold) !important; color: black !important; box-shadow: 0 0 15px var(--gold); }

        /* Formularios y Botones */
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 10px; border: none; box-sizing: border-box; font-size: 16px; }
        .btn-main { background: linear-gradient(45deg, var(--gold), #fbbf24); color: black; font-weight: 900; padding: 18px; border: none; border-radius: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 16px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        
        /* Panel Admin Oculto */
        #adminArea, #loginArea { display: none; background: #f1f5f9; color: #0f172a; padding: 25px; border-radius: 25px; margin-top: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .admin-row { background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Rifas El Tapatío <span onclick="abrirLogin()" style="cursor:pointer; font-size: 20px;">🍀</span></h1>
    </div>

    <div id="vistaCliente">
        <div class="nav-tabs">
            <button id="tabActivas" class="tab active" onclick="switchView('rifas')">EN PROCESO</button>
            <button id="tabHistorial" class="tab" onclick="switchView('historial')">FINALIZADAS</button>
        </div>
        <div id="contenedorRifas"></div>
    </div>

    <div id="vistaDetalle" style="display:none;">
        <button onclick="regresar()" style="background:none; color:white; border:none; margin-bottom:15px; cursor:pointer;">❮ VOLVER AL LISTADO</button>
        <h2 id="detNombre" style="color:var(--gold); margin:0;"></h2>
        <img id="detImg" src="" style="width:100%; border-radius:20px; margin:15px 0; border:1px solid var(--gold);">
        
        <div id="zonaInteraccion">
            <p style="text-align:center; font-weight:bold; color:var(--gold-light);">Selecciona tus números:</p>
            <div id="tableroNumeros" class="grid-numbers"></div>
            <input type="text" id="clienteNombre" placeholder="Nombre Completo">
            <input type="tel" id="clienteTel" placeholder="WhatsApp (10 dígitos)">
            <button onclick="procesarApartado()" class="btn-main">APARTAR BOLETOS 🚀</button>
        </div>

        <div id="zonaGanador" style="display:none; background:rgba(34,197,94,0.1); border:2px solid var(--success); padding:20px; border-radius:20px; text-align:center;">
            <h2 style="color:var(--success); margin:0;">🏆 ¡TENEMOS GANADOR! 🏆</h2>
            <p id="nombreGanador" style="font-size:24px; font-weight:900; margin:15px 0;"></p>
        </div>
    </div>

    <div id="loginArea">
        <h2 style="margin-top:0">Acceso Privado</h2>
        <input type="email" id="logEmail" placeholder="Correo Electrónico">
        <input type="password" id="logPass" placeholder="Contraseña">
        <button onclick="intentarLogin()" class="btn-main">ENTRAR AL SISTEMA</button>
        <button onclick="cerrarAdmin()" style="width:100%; background:none; border:none; margin-top:10px; color:#64748b;">Cancelar</button>
    </div>

    <div id="adminArea">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0">Panel Maestro</h2>
            <button onclick="salirAdmin()" style="padding:5px 15px; border-radius:8px;">Cerrar Sesión</button>
        </div>
        
        <div style="background:#e2e8f0; padding:15px; border-radius:15px; margin-bottom:25px;">
            <h4 style="margin-top:0">Nueva Rifa / Editar</h4>
            <input type="text" id="admNom" placeholder="Nombre del Premio">
            <input type="number" id="admTot" placeholder="Cant. Números (ej. 100)">
            <input type="number" id="admPre" placeholder="Precio $">
            <input type="text" id="admFot" placeholder="URL de la Foto">
            <button onclick="guardarCambios()" class="btn-gold" style="width:100%; padding:12px; background:black; color:white; border-radius:10px; cursor:pointer;">PUBLICAR EN APP</button>
        </div>

        <h4>Ventas y Pagos Actuales</h4>
        <div id="adminVentasList"></div>
    </div>
</div>

<script>
    // 1. CONFIGURACIÓN ÚNICA
    const firebaseConfig = { 
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M", 
        authDomain: "rifa01-6ff39.firebaseapp.com", 
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com", 
        projectId: "rifa01-6ff39" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let modoActual = "rifas"; 
    let rifaID = "";
    let misSeleccionados = [];

    // 2. LÓGICA DE NAVEGACIÓN
    function switchView(v) {
        modoActual = v;
        document.getElementById('tabActivas').classList.toggle('active', v === 'rifas');
        document.getElementById('tabHistorial').classList.toggle('active', v === 'historial');
        renderizarLista();
    }

    function renderizarLista() {
        db.ref(modoActual).on('value', snap => {
            const list = document.getElementById('contenedorRifas');
            list.innerHTML = '';
            if(!snap.exists()) { list.innerHTML = '<p style="text-align:center; color:#64748b;">No hay rifas aquí.</p>'; return; }
            snap.forEach(item => {
                const c = item.val().config;
                list.innerHTML += `
                    <div class="rifa-card" onclick="abrirRifa('${item.key}')">
                        <div class="price-tag">$${c.precio}</div>
                        <img src="${c.foto}">
                        <div class="rifa-details">
                            <h3>${item.key}</h3>
                            <small>${modoActual === 'rifas' ? '🟢 Disponible' : '🔴 Finalizada'}</small>
                        </div>
                    </div>`;
            });
        });
    }

    function abrirRifa(id) {
        rifaID = id;
        document.getElementById('vistaCliente').style.display = 'none';
        document.getElementById('vistaDetalle').style.display = 'block';
        db.ref(modoActual + '/' + id).on('value', snap => {
            const data = snap.val();
            document.getElementById('detNombre').innerText = id;
            document.getElementById('detImg').src = data.config.foto;
            
            if(modoActual === 'rifas') {
                document.getElementById('zonaInteraccion').style.display = 'block';
                document.getElementById('zonaGanador').style.display = 'none';
                construirTablero(data.config.total, data.participantes || {});
            } else {
                document.getElementById('zonaInteraccion').style.display = 'none';
                document.getElementById('zonaGanador').style.display = 'block';
                document.getElementById('nombreGanador').innerText = data.config.ganador || "Ganador no registrado";
            }
        });
    }

    function construirTablero(total, parts) {
        const grid = document.getElementById('tableroNumeros'); grid.innerHTML = '';
        const tks = Object.keys(parts);
        for(let i=0; i<total; i++) {
            const n = i.toString().padStart(2, '0');
            const box = document.createElement('div');
            box.className = 'n-box' + (tks.includes(n) ? ' taken' : '');
            box.innerText = n;
            if(!tks.includes(n)) {
                box.onclick = () => {
                    box.classList.toggle('selected');
                    const idx = misSeleccionados.indexOf(n);
                    if(idx > -1) misSeleccionados.splice(idx, 1); else misSeleccionados.push(n);
                };
            }
            grid.appendChild(box);
        }
    }

    function procesarApartado() {
        const n = document.getElementById('clienteNombre').value;
        const t = document.getElementById('clienteTel').value;
        if(!n || !t || misSeleccionados.length === 0) return alert("Por favor completa tus datos y elige números.");
        
        misSeleccionados.forEach(num => {
            db.ref('rifas/'+rifaID+'/participantes/'+num).set({ nombre: n, tel: t, pagado: false });
        });
        alert("¡Éxito! Tus números han sido apartados.");
        misSeleccionados = []; regresar();
    }

    function regresar() { document.getElementById('vistaCliente').style.display = 'block'; document.getElementById('vistaDetalle').style.display = 'none'; }

    // 3. SECCIÓN ADMINISTRATIVA (BLINDADA)
    function abrirLogin() { document.getElementById('loginArea').style.display = 'block'; }
    function cerrarAdmin() { document.getElementById('loginArea').style.display = 'none'; }

    function intentarLogin() {
        const e = document.getElementById('logEmail').value;
        const p = document.getElementById('logPass').value;
        auth.signInWithEmailAndPassword(e, p).then(() => {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('adminArea').style.display = 'block';
            gestionarVentas();
        }).catch(() => alert("Acceso denegado. Solo el dueño puede entrar."));
    }

    function guardarCambios() {
        const n = document.getElementById('admNom').value;
        const c = {
            total: parseInt(document.getElementById('admTot').value),
            precio: parseInt(document.getElementById('admPre').value),
            foto: document.getElementById('admFot').value
        };
        db.ref('rifas/'+n+'/config').set(c).then(() => alert("Rifa publicada correctamente")).catch(() => alert("Error: No tienes permisos."));
    }

    function gestionarVentas() {
        db.ref('rifas').on('value', snap => {
            const list = document.getElementById('adminVentasList'); list.innerHTML = '';
            snap.forEach(rifa => {
                const ps = rifa.val().participantes;
                if(ps) {
                    list.innerHTML += `<div style="margin-top:15px; border-bottom:2px solid #cbd5e1"><strong>RIFA: ${rifa.key}</strong></div>`;
                    Object.entries(ps).forEach(([num, info]) => {
                        list.innerHTML += `
                            <div class="admin-row">
                                <span>#${num} - ${info.nombre}</span>
                                <div>
                                    <button onclick="togglePago('${rifa.key}','${num}',${info.pagado})" style="background:${info.pagado?'#22c55e':'#ef4444'}; color:white; border:none; padding:5px 10px; border-radius:5px;">${info.pagado?'PAGADO':'DEBE'}</button>
                                    <button onclick="quitar('${rifa.key}','${num}')" style="margin-left:5px;">🔓</button>
                                </div>
                            </div>`;
                    });
                    list.innerHTML += `<button onclick="moverAHistorial('${rifa.key}')" style="background:#0f172a; color:white; width:100%; padding:10px; border-radius:8px; margin-top:5px;">FINALIZAR Y PONER GANADOR</button>`;
                }
            });
        });
    }

    function togglePago(r, n, s) { db.ref('rifas/'+r+'/participantes/'+n).update({ pagado: !s }); }
    function quitar(r, n) { if(confirm("¿Liberar número?")) db.ref('rifas/'+r+'/participantes/'+n).remove(); }

    function moverAHistorial(id) {
        const g = prompt("Escribe el nombre del ganador de la rifa " + id + ":");
        if(!g) return;
        db.ref('rifas/'+id).once('value', snap => {
            const data = snap.val();
            data.config.ganador = g;
            db.ref('historial/'+id).set(data).then(() => {
                db.ref('rifas/'+id).remove();
                alert("Rifa enviada al historial.");
            });
        });
    }

    function salirAdmin() { auth.signOut().then(() => location.reload()); }

    // INICIAR APP
    renderizarLista();
</script>
</body>
</html>

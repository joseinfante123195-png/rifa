<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍀 RIFAS EL TAPATÍO 🍀</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --gold-light: #f1d592; --dark-100: #0f172a; --dark-200: #1e293b; --success: #22c55e; --danger: #ff4d4d; --info: #3b82f6; }
        body { background-color: var(--dark-100) !important; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: var(--dark-200); border-radius: 20px; padding: 15px; border: 1px solid #334155; }
        
        /* LOGO Y CABECERA */
        .logo-header { text-align: center; padding: 30px 15px; }
        .trebol-img { width: 100px; height: auto; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5)); animation: jump 2s ease-in-out infinite; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .titulo-rifas { color: var(--gold); font-size: 32px; font-weight: 900; letter-spacing: 4px; margin: 0; }
        .titulo-tapatio { color: #fff; font-size: 26px; font-weight: 800; letter-spacing: 2px; }
        .trebol-admin { cursor: pointer; width: 22px; vertical-align: middle; margin-left: 5px; }

        /* RIFAS CARD */
        .rifa-card { background: #1e293b; border-radius: 15px; padding: 12px; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; border: 1px solid #334155; position: relative; }
        .rifa-card img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; border: 1px solid var(--gold); }
        .rifa-info { margin-left: 15px; flex: 1; }
        .rifa-badge { position: absolute; top: 0; right: 0; background: var(--gold); color: black; font-size: 10px; padding: 5px 12px; font-weight: bold; border-bottom-left-radius: 12px; }

        /* TABS */
        .tabs-tapatio { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn-tapatio { flex: 1; background: #1e293b; color: white; border: 1px solid var(--gold); padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tab-btn-tapatio.active { background: var(--gold); color: black; }

        /* TABLERO NUMEROS */
        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 6px; max-height: 300px; overflow-y: auto; padding: 10px; background: #0f172a; border-radius: 12px; }
        .numero { height: 40px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 6px; font-weight: bold; cursor: pointer; border: 1px solid #475569; }
        .numero.ocupado { opacity: 0.2; background: #000; pointer-events: none; }
        .numero.seleccionado { background: var(--gold) !important; color: black !important; }

        /* ADMIN */
        #adminPanel { background: #f8fafc; color: #1e293b; border-radius: 20px; padding: 15px; display: none; position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh; z-index: 100; box-sizing: border-box; }
        .admin-nav-btn { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ddd; background: white; font-weight: bold; margin-bottom: 10px; text-align: left; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: black; font-weight: bold; padding: 15px; border: none; border-radius: 10px; width: 100%; cursor: pointer; }
        
        .progress-container { background: #0f172a; border-radius: 10px; height: 8px; margin-top: 8px; overflow: hidden; }
        .progress-bar { background: var(--gold); height: 100%; transition: 0.5s; }
    </style>
</head>
<body>

<div id="pantallaInicio" class="container">
    <div class="logo-header">
        <img src="https://i.ibb.co/LdGfPst/636791.png" class="trebol-img">
        <div class="titulo-rifas">RIFAS</div>
        <div class="titulo-tapatio">EL TAPATÍO <img src="https://i.ibb.co/LdGfPst/636791.png" class="trebol-admin" onclick="accesoAdmin()"></div>
    </div>

    <div class="tabs-tapatio">
        <button id="btnTabActivas" class="tab-btn-tapatio active" onclick="cambiarSeccion('activas')">Activas</button>
        <button id="btnTabHistorial" class="tab-btn-tapatio" onclick="cambiarSeccion('historial')">Historial</button>
    </div>
    <div id="listaRifas"></div>
</div>

<div id="rifaContenedor" class="container" style="display:none;">
    <button onclick="volverInicio()" style="background:none; color:white; border:none; margin-bottom:10px;">❮ VOLVER</button>
    <div id="contenidoRifa">
        <img id="premioImgVer" style="width:100%; border-radius:15px; margin-bottom:10px;">
        <h2 id="tituloRifa" style="color:var(--gold); text-align:center;"></h2>
        <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
        <p id="txtStatus" style="text-align:center; font-size:12px;"></p>
        
        <div id="seccionCompra">
            <input type="text" id="nombre" placeholder="Tu Nombre">
            <input type="tel" id="telefono" placeholder="WhatsApp">
            <div id="tablero" class="grid-numeros"></div>
            <button onclick="registrarApartado()" class="btn-gold" style="margin-top:15px;">APARTAR LUGAR</button>
        </div>
    </div>
</div>

<div id="adminPanel">
    <div style="display:flex; justify-content:space-between;">
        <h3>⚙️ ADMINISTRACIÓN</h3>
        <button onclick="volverInicio()">CERRAR</button>
    </div>
    
    <div id="menuAdmin">
        <button class="admin-nav-btn" onclick="verSeccionAdmin('crear')">+ NUEVA RIFA</button>
        <button class="admin-nav-btn" onclick="verSeccionAdmin('gestionar')">📊 GESTIONAR ACTIVAS</button>
    </div>

    <div id="sec-crear" style="display:none;">
        <h4>Crear Rifa</h4>
        <input type="text" id="newNombre" placeholder="Nombre del Premio">
        <input type="number" id="newPrecio" placeholder="Precio boleto">
        <input type="number" id="newTotal" placeholder="Total boletos (ej. 100)">
        <input type="text" id="newFoto" placeholder="Link de Imagen (ImgBB)">
        <button class="btn-gold" onclick="guardarNuevaRifa()">PUBLICAR RIFA</button>
    </div>

    <div id="sec-gestionar" style="display:none;">
        <h4>Rifas en curso</h4>
        <div id="listaAdminRifas"></div>
    </div>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = { 
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M", 
        authDomain: "rifa01-6ff39.firebaseapp.com", 
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com", 
        projectId: "rifa01-6ff39" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let rifaActualID = "", seleccionados = [], vistaActiva = 'activas';

    // CARGAR RIFAS EN INICIO
    function cargarLista() {
        const path = vistaActiva === 'activas' ? 'rifas_activas' : 'historial_rifas';
        db.ref(path).on('value', snap => {
            const container = document.getElementById('listaRifas');
            container.innerHTML = '';
            const data = snap.val();
            if(!data) { container.innerHTML = "<p style='text-align:center'>No hay rifas disponibles</p>"; return; }
            
            for(let id in data) {
                const conf = data[id].config;
                const apartados = data[id].participantes ? Object.keys(data[id].participantes).length : 0;
                const porc = (apartados / conf.total) * 100;
                
                container.innerHTML += `
                    <div class="rifa-card" onclick="abrirRifa('${id}')">
                        <div class="rifa-badge">$${conf.precio}</div>
                        <img src="${conf.foto}">
                        <div class="rifa-info">
                            <h4 style="margin:0">${id}</h4>
                            <div class="progress-container"><div class="progress-bar" style="width:${porc}%"></div></div>
                        </div>
                    </div>`;
            }
        });
    }

    function abrirRifa(id) {
        rifaActualID = id;
        seleccionados = [];
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'block';
        
        db.ref('rifas_activas/' + id).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            document.getElementById('tituloRifa').innerText = id;
            document.getElementById('premioImgVer').src = data.config.foto;
            
            const apartados = data.participantes ? Object.values(data.participantes).map(p => parseInt(p.numero)) : [];
            dibujarTablero(data.config.total, apartados);
        });
    }

    function dibujarTablero(total, ocupados) {
        const tab = document.getElementById('tablero');
        tab.innerHTML = '';
        for(let i=0; i<total; i++) {
            const div = document.createElement('div');
            div.className = 'numero' + (ocupados.includes(i) ? ' ocupado' : (seleccionados.includes(i) ? ' seleccionado' : ''));
            div.innerText = i.toString().padStart(2, '0');
            if(!ocupados.includes(i)) {
                div.onclick = () => {
                    if(seleccionados.includes(i)) seleccionados = seleccionados.filter(n => n !== i);
                    else seleccionados.push(i);
                    dibujarTablero(total, ocupados);
                };
            }
            tab.appendChild(div);
        }
    }

    function registrarApartado() {
        const nombre = document.getElementById('nombre').value;
        const tel = document.getElementById('telefono').value;
        if(!nombre || !tel || seleccionados.length === 0) return alert("Llena tus datos y elige número");

        seleccionados.forEach(num => {
            db.ref(`rifas_activas/${rifaActualID}/participantes`).push({ nombre, whatsapp: tel, numero: num });
        });
        alert("¡Números apartados con éxito!");
        volverInicio();
    }

    // FUNCIONES ADMIN
    function accesoAdmin() { if(prompt("Contraseña:") === "rifa2369") document.getElementById('adminPanel').style.display = 'block'; }
    
    function verSeccionAdmin(sec) {
        document.getElementById('sec-crear').style.display = sec === 'crear' ? 'block' : 'none';
        document.getElementById('sec-gestionar').style.display = sec === 'gestionar' ? 'block' : 'none';
        if(sec === 'gestionar') cargarAdminRifas();
    }

    function guardarNuevaRifa() {
        const nombre = document.getElementById('newNombre').value;
        const precio = document.getElementById('newPrecio').value;
        const total = document.getElementById('newTotal').value;
        const foto = document.getElementById('newFoto').value;

        if(!nombre || !precio || !total || !foto) return alert("Completa todos los campos");

        db.ref('rifas_activas/' + nombre).set({
            config: { precio, total, foto, activa: true }
        }).then(() => {
            alert("Rifa creada!");
            verSeccionAdmin('gestionar');
        });
    }

    function cargarAdminRifas() {
        db.ref('rifas_activas').on('value', snap => {
            const container = document.getElementById('listaAdminRifas');
            container.innerHTML = '';
            const data = snap.val();
            for(let id in data) {
                container.innerHTML += `
                    <div style="background:white; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ccc">
                        <b>${id}</b>
                        <button onclick="eliminarRifa('${id}')" style="background:red; color:white; float:right;">Borrar</button>
                    </div>`;
            }
        });
    }

    function eliminarRifa(id) { if(confirm("¿Seguro que quieres borrarla?")) db.ref('rifas_activas/' + id).remove(); }

    function volverInicio() {
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'none';
        document.getElementById('pantallaInicio').style.display = 'block';
    }

    function cambiarSeccion(t) {
        vistaActiva = t;
        document.getElementById('btnTabActivas').className = t === 'activas' ? 'tab-btn-tapatio active' : 'tab-btn-tapatio';
        document.getElementById('btnTabHistorial').className = t === 'historial' ? 'tab-btn-tapatio active' : 'tab-btn-tapatio';
        cargarLista();
    }

    cargarLista();
</script>
</body>
</html>

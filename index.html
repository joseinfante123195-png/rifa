<style>
:root { 
    --gold: #d4af37; 
    --gold-light: #f1d592; 
    --dark-100: #020617; 
    --dark-200: #0f172a; 
    --card: #1e293b;
    --success: #22c55e; 
    --danger: #ef4444; 
    --info: #3b82f6; 
}

/* FONDO MÁS PRO */
body { 
    background: linear-gradient(135deg,#020617,#0f172a) !important; 
    color: #f8fafc; 
    font-family: 'Segoe UI', sans-serif; 
}

/* CONTENEDOR */
.container { 
    max-width: 600px; 
    margin: auto; 
    background: transparent;
}

/* TARJETAS RIFA */
.rifa-card { 
    background: linear-gradient(145deg,#1e293b,#0f172a);
    border-radius: 15px; 
    padding: 12px; 
    cursor: pointer; 
    margin-bottom: 15px; 
    display: flex; 
    align-items: center; 
    border: 1px solid #1e293b;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    transition: 0.3s;
}
.rifa-card:hover { transform: scale(1.02); }

/* IMAGEN */
.rifa-card img { 
    width: 95px; 
    height: 95px; 
    border-radius: 10px; 
    object-fit: cover; 
    border: 2px solid var(--gold); 
}

/* INFO */
.rifa-info h4 {
    font-size:16px;
}

/* BOTONES */
.btn-gold { 
    background: linear-gradient(45deg,var(--gold),#fbbf24); 
    color: black; 
    font-weight: 900; 
    border: none; 
    padding: 16px; 
    border-radius: 12px; 
    cursor: pointer; 
    width: 100%;
    font-size:16px;
    box-shadow: 0 5px 20px rgba(212,175,55,0.5);
    transition:0.3s;
}
.btn-gold:hover { transform: scale(1.03); }

/* BOTÓN AZAR */
.btn-azar {
    background: #0f172a;
    border: 1px solid var(--gold);
    box-shadow: 0 0 10px rgba(212,175,55,0.3);
}

/* NUMEROS */
.numero { 
    height: 40px; 
    background: #1e293b; 
    border-radius: 8px; 
    border: 1px solid #334155; 
    transition:0.2s;
}
.numero:hover { transform: scale(1.1); }

.numero.seleccionado { 
    background: var(--gold) !important; 
    color: black !important; 
    box-shadow: 0 0 10px var(--gold);
}

/* PROGRESS */
.progress-container { 
    background: #020617; 
    border-radius: 10px; 
    height: 10px; 
    overflow: hidden; 
}
.progress-bar { 
    background: linear-gradient(90deg,var(--gold),#fbbf24); 
}

/* ADMIN PANEL MÁS LIMPIO */
#adminPanel { 
    background: #f8fafc; 
    border-radius: 20px; 
}

/* INPUTS */
input, select, textarea { 
    background:#f8fafc;
    border-radius: 10px; 
}

/* EFECTO PREMIUM */
.rifa-card::after {
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.05),transparent);
    opacity:0;
    transition:0.5s;
}
.rifa-card:hover::after { opacity:1; }

</style>

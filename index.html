<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifas El Tapatío 🍀</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #d4af37; --dark: #0f172a; --card: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        
        /* Pestañas (Tabs) */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--gold); background: none; color: white; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: black; }

        /* Tarjetas de Rifa */
        .rifa-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; position: relative; cursor: pointer; display: flex; align-items: center; }
        .rifa-card img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; margin-right: 15px; border: 1px solid var(--gold); }
        .badge { position: absolute; top: 0; right: 0; background: var(--gold); color: black; padding: 4px 10px; font-size: 11px; font-weight: bold; border-bottom-left-radius: 10px; }

        /* Tablero */
        .grid-nums { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 5px; background: #000; padding: 10px; border-radius: 10px; max-height: 250px; overflow-y: auto; }
        .num { height: 35px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .num.ocupado { opacity: 0.2; pointer-events: none; }
        .num.selected { background: var(--gold); color: black; }

        /* Formularios */
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; box-sizing: border-box; background: #f8fafc; color: #1e293b; }
        .btn-gold { background: var(--gold); color: black; font-weight: bold; padding: 15px; border: none; border-radius: 10px; width: 100%; cursor: pointer; margin-top: 10px; }
        #adminPanel, #loginPanel { display: none; background: #f8fafc; color: #1e293b; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .admin-item { border-bottom: 1px solid #ddd; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--gold)">RIFAS EL TAPATÍO <span onclick="mostrarLogin()" style="cursor:pointer">🍀</span></h1>
    
    <div id="vistaPrincipal">
        <div class="tabs">
            <button id="btnActivas" class="tab-btn active" onclick="cambiarVista('rifas')">EN PROCESO</button>
            <button id="btnHistorial" class="tab-btn" onclick="cambiarVista('historial')">HISTORIAL</button>
        </div>
        <div id="listaRifas"></div>
    </div>

    <div id="detalleRifa" style="display:none;">
        <button onclick="volver()" style="color:white; background:none; border:none; margin-bottom:10px; cursor:pointer;">❮ Volver</button>
        <h2 id="t-nombre" style="color:var(--gold); margin: 5px 0;"></h2>
        <img id="t-img" style="width:100%; border-radius:15px; margin-bottom:15px;">
        
        <div id="seccionCompra">
            <div id="tablero" class="grid-nums"></div>
            <div style="margin-top:20px;">
                <input type="text" id="u-nom" placeholder="Tu nombre">
                <input type="tel" id="u-tel" placeholder="Tu WhatsApp">
                <button onclick="apartar()" class="btn-gold">APARTAR NÚMEROS 🚀</button>
            </div>
        </div>

        <div id="seccionGanador" style="display:none; background:rgba(34, 197, 94, 0.2); padding:15px; border-radius:15px; border:1px solid var(--success); text-align:center;">
            <h3 style="color:var(--success); margin:0;">🏆 GANADOR 🏆</h3>
            <p id="txtGanador" style="font-size:20px; font-weight:bold; margin:10px 0;"></p>
        </div>
    </div>

    <div id="loginPanel">
        <h3 style="margin-top:0">Acceso Dueño</h3>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()" class="btn-gold">Entrar</button>
        <button onclick="cerrarPaneles()" style="width:100%; border:none; background:none; margin-top:10px; cursor:pointer;">Cancelar</button>
    </div>

    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0">Panel Admin ✅</h3>
            <button onclick="logout()" style="font-size:10px;">Salir</button>
        </div>
        <hr>
        <h4>Crear / Editar</h4>
        <input type="text" id="a-nom" placeholder="Nombre (ej: Camioneta)">
        <input type="number" id="a-tot" placeholder="Total números">
        <input type="number" id="a-pre" placeholder="Precio ($)">
        <input type="text" id="a-fot" placeholder="URL Imagen">
        <button onclick="guardarRifa()" class="btn-gold">GUARDAR RIFA</button>
        
        <h4 style="margin-top:20px;">Gestión de Pagos</h4>
        <div id="adminVentas"></div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M", 
        authDomain: "rifa01-6ff39.firebaseapp.com", 
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com", 
        projectId: "rifa01-6ff39" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let vistaActual = "rifas"; 
    let rifaActiva = "";
    let seleccionados = [];

    // --- CARGAR LISTAS ---
    function cambiarVista(v) {
        vistaActual = v;
        document.getElementById('btnActivas').classList.toggle('active', v === 'rifas');
        document.getElementById('btnHistorial').classList.toggle('active', v === 'historial');
        cargarDatos();
    }

    function cargarDatos() {
        db.ref(vistaActual).on('value', s => {
            const list = document.getElementById('listaRifas');
            list.innerHTML = '';
            s.forEach(h => {
                const c = h.val().config;
                list.innerHTML += `
                    <div class="rifa-card" onclick="verRifa('${h.key}')">
                        <div class="badge">$${c.precio}</div>
                        <img src="${c.foto}">
                        <div class="info"><strong>${h.key}</strong><br><small>${vistaActual === 'rifas' ? 'En proceso' : 'Finalizada'}</small></div>
                    </div>`;
            });
        });
    }

    function verRifa(id) {
        rifaActiva = id;
        document.getElementById('vistaPrincipal').style.display = 'none';
        document.getElementById('detalleRifa').style.display = 'block';
        db.ref(vistaActual + '/' + id).on('value', s => {
            const d = s.val();
            document.getElementById('t-nombre').innerText = id;
            document.getElementById('t-img').src = d.config.foto;
            
            if(vistaActual === 'rifas') {
                document.getElementById('seccionCompra').style.display = 'block';
                document.getElementById('seccionGanador').style.display = 'none';
                dibujarTablero(d.config.total, d.participantes || {});
            } else {
                document.getElementById('seccionCompra').style.display = 'none';
                document.getElementById('seccionGanador').style.display = 'block';
                document.getElementById('txtGanador').innerText = "Ganador: " + (d.config.ganador || "Pendiente");
            }
        });
    }

    function dibujarTablero(total, parts) {
        const tab = document.getElementById('tablero'); tab.innerHTML = '';
        const ocupados = Object.keys(parts);
        for(let i=0; i<total; i++) {
            const n = i.toString().padStart(2, '0');
            const d = document.createElement('div');
            d.className = 'num' + (ocupados.includes(n) ? ' ocupado' : '');
            d.innerText = n;
            if(!ocupados.includes(n)) d.onclick = () => {
                d.classList.toggle('selected');
                const idx = seleccionados.indexOf(n);
                if(idx > -1) seleccionados.splice(idx, 1); else seleccionados.push(n);
            };
            tab.appendChild(d);
        }
    }

    function apartar() {
        const nom = document.getElementById('u-nom').value;
        const tel = document.getElementById('u-tel').value;
        if(!nom || !tel || seleccionados.length === 0) return alert("Faltan datos");
        seleccionados.forEach(n => {
            db.ref('rifas/'+rifaActiva+'/participantes/'+n).set({ nombre: nom, tel: tel, pagado: false });
        });
        alert("¡Números apartados!"); seleccionados = []; volver();
    }

    function volver() { document.getElementById('vistaPrincipal').style.display = 'block'; document.getElementById('detalleRifa').style.display = 'none'; }

    // --- ADMIN ---
    function mostrarLogin() { document.getElementById('loginPanel').style.display = 'block'; }
    function cerrarPaneles() { document.getElementById('loginPanel').style.display = 'none'; }

    function login() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value)
            .then(() => {
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                cargarAdminVentas();
            }).catch(() => alert("Error de acceso"));
    }

    function guardarRifa() {
        const n = document.getElementById('a-nom').value;
        const conf = {
            total: parseInt(document.getElementById('a-tot').value),
            precio: parseInt(document.getElementById('a-pre').value),
            foto: document.getElementById('a-fot').value
        };
        db.ref('rifas/'+n+'/config').set(conf).then(() => alert("Guardado")).catch(() => alert("Sin permiso"));
    }

    function cargarAdminVentas() {
        db.ref('rifas').on('value', s => {
            const cont = document.getElementById('adminVentas'); cont.innerHTML = '';
            s.forEach(rifa => {
                const p = rifa.val().participantes;
                if(p) {
                    cont.innerHTML += `<p><strong>${rifa.key}</strong></p>`;
                    Object.entries(p).forEach(([num, info]) => {
                        cont.innerHTML += `
                            <div class="admin-item">
                                <span>#${num} ${info.nombre}</span>
                                <div>
                                    <button onclick="pago('${rifa.key}','${num}',${info.pagado})" style="background:${info.pagado? 'green':'red'}; color:white; border:none; padding:5px; border-radius:5px;">${info.pagado?'SI':'NO'}</button>
                                    <button onclick="liberar('${rifa.key}','${num}')">🔓</button>
                                </div>
                            </div>`;
                    });
                    cont.innerHTML += `<button onclick="finalizar('${rifa.key}')" style="font-size:10px; color:blue;">Mover a Historial</button>`;
                }
            });
        });
    }

    function pago(rid, n, est) { db.ref('rifas/'+rid+'/participantes/'+n).update({ pagado: !est }); }
    function liberar(rid, n) { if(confirm("¿Liberar?")) db.ref('rifas/'+rid+'/participantes/'+n).remove(); }
    
    function finalizar(id) {
        const win = prompt("Nombre del Ganador:");
        if(!win) return;
        db.ref('rifas/'+id).once('value', s => {
            const data = s.val();
            data.config.ganador = win;
            db.ref('historial/'+id).set(data).then(() => {
                db.ref('rifas/'+id).remove();
                alert("Rifa movida al historial");
            });
        });
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    cargarDatos();
</script>
</body>
</html>

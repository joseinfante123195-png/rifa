<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifas El Tapatío 🍀</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #d4af37; --dark: #0f172a; --card: #1e293b; --accent: #38bdf8; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        
        /* Menú Principal */
        .main-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .nav-btn { flex: 1 1 45%; padding: 12px; border: 1px solid var(--gold); background: none; color: white; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .nav-btn.active { background: var(--gold); color: black; }

        /* Tarjetas */
        .rifa-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; position: relative; display: flex; align-items: center; }
        .rifa-card img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; margin-right: 15px; border: 1px solid var(--gold); }
        .status-badge { position: absolute; top: 0; right: 0; padding: 4px 10px; font-size: 10px; border-bottom-left-radius: 10px; font-weight: bold; }

        /* Formularios Admin */
        #panelAdmin { display: none; background: #f8fafc; color: #1e293b; padding: 20px; border-radius: 20px; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        /* Tablero Usuario */
        .grid-nums { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 5px; background: #000; padding: 10px; border-radius: 10px; max-height: 250px; overflow-y: auto; }
        .num { height: 35px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .num.ocupado { opacity: 0.2; pointer-events: none; }
        .num.selected { background: var(--gold); color: black; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--gold)">RIFAS EL TAPATÍO <span onclick="mostrarLogin()" style="cursor:pointer">🍀</span></h1>

    <div class="main-nav" id="clienteNav">
        <button class="nav-btn active" onclick="cambiarSeccion('rifas')">ACTIVAS</button>
        <button class="nav-btn" onclick="cambiarSeccion('historial')">HISTORIAL</button>
    </div>

    <div id="listaContenedor"></div>

    <div id="panelAdmin">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <h3 style="margin:0">Panel Maestro</h3>
            <button onclick="logout()">Cerrar</button>
        </div>
        
        <div class="main-nav">
            <button class="nav-btn" onclick="setSubAdmin('nueva')">+ NUEVA RIFA</button>
            <button class="nav-btn" onclick="setSubAdmin('ventas')">FINANZAS/PAGOS</button>
            <button class="nav-btn" onclick="setSubAdmin('papelera')">PAPELERA</button>
            <button class="nav-btn" onclick="alertarOferta()">🔔 ALERTAR OFERTA</button>
        </div>

        <div id="formRifa" style="display:none; margin-top:15px; border-top:1px solid #ddd; pt:10px;">
            <input type="text" id="a-nom" placeholder="Nombre de la rifa">
            <input type="number" id="a-num" placeholder="Cantidad de números">
            <input type="number" id="a-pre" placeholder="Precio por número">
            <input type="text" id="a-img" placeholder="URL de imagen">
            <input type="date" id="a-fec" placeholder="Fecha del sorteo">
            <button class="btn-action" style="background:var(--gold)" onclick="guardarRifa()">GUARDAR RIFA ✅</button>
        </div>

        <div id="listaAdmin" style="margin-top:15px;"></div>
    </div>

    <div id="vistaCompra" style="display:none;">
        <button onclick="cerrarCompra()" style="color:white; background:none; border:none; mb:10px;">❮ Volver</button>
        <h2 id="c-nom" style="color:var(--gold); margin:5px 0;"></h2>
        <p id="c-fec" style="font-size:12px; color:var(--accent);"></p>
        <img id="c-img" style="width:100%; border-radius:15px; margin-bottom:10px;">
        <div id="tablero" class="grid-nums"></div>
        <div style="margin-top:15px;">
            <input type="text" id="u-nom" placeholder="Tu nombre completo">
            <input type="tel" id="u-tel" placeholder="Tu WhatsApp">
            <button class="btn-action" style="background:var(--gold); color:black;" onclick="apartar()">APARTAR AHORA</button>
        </div>
    </div>
</div>

<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center;">
    <div style="background:white; padding:20px; border-radius:15px; width:80%; max-width:300px;">
        <h4 style="color:black; margin-top:0;">Acceso Dueño</h4>
        <input type="email" id="log-e" placeholder="Correo">
        <input type="password" id="log-p" placeholder="Contraseña">
        <button class="btn-action" style="background:black; color:white;" onclick="login()">ENTRAR</button>
        <button onclick="document.getElementById('loginModal').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; color:gray;">Cerrar</button>
    </div>
</div>

<script>
    // 1. CONFIG
    const firebaseConfig = { 
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M", 
        authDomain: "rifa01-6ff39.firebaseapp.com", 
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com", 
        projectId: "rifa01-6ff39" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let seccion = 'rifas';
    let seleccionados = [];
    let idActiva = "";

    // --- FUNCIONES DE VISTA ---
    function cambiarSeccion(s) {
        seccion = s;
        renderList();
    }

    function renderList() {
        db.ref(seccion).on('value', snap => {
            const cont = document.getElementById('listaContenedor');
            cont.innerHTML = '';
            snap.forEach(h => {
                const c = h.val().config;
                cont.innerHTML += `
                    <div class="rifa-card" onclick="abrirCompra('${h.key}')">
                        <div class="status-badge" style="background:${seccion==='rifas'?'#22c55e':'#64748b'}">${seccion==='rifas'?'ACTIVA':'HISTORIAL'}</div>
                        <img src="${c.foto}">
                        <div>
                            <strong>${h.key}</strong><br>
                            <small>Sorteo: ${c.fecha || 'Pendiente'}</small><br>
                            <small style="color:var(--gold)">$${c.precio}</small>
                        </div>
                    </div>`;
            });
        });
    }

    function abrirCompra(id) {
        idActiva = id;
        document.getElementById('listaContenedor').style.display = 'none';
        document.getElementById('clienteNav').style.display = 'none';
        document.getElementById('vistaCompra').style.display = 'block';
        db.ref(seccion+'/'+id).once('value', s => {
            const d = s.val();
            document.getElementById('c-nom').innerText = id;
            document.getElementById('c-fec').innerText = "Fecha Sorteo: " + d.config.fecha;
            document.getElementById('c-img').src = d.config.foto;
            dibujarTablero(d.config.total, d.participantes || {});
        });
    }

    function dibujarTablero(total, parts) {
        const tab = document.getElementById('tablero'); tab.innerHTML = '';
        const ocupados = Object.keys(parts);
        for(let i=0; i<total; i++) {
            const n = i.toString().padStart(2, '0');
            const d = document.createElement('div');
            d.className = 'num' + (ocupados.includes(n) ? ' ocupado' : '');
            d.innerText = n;
            if(!ocupados.includes(n)) d.onclick = () => {
                d.classList.toggle('selected');
                const idx = seleccionados.indexOf(n);
                if(idx > -1) seleccionados.splice(idx, 1); else seleccionados.push(n);
            };
            tab.appendChild(d);
        }
    }

    function apartar() {
        const n = document.getElementById('u-nom').value;
        const t = document.getElementById('u-tel').value;
        if(!n || !t || seleccionados.length === 0) return alert("Completa tus datos");
        seleccionados.forEach(num => {
            db.ref('rifas/'+idActiva+'/participantes/'+num).set({ nombre: n, tel: t, pagado: false });
        });
        alert("Números apartados."); cerrarCompra();
    }

    function cerrarCompra() {
        document.getElementById('listaContenedor').style.display = 'block';
        document.getElementById('clienteNav').style.display = 'flex';
        document.getElementById('vistaCompra').style.display = 'none';
        seleccionados = [];
    }

    // --- FUNCIONES ADMIN ---
    function mostrarLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    
    function login() {
        auth.signInWithEmailAndPassword(document.getElementById('log-e').value, document.getElementById('log-p').value)
        .then(() => {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('panelAdmin').style.display = 'block';
            document.getElementById('clienteNav').style.display = 'none';
        }).catch(() => alert("Error de acceso"));
    }

    function setSubAdmin(modo) {
        document.getElementById('formRifa').style.display = (modo==='nueva'?'block':'none');
        const list = document.getElementById('listaAdmin'); list.innerHTML = '';
        
        if(modo === 'ventas' || modo === 'papelera') {
            const path = modo==='ventas' ? 'rifas' : 'papelera';
            db.ref(path).once('value', s => {
                s.forEach(rifa => {
                    list.innerHTML += `
                        <div style="background:white; padding:10px; border-radius:10px; margin-bottom:10px; border:1px solid #ddd;">
                            <strong>${rifa.key}</strong>
                            <div style="display:flex; gap:5px; margin-top:5px;">
                                <button onclick="editarRifa('${rifa.key}')">✏️</button>
                                <button onclick="eliminarRifa('${rifa.key}', '${path}')">🗑️</button>
                                ${modo==='papelera' ? `<button onclick="restaurar('${rifa.key}')">🔄 Restaurar</button>` : `<button onclick="moverHistorial('${rifa.key}')">📜 Finalizar</button>`}
                            </div>
                        </div>`;
                });
            });
        }
    }

    function guardarRifa() {
        const n = document.getElementById('a-nom').value;
        const d = {
            total: parseInt(document.getElementById('a-num').value),
            precio: parseInt(document.getElementById('a-pre').value),
            foto: document.getElementById('a-img').value,
            fecha: document.getElementById('a-fec').value
        };
        db.ref('rifas/'+n+'/config').update(d).then(() => { alert("Guardada"); setSubAdmin('ventas'); });
    }

    function eliminarRifa(id, desde) {
        if(!confirm("¿Enviar a papelera?")) return;
        db.ref(desde+'/'+id).once('value', s => {
            const data = s.val();
            data.deletedAt = Date.now();
            db.ref('papelera/'+id).set(data).then(() => {
                db.ref(desde+'/'+id).remove();
                setSubAdmin('ventas');
            });
        });
    }

    function restaurar(id) {
        db.ref('papelera/'+id).once('value', s => {
            const data = s.val();
            delete data.deletedAt;
            db.ref('rifas/'+id).set(data).then(() => {
                db.ref('papelera/'+id).remove();
                setSubAdmin('papelera');
            });
        });
    }

    function alertarOferta() {
        const msg = prompt("Escribe el mensaje de oferta:");
        if(msg) alert("Oferta enviada: " + msg); 
        // Aquí podrías integrar notificaciones reales en el futuro
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    // Limpieza automática de papelera (30 días)
    function limpiarPapelera() {
        const limite = Date.now() - (30 * 24 * 60 * 60 * 1000);
        db.ref('papelera').once('value', s => {
            s.forEach(h => {
                if(h.val().deletedAt < limite) db.ref('papelera/'+h.key).remove();
            });
        });
    }

    renderList();
    limpiarPapelera();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifas El Tapatío 🍀</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --gold-light: #f1d592; --dark-100: #0f172a; --dark-200: #1e293b; --success: #22c55e; --danger: #ff4d4d; --info: #3b82f6; }
        body { background-color: var(--dark-100) !important; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: var(--dark-200); border-radius: 20px; padding: 15px; border: 1px solid #334155; }
        
        @keyframes blinker { 50% { opacity: 0; } }
        .oferta-tag { background: var(--danger); color: white; font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 5px; margin-top: 5px; display: inline-block; animation: blinker 1s linear infinite; text-transform: uppercase; }

        .rifa-card { background: #1e293b; border-radius: 15px; padding: 12px; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; border: 1px solid #334155; position: relative; overflow: hidden; }
        .rifa-card img { width: 95px; height: 95px; border-radius: 10px; object-fit: cover; border: 1px solid var(--gold); }
        .rifa-info { margin-left: 15px; flex: 1; }
        .rifa-badge { position: absolute; top: 0; right: 0; background: var(--gold); color: black; font-size: 10px; padding: 5px 12px; font-weight: bold; border-bottom-left-radius: 12px; text-transform: uppercase; }
        
        .progress-container { background: #0f172a; border-radius: 10px; height: 8px; margin-top: 8px; border: 1px solid #334155; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, var(--gold), #fbbf24); height: 100%; width: 0%; transition: 0.8s; }
        
        .tabs-tapatio { display: flex; gap: 10px; margin-bottom: 20px; padding: 0 5px; }
        .tab-btn-tapatio { flex: 1; background: #1e293b; color: white; border: 1px solid var(--gold); padding: 14px 10px; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .tab-btn-tapatio.active { background: var(--gold); color: black; }

        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 5px; max-height: 280px; overflow-y: auto; padding: 10px; background: #0f172a; border-radius: 12px; }
        .numero { height: 38px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; border: 1px solid #475569; color: white; }
        .numero.ocupado { opacity: 0.1; background: #000 !important; pointer-events: none; }
        .numero.seleccionado { background: var(--gold) !important; color: black !important; }

        #adminPanel { background: #f8fafc; color: #1e293b; border-radius: 20px; padding: 15px; margin-top: 20px; display: none; min-height: 80vh; overflow-y: auto;}
        .admin-nav-btn { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #ddd; background: white; font-weight: bold; cursor: pointer; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .admin-section-content { display: none; }
        .admin-section-content.active { display: block; }
        .admin-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        
        input, select, textarea { padding: 12px; border-radius: 10px; border: 1px solid #ccc; width: 100%; margin-bottom: 12px; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(45deg, var(--gold), #fbbf24); color: black; font-weight: 900; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; }
        .btn-finish { background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: 900; margin-top: 10px; }
        
        .finanzas-stat { background: #f1f5f9; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #e2e8f0; flex: 1; }
        .btn-promo-wa { background: #25D366; color: white; border: none; padding: 8px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<div id="pantallaInicio">
    <div style="text-align:center; padding: 25px 15px;">
        <h1 style="color:var(--gold); margin:0; font-size: 26px; font-weight: 900;">RIFAS EL TAPATÍO <span onclick="accesoAdmin()" style="cursor:pointer">🍀</span></h1>
    </div>
    <div class="tabs-tapatio">
        <button id="btnTabActivas" class="tab-btn-tapatio active" onclick="cambiarSeccion('activas')">Rifas Activas</button>
        <button id="btnTabHistorial" class="tab-btn-tapatio" onclick="cambiarSeccion('historial')">Historial</button>
    </div>
    <div id="listaRifas"></div>
</div>

<div id="rifaContenedor" class="container animate__animated animate__fadeIn" style="display:none;">
    <button onclick="volverInicio()" style="background:none; color:#94a3b8; border:none; cursor:pointer; margin-bottom:15px; font-weight:bold;">❮ VOLVER</button>
    <div id="contenidoRifa">
        <img id="premioImgVer" src="" style="width:100%; border-radius:15px; border: 1px solid var(--gold); margin-bottom:15px;">
        <h2 id="tituloRifa" style="text-align:center; color:var(--gold-light); margin-bottom:10px;"></h2>
        <div id="promoBoxDetalle" style="display:none; background:rgba(255, 77, 77, 0.1); border: 2px dashed var(--danger); padding:10px; border-radius:12px; margin-bottom:15px; text-align:center;">
            <span id="txtOfertaDetalle" style="color:var(--danger); font-weight:900; font-size:14px; text-transform:uppercase;"></span>
        </div>
        <div id="barraProgresoUser">
            <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold; margin-bottom:5px;">
                <span>DISPONIBLES: <span id="txtDisponibles" style="color:var(--gold)">0</span></span>
                <span id="txtPorcentaje">0%</span>
            </div>
            <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
        </div>
        <div id="seccionCompra" style="margin-top:20px;">
            <input type="text" id="nombre" placeholder="Nombre completo">
            <input type="tel" id="telefono" placeholder="WhatsApp (10 dígitos)">
            <div id="tablero" class="grid-numeros"></div>
            <button onclick="registrarPro()" class="btn-gold" style="margin-top:20px;">APARTAR MI LUGAR 🚀</button>
        </div>
    </div>
</div>

<div id="adminPanel" class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3>⚙️ ADMIN</h3>
        <button onclick="volverInicio()" style="background:none; border:none; font-size: 20px;">✕</button>
    </div>
    <div id="adminMenuPrincipal">
        <button class="admin-nav-btn" onclick="verSeccionAdmin('sec-proceso')"><span>📊 GESTIÓN ACTIVAS</span> ❯</button>
        <button class="admin-nav-btn" onclick="verSeccionAdmin('sec-gestion-historial')"><span>📜 GESTIÓN HISTORIAL</span> ❯</button>
        <button class="admin-nav-btn" onclick="verSeccionAdmin('sec-creador')"><span>🆕 NUEVA RIFA</span> ❯</button>
        <button class="admin-nav-btn" onclick="verSeccionAdmin('sec-papelera')"><span>🗑️ PAPELERA</span> ❯</button>
    </div>

    <div id="sec-gestion-historial" class="admin-section-content">
        <button onclick="regresarMenuAdmin()" style="margin-bottom:15px; border:none; background:none; color:var(--info); font-weight:bold;">❮ REGRESAR</button>
        <div id="listaGestionHistorial"></div>
    </div>

    <div id="sec-finanzas" class="admin-section-content">
        <button onclick="verSeccionAdmin('sec-proceso')" style="margin-bottom:15px; border:none; background:none; color:var(--info); font-weight:bold;">❮ REGRESAR</button>
        <div class="admin-card">
            <h3 id="finanzasNombreRifa" style="margin:0 0 10px 0; color:var(--gold);"></h3>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <div class="finanzas-stat"><span>Caja</span><strong id="fin-caja" style="color:var(--success)">$0</strong></div>
                <div class="finanzas-stat"><span>Debe</span><strong id="fin-deuda" style="color:var(--danger)">$0</strong></div>
            </div>
            <div id="listaPagosFinanzas"></div>
        </div>
    </div>

    <div id="sec-creador" class="admin-section-content">
        <button onclick="regresarMenuAdmin()" style="margin-bottom:15px; border:none; background:none; color:var(--info); font-weight:bold;">❮ CANCELAR</button>
        <div class="admin-card">
            <label>Nombre</label><input type="text" id="newRifaNombre">
            <label>Total Números</label><input type="number" id="newRifaTotal">
            <label>Precio ($)</label><input type="number" id="newRifaPrecio">
            <label>URL Foto</label><input type="text" id="newRifaFoto">
            <label>Combo</label><select id="newRifaModo"><option value="1">Individual</option><option value="2">Combo 2</option><option value="4">Combo 4</option></select>
            <div style="background:#fff5f5; padding:10px; border-radius:10px; border:1px solid #feb2b2;">
                <label style="color:#c53030">Oferta</label><input type="text" id="ofertaTexto">
                <label style="color:#c53030">Expira</label><input type="datetime-local" id="ofertaExpira">
            </div>
            <div id="seccionFinalizar" style="display:none; margin-top:15px;">
                <label>Nombre Ganador</label><input type="text" id="winNombre">
                <label>Boleto</label><input type="number" id="winNumero">
                <button onclick="finalizarRifa()" class="btn-finish">FINALIZAR 🏆</button>
            </div>
            <button onclick="crearNuevaRifa()" class="btn-gold" style="margin-top:20px;">GUARDAR RIFA 🚀</button>
        </div>
    </div>

    <div id="sec-proceso" class="admin-section-content">
        <button onclick="regresarMenuAdmin()" style="margin-bottom:15px; border:none; background:none; color:var(--info); font-weight:bold;">❮ REGRESAR</button>
        <div id="listaGestionRifas"></div>
    </div>

    <div id="sec-papelera" class="admin-section-content">
        <button onclick="regresarMenuAdmin()" style="margin-bottom:15px; border:none; background:none; color:var(--info); font-weight:bold;">❮ REGRESAR</button>
        <div id="listaPapelera"></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M", authDomain: "rifa01-6ff39.firebaseapp.com", databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com", projectId: "rifa01-6ff39" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let rifaActualID = "", seleccionados = [], compradores = [], configRifa = {}, vistaActiva = 'activas';

    function cargarLista() {
        const path = vistaActiva === 'activas' ? 'rifas_activas' : 'historial_rifas';
        db.ref(path).on('value', snap => {
            const container = document.getElementById('listaRifas'); container.innerHTML = '';
            const data = snap.val(); if(!data) return;
            for(let id in data) {
                const conf = data[id].config;
                const apartados = data[id].participantes ? Object.keys(data[id].participantes).length : 0;
                const porc = Math.floor((apartados / conf.total) * 100);
                const ofertaHtml = (conf.ofertaTexto) ? `<div class="oferta-tag">${conf.ofertaTexto}</div>` : '';
                container.innerHTML += `<div class="rifa-card" onclick="abrirRifa('${id}', '${vistaActiva}')"><div class="rifa-badge">$${conf.precio}</div><img src="${conf.foto}"><div class="rifa-info"><strong>${id}</strong>${ofertaHtml}<div class="progress-container"><div class="progress-bar" style="width:${porc}%"></div></div></div></div>`;
            }
        });
    }

    function abrirRifa(id, tipo) {
        rifaActualID = id; seleccionados = [];
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'block';
        db.ref((tipo === 'activas' ? 'rifas_activas/' : 'historial_rifas/') + id).on('value', snap => {
            const data = snap.val(); if(!data) return;
            configRifa = data.config;
            compradores = data.participantes ? Object.entries(data.participantes).map(([k,v]) => ({id:k, ...v})) : [];
            document.getElementById('tituloRifa').innerText = id;
            document.getElementById('premioImgVer').src = configRifa.foto;
            const promoDiv = document.getElementById('promoBoxDetalle');
            if(configRifa.ofertaTexto) { promoDiv.style.display = 'block'; document.getElementById('txtOfertaDetalle').innerText = configRifa.ofertaTexto; } else { promoDiv.style.display = 'none'; }
            if(tipo === 'historial') { document.getElementById('seccionCompra').style.display = 'none'; document.getElementById('barraProgresoUser').style.display = 'none'; } else { document.getElementById('seccionCompra').style.display = 'block'; document.getElementById('barraProgresoUser').style.display = 'block'; dibujarTablero(); }
        });
    }

    function dibujarTablero() {
        const tab = document.getElementById('tablero'); tab.innerHTML = '';
        const ocupados = compradores.map(c => parseInt(c.numero));
        for(let i=0; i < configRifa.total; i++) {
            const div = document.createElement('div');
            const ocu = ocupados.includes(i);
            div.className = 'numero' + (ocu ? ' ocupado' : (seleccionados.includes(i) ? ' seleccionado' : ''));
            div.innerText = i < 10 ? "0" + i : i;
            if(!ocu) div.onclick = () => { if(seleccionados.includes(i)) seleccionados = seleccionados.filter(n => n !== i); else seleccionados.push(i); dibujarTablero(); };
            tab.appendChild(div);
        }
        document.getElementById('txtDisponibles').innerText = configRifa.total - ocupados.length;
        document.getElementById('bar').style.width = Math.floor((ocupados.length / configRifa.total) * 100) + "%";
    }

    function registrarPro() {
        const n = document.getElementById('nombre').value, t = document.getElementById('telefono').value;
        if(!n || t.length < 10 || seleccionados.length === 0) return alert("Faltan datos");
        const vID = Date.now();
        seleccionados.forEach(num => db.ref('rifas_activas/'+rifaActualID+'/participantes').push({ nombre:n, tel:t, numero:num, pagado:false, ventaID: vID }));
        const msg = `¡Hola, *Rifas El Tapatío*! 🍀\n\nAparté mis números:\n🎫 *Rifa:* ${rifaActualID}\n🔢 *Números:* ${seleccionados.join(', ')}\n👤 *Nombre:* ${n}\n\n🎁 *Promo:* ${configRifa.ofertaTexto || 'N/A'}`;
        window.open(`https://wa.me/523310711283?text=${encodeURIComponent(msg)}`, '_blank');
        volverInicio();
    }

    function crearNuevaRifa() {
        const n = document.getElementById('newRifaNombre').value;
        const config = { total: parseInt(document.getElementById('newRifaTotal').value), precio: parseInt(document.getElementById('newRifaPrecio').value), foto: document.getElementById('newRifaFoto').value, fecha: document.getElementById('newRifaFecha').value, numPorCombo: parseInt(document.getElementById('newRifaModo').value), ofertaTexto: document.getElementById('ofertaTexto').value, ofertaExpira: document.getElementById('ofertaExpira').value };
        db.ref('rifas_activas/' + n + '/config').update(config).then(() => { alert("Guardado"); regresarMenuAdmin(); });
    }

    function cargarListaGestion() {
        db.ref('rifas_activas').on('value', snap => {
            const container = document.getElementById('listaGestionRifas'); container.innerHTML = '';
            const data = snap.val(); if(!data) return;
            for(let id in data) container.innerHTML += `<div class="admin-card" style="display:flex; justify-content:space-between; align-items:center;"><strong>${id}</strong><div><button onclick="abrirFinanzas('${id}')" style="background:var(--success); color:white; border:none; padding:8px; border-radius:5px; margin-right:5px;">💰 FINANZAS</button><button onclick="editarRifa('${id}')" style="background:#eee; border:none; padding:8px; border-radius:5px; margin-right:5px;">✏️ EDITAR</button><button onclick="enviarAPapelera('${id}')" style="background:none; border:none; font-size:18px;">🗑️</button></div></div>`;
        });
    }

    function cargarListaGestionHistorial() {
        db.ref('historial_rifas').on('value', snap => {
            const container = document.getElementById('listaGestionHistorial'); container.innerHTML = '';
            const data = snap.val(); if(!data) return;
            for(let id in data) container.innerHTML += `<div class="admin-card" style="display:flex; justify-content:space-between; align-items:center;"><strong>${id}</strong><button onclick="reactivarRifa('${id}')" style="background:var(--info); color:white; border:none; padding:8px; border-radius:5px;">🔄 RE-ACTIVAR</button></div>`;
        });
    }

    function reactivarRifa(id) {
        db.ref('historial_rifas/'+id).once('value', s => {
            db.ref('rifas_activas/'+id).set(s.val()).then(() => db.ref('historial_rifas/'+id).remove());
        });
    }

    function abrirFinanzas(id) {
        rifaActualID = id; document.getElementById('finanzasNombreRifa').innerText = id; verSeccionAdmin('sec-finanzas');
        db.ref('rifas_activas/' + id).on('value', snap => {
            const data = snap.val(); if(!data) return;
            configRifa = data.config; compradores = data.participantes ? Object.entries(data.participantes).map(([k,v]) => ({id:k, ...v})) : [];
            actualizarFinanzasUI();
        });
    }

    function actualizarFinanzasUI() {
        const container = document.getElementById('listaPagosFinanzas'); container.innerHTML = '';
        let caja = 0, deuda = 0; const agrupadas = {};
        compradores.forEach(c => { if(!agrupadas[c.ventaID]) agrupadas[c.ventaID] = { nombre:c.nombre, tel:c.tel, nums:[], pagado:c.pagado, ids:[] }; agrupadas[c.ventaID].nums.push(c.numero); agrupadas[c.ventaID].ids.push(c.id); });
        for(let vID in agrupadas) {
            const v = agrupadas[vID]; const sub = v.nums.length * configRifa.precio; if(v.pagado) caja += sub; else deuda += sub;
            container.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;"><div><strong>${v.nombre}</strong><br><small>#${v.nums.join(',')}</small></div><div><button onclick="confirmarPago('${v.ids.join(',')}', ${v.pagado}, '${v.nombre}', '${v.tel}', '${v.nums.join(',')}')" style="background:${v.pagado?'#22c55e':'#ff4d4d'}; color:white; border:none; padding:8px; border-radius:5px;">${v.pagado?'PAGADO':'DEBE'}</button><button class="btn-promo-wa" onclick="notificarPromo('${v.tel}', '${v.nombre}')">📣 PROMO</button></div></div>`;
        }
        document.getElementById('fin-caja').innerText = "$" + caja; document.getElementById('fin-deuda').innerText = "$" + deuda;
    }

    function notificarPromo(tel, nom) {
        if(!configRifa.ofertaTexto) return alert("No hay oferta activa");
        const msg = `¡Hola, *${nom}*! 👋 Soy José de *Rifas El Tapatío* 🍀\n\nTe aviso que tenemos una promoción activa en la rifa que participas:\n🔥 *${configRifa.ofertaTexto}*\n\n¡Aprovéchala antes de que se agoten!`;
        window.open(`https://wa.me/52${tel.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function confirmarPago(ids, est, nom, tel, nums) {
        const nEst = !est; ids.split(',').forEach(id => db.ref('rifas_activas/'+rifaActualID+'/participantes/'+id).update({pagado: nEst}));
        if(nEst) window.open(`https://wa.me/52${tel.replace(/\D/g,'')}?text=${encodeURIComponent("¡Hola, *" + nom + "*! 👋\n\nTu pago de $"+(nums.split(',').length * configRifa.precio)+" ha sido recibido.\n🎫 *Números:* " + nums + "\n🍀 *Rifa:* " + rifaActualID + "\n\nConfirmado ✅")}`, '_blank');
    }

    function accesoAdmin() { if(prompt("Clave:")==="rifa2369") { document.getElementById('adminPanel').style.display='block'; document.getElementById('pantallaInicio').style.display='none'; } }
    function verSeccionAdmin(id) { document.getElementById('adminMenuPrincipal').style.display='none'; document.querySelectorAll('.admin-section-content').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='sec-proceso') cargarListaGestion(); if(id==='sec-gestion-historial') cargarListaGestionHistorial(); if(id==='sec-papelera') cargarListaPapelera(); }
    function regresarMenuAdmin() { document.getElementById('adminMenuPrincipal').style.display='block'; document.querySelectorAll('.admin-section-content').forEach(s => s.classList.remove('active')); }
    function volverInicio() { document.getElementById('adminPanel').style.display='none'; document.getElementById('rifaContenedor').style.display='none'; document.getElementById('pantallaInicio').style.display='block'; cargarLista(); }
    function cambiarSeccion(t) { vistaActiva = t; cargarLista(); }
    function enviarAPapelera(id) { if(confirm("¿Mover a papelera?")) db.ref('rifas_activas/'+id).once('value', s => { db.ref('papelera/'+id).set(s.val()).then(() => db.ref('rifas_activas/'+id).remove()); }); }
    function cargarListaPapelera() { db.ref('papelera').on('value', snap => { const container = document.getElementById('listaPapelera'); container.innerHTML = ''; const data = snap.val(); if(!data) return; for(let id in data) container.innerHTML += `<div class="admin-card" style="display:flex; justify-content:space-between; align-items:center;"><strong>${id}</strong><button onclick="recuperar('${id}')" style="background:var(--success); color:white; border:none; padding:8px; border-radius:5px;">RESTAURAR</button></div>`; }); }
    function recuperar(id) { db.ref('papelera/'+id).once('value', s => { db.ref('rifas_activas/'+id).set(s.val()).then(() => db.ref('papelera/'+id).remove()); }); }
    function editarRifa(id) { rifaActualID = id; db.ref('rifas_activas/' + id + '/config').once('value', snap => { const conf = snap.val(); document.getElementById('newRifaNombre').value = id; document.getElementById('newRifaTotal').value = conf.total; document.getElementById('newRifaPrecio').value = conf.precio; document.getElementById('newRifaFoto').value = conf.foto; document.getElementById('ofertaTexto').value = conf.ofertaTexto || ""; document.getElementById('seccionFinalizar').style.display = 'block'; verSeccionAdmin('sec-creador'); }); }
    function finalizarRifa() { const wn = document.getElementById('winNombre').value, wnum = document.getElementById('winNumero').value; db.ref('rifas_activas/' + rifaActualID).once('value', snap => { const data = snap.val(); data.config.winNombre = wn; data.config.winNumero = wnum; db.ref('historial_rifas/' + rifaActualID).set(data).then(() => { db.ref('rifas_activas/' + rifaActualID).remove().then(() => regresarMenuAdmin()); }); }); }

    cargarLista();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos Elite 🍀 - Control Maestro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --gold-light: #f1d592; --dark-100: #0f172a; --dark-200: #1e293b; --danger: #ff4d4d; --success: #22c55e; --warning: #f59e0b; }
        body { background-color: var(--dark-100) !important; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: var(--dark-200); border-radius: 20px; padding: 15px; border: 1px solid #334155; }
        
        /* DASHBOARD MASTER */
        .db-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .db-card { background: #0f172a; padding: 10px; border-radius: 12px; border-top: 3px solid var(--gold); text-align: center; }
        .db-card.alerta { border-top-color: var(--danger); }
        .db-card h4 { margin: 0; font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .db-card p { margin: 3px 0 0 0; font-size: 16px; font-weight: 900; }

        /* TABLA DE PARTICIPANTES */
        #adminPanel { background: #f8fafc; color: #1e293b; border-radius: 20px; padding: 15px; margin-top: 20px; display: none; }
        .admin-section { background: white; padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #1e293b; color: white; padding: 8px; border-radius: 5px 5px 0 0; }
        td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; }

        /* ALERTAS VISUALES */
        .status-badge { padding: 4px 8px; border-radius: 5px; font-weight: bold; font-size: 10px; border: none; cursor: pointer; }
        .status-badge.pagado { background: var(--success); color: white; }
        .status-badge.pendiente { background: var(--warning); color: white; }
        .row-warning { background: #fff5f5; border-left: 4px solid var(--danger); }
        .text-danger-blink { color: var(--danger); font-weight: 900; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* PUBLIC VIEW */
        .timer-container { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 12px; border: 1px solid var(--gold); text-align: center; margin-bottom: 10px; }
        .clock-big { font-family: monospace; font-size: 20px; color: var(--gold-light); letter-spacing: 1px; }
        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 5px; max-height: 250px; overflow-y: auto; padding: 10px; background: #0f172a; border-radius: 10px; border: 1px solid #334155; }
        .numero { height: 40px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 6px; font-weight: bold; cursor: pointer; border: 1px solid #475569; transition: 0.2s; }
        .numero.ocupado { opacity: 0.15; background: black !important; pointer-events: none; color: #444; }
        .numero.seleccionado { background: var(--gold) !important; color: black !important; box-shadow: 0 0 15px var(--gold); transform: scale(1.1); border-color: white; z-index: 10; }

        .btn-gold { background: linear-gradient(45deg, var(--gold), #fbbf24); color: black; font-weight: 900; border: none; padding: 14px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 14px; margin-top: 10px; }
        input { padding:10px; border-radius:8px; border:none; background:#0f172a; color:white; border: 1px solid #334155; }
    </style>
</head>
<body>

<div id="pantallaInicio">
    <div style="text-align:center; padding: 20px;">
        <h1 style="color:var(--gold); margin:0; letter-spacing: 2px;">SORTEOS ELITE 🍀</h1>
        <p style="font-size: 12px; color: #94a3b8;">Selecciona una rifa disponible</p>
    </div>
    <div id="gridRifasActivas" style="display:grid; gap:12px; padding: 15px;"></div>
</div>

<div id="rifaContenedor" class="container animate__animated animate__fadeIn" style="display:none;">
    <button onclick="volverInicio()" style="background:none; color:#94a3b8; border:none; cursor:pointer; font-weight:bold; margin-bottom:10px;">✕ VOLVER</button>
    <img id="premioImgVer" src="" style="width:100%; border-radius:12px; border: 1px solid var(--gold); aspect-ratio: 16/9; object-fit: cover;">

    <div id="relojOfertaDiv" style="background:var(--danger); color:white; padding:8px; border-radius:8px; text-align:center; margin:10px 0; font-weight:bold; display:none;">
        <span id="txtPromo">OFERTA</span>: <span id="clockOferta" style="font-family:monospace;">00:00:00</span>
    </div>

    <div class="timer-container">
        <small style="color:var(--gold); font-size:10px; font-weight:bold;">EL SORTEO FINALIZA EN:</small><br>
        <span id="clockSorteo" class="clock-big">00:00:00:00</span>
    </div>

    <h2 id="tituloRifa" style="text-align:center; color:var(--gold-light); margin:5px 0;"></h2>
    <p id="precioInfo" style="text-align:center; font-size:26px; color:var(--success); font-weight:900; margin-bottom:10px;"></p>

    <div style="display:flex; flex-direction:column; gap:10px;">
        <input type="text" id="nombre" placeholder="Tu nombre completo">
        <input type="tel" id="telefono" placeholder="WhatsApp (10 dígitos)">
        <p style="font-size: 11px; color: var(--gold); margin: 5px 0 0 5px;">👇 Selecciona tu número:</p>
        <div id="tablero" class="grid-numeros"></div>
        <button onclick="registrar()" class="btn-gold">RESERVAR NÚMERO SELECCIONADO 🚀</button>
    </div>
</div>

<div id="adminPanel" class="container">
    <h3 style="text-align:center; margin:0 0 15px 0;">📊 PANEL DE ADMINISTRACIÓN</h3>
    
    <div class="db-grid">
        <div class="db-card"><h4>Recaudado</h4><p id="statDinero" style="color:var(--success)">$0</p></div>
        <div class="db-card"><h4>Por Cobrar</h4><p id="statPendiente" style="color:var(--warning)">$0</p></div>
        <div class="db-card"><h4>Apartados</h4><p id="statApartados">0</p></div>
        <div class="db-card alerta" id="cardAlerta"><h4>Por Liberar ⚠️</h4><p id="statAlerta" style="color:var(--danger)">0</p></div>
    </div>

    <div class="admin-section">
        <h4>👥 PARTICIPANTES</h4>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>#</th><th>Nombre</th><th>Haces</th><th>Estado</th><th>Acción</th></tr></thead>
                <tbody id="cuerpoTablaAdmin"></tbody>
            </table>
        </div>
    </div>

    <div class="admin-section" style="color: #1e293b;">
        <h4>🔧 CONFIGURACIÓN</h4>
        <label>URL Imagen:</label><input type="text" id="confFoto" style="width:100%; color: black; background: #eee;">
        <label>Boleto $:</label><input type="number" id="confPrecio" style="width:100%; color: black; background: #eee;">
        <label>Fecha Sorteo:</label><input type="date" id="confFecha" style="width:100%; color: black; background: #eee;">
        <label>Total de números:</label><input type="number" id="confTotal" style="width:100%; color: black; background: #eee;">
        <button onclick="guardarConfig()" class="btn-gold">💾 ACTUALIZAR RIFAS</button>
    </div>
    <button onclick="borrarSinHistorial()" style="color:red; background:none; border:none; cursor:pointer; font-size:12px; width:100%; margin-top:20px;">🗑️ ELIMINAR RIFAS Y DATOS</button>
</div>

<button onclick="accesoAdmin()" style="opacity:0.05; position: fixed; bottom: 0; width: 100%; height: 40px; border: none; cursor: default;">.</button>

<script>
    // Configuración Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M",
        authDomain: "rifa01-6ff39.firebaseapp.com",
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com",
        projectId: "rifa01-6ff39",
        storageBucket: "rifa01-6ff39.firebasestorage.app",
        messagingSenderId: "644348151229",
        appId: "1:644348151229:web:c71ed82967edecb6a7bed4",
        measurementId: "G-X287LPW130"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let rifaActualID = "", numeroSeleccionado = null, compradores = [], configRifa = {}, intervalRelojes;

    // Cargar rifas desde Firebase
    db.ref('rifas_activas').on('value', snap => {
        const grid = document.getElementById('gridRifasActivas'); 
        grid.innerHTML = '';
        const data = snap.val(); 
        if(!data) return;
        
        for(let id in data) {
            grid.innerHTML += `
            <div onclick="abrirRifa('${id}')" style="background:#1e293b; border-radius:15px; overflow:hidden; border:1px solid #334155; display:flex; align-items:center; padding:12px; cursor:pointer;">
                <img src="${data[id].config.foto}" style="width:70px; height:70px; border-radius:10px; object-fit:cover;">
                <div style="margin-left:15px;">
                    <h4 style="margin:0; color:var(--gold); font-size:18px;">${id}</h4>
                    <small style="color:var(--success); font-weight:bold;">$${data[id].config.precio} MXN</small>
                </div>
            </div>`;
        }
    });

    function abrirRifa(id) {
        rifaActualID = id;
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'block';
        
        db.ref('rifas_activas/'+id).on('value', snap => {
            const data = snap.val(); 
            if(!data) return;
            configRifa = data.config;
            compradores = data.participantes ? Object.entries(data.participantes).map(([k,v]) => ({id:k, ...v})) : [];

            document.getElementById('tituloRifa').innerText = id;
            document.getElementById('premioImgVer').src = configRifa.foto;
            document.getElementById('precioInfo').innerText = "$"+configRifa.precio;
            
            // Llenar campos Admin
            document.getElementById('confFoto').value = configRifa.foto;
            document.getElementById('confPrecio').value = configRifa.precio;
            document.getElementById('confFecha').value = configRifa.fechaSorteo;
            document.getElementById('confTotal').value = configRifa.total || 100;

            actualizarDashboard();
            iniciarContadores();
            dibujarTablero();
        });
    }

    function dibujarTablero() {
        const tab = document.getElementById('tablero'); 
        tab.innerHTML = '';
        const ocupados = compradores.map(c => parseInt(c.numero));
        const total = configRifa.total || 100;

        for(let i=1; i<=total; i++) {
            const div = document.createElement('div');
            const estaOcupado = ocupados.includes(i);
            
            div.className = 'numero' + (estaOcupado ? ' ocupado' : '');
            div.innerText = i;
            
            if(!estaOcupado) {
                div.onclick = () => {
                    // Quitar selección previa
                    document.querySelectorAll('.numero').forEach(n => n.classList.remove('seleccionado'));
                    // Seleccionar este
                    div.classList.add('seleccionado');
                    numeroSeleccionado = i;
                };
            }
            tab.appendChild(div);
        }
    }

    function registrar() {
        if(!numeroSeleccionado) return alert("⚠️ Por favor, toca un número del tablero.");
        const n = document.getElementById('nombre').value;
        const t = document.getElementById('telefono').value;
        
        if(!n || t.length < 10) return alert("⚠️ Ingresa tu nombre y un WhatsApp válido.");

        // Guardar en Firebase
        db.ref('rifas_activas/'+rifaActualID+'/participantes').push({
            nombre: n, 
            tel: t, 
            numero: numeroSeleccionado, 
            pagado: false, 
            fechaRegistro: new Date().getTime()
        });

        // WhatsApp de confirmación
        const msg = `¡Hola! Acabo de apartar el número *${numeroSeleccionado}* para la rifa *${rifaActualID}*. Mi nombre es ${n}. ¿Me podrías proporcionar los datos de pago?`;
        window.open(`https://wa.me/523310711283?text=${encodeURIComponent(msg)}`, '_blank');
        
        numeroSeleccionado = null;
    }

    // Funciones Administrativas
    function actualizarDashboard() {
        const pagados = compradores.filter(c => c.pagado);
        const hoy = new Date().getTime();
        const caducados = compradores.filter(c => !c.pagado && (Math.floor((hoy - c.fechaRegistro) / 86400000) >= 5));

        document.getElementById('statDinero').innerText = "$" + (pagados.length * configRifa.precio);
        document.getElementById('statPendiente').innerText = "$" + ((compradores.length - pagados.length) * configRifa.precio);
        document.getElementById('statApartados').innerText = compradores.length;
        document.getElementById('statAlerta').innerText = caducados.length;
        document.getElementById('cardAlerta').classList.toggle('alerta', caducados.length > 0);

        const cuerpo = document.getElementById('cuerpoTablaAdmin'); 
        cuerpo.innerHTML = '';
        compradores.sort((a,b)=>a.numero-b.numero).forEach(c => {
            const dias = Math.floor((hoy - c.fechaRegistro) / 86400000);
            const esAlerta = !c.pagado && dias >= 5;
            
            cuerpo.innerHTML += `
            <tr class="${esAlerta ? 'row-warning' : ''}">
                <td>#${c.numero}</td>
                <td>${c.nombre.split(' ')[0]}</td>
                <td class="${esAlerta ? 'text-danger-blink' : ''}">${dias}d</td>
                <td><button class="status-badge ${c.pagado?'pagado':'pendiente'}" onclick="marcarPago('${c.id}',${c.pagado})">${c.pagado?'PAGÓ':'PEND'}</button></td>
                <td><button onclick="liberarNumero('${c.id}',${c.numero})" style="background:none; border:none; cursor:pointer; font-size:16px;">🗑️</button></td>
            </tr>`;
        });
    }

    function marcarPago(cid, estado) { db.ref('rifas_activas/'+rifaActualID+'/participantes/'+cid).update({pagado: !estado}); }
    
    function liberarNumero(cid, num) {
        if(confirm(`¿Liberar el número #${num}? Volverá a estar disponible para todos.`)) {
            db.ref('rifas_activas/'+rifaActualID+'/participantes/'+cid).remove();
        }
    }

    function guardarConfig() {
        db.ref('rifas_activas/'+rifaActualID+'/config').update({
            foto: document.getElementById('confFoto').value,
            precio: parseInt(document.getElementById('confPrecio').value),
            fechaSorteo: document.getElementById('confFecha').value,
            total: parseInt(document.getElementById('confTotal').value)
        }).then(()=>alert("✅ Configuración actualizada con éxito."));
    }

    function iniciarContadores() {
        if(intervalRelojes) clearInterval(intervalRelojes);
        intervalRelojes = setInterval(() => {
            const ahora = new Date().getTime();
            const finS = new Date(configRifa.fechaSorteo + "T20:00:00").getTime();
            const dS = finS - ahora;
            if(dS < 0) {
                document.getElementById('clockSorteo').innerText = "¡EN PROCESO!";
            } else {
                const dias = Math.floor(dS/86400000);
                const horas = Math.floor((dS%86400000)/3600000);
                const min = Math.floor((dS%3600000)/60000);
                const seg = Math.floor((dS%60000)/1000);
                document.getElementById('clockSorteo').innerText = `${dias}d ${horas}h ${min}m ${seg}s`;
            }
        }, 1000);
    }

    function volverInicio() { location.reload(); }
    function accesoAdmin() { if(prompt("🔑 Clave Maestra:")==="1234") document.getElementById('adminPanel').style.display='block'; }
    function borrarSinHistorial() { if(confirm("⚠️ ¿ESTÁS SEGURO? Se borrarán todos los participantes y la rifa.")) { db.ref('rifas_activas/'+rifaActualID).remove(); volverInicio(); } }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos Elite 🍀</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --gold-light: #f1d592; --dark-100: #0f172a; --dark-200: #1e293b; --danger: #ff4d4d; --success: #22c55e; }
        body { background-color: var(--dark-100) !important; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: auto; background: var(--dark-200); border-radius: 25px; padding: 20px; border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #334155; margin-bottom: 20px; }
        .header h1 { color: var(--gold); font-size: 28px; margin: 0; letter-spacing: 2px; }
        .grid-rifas { display: grid; gap: 20px; }
        .card-rifa { background: #1e293b; border-radius: 20px; overflow: hidden; border: 1px solid #334155; position: relative; cursor: pointer; }
        .card-rifa img { width: 100%; height: 230px; object-fit: cover; }
        .promo-badge { position: absolute; top: 15px; left: 15px; background: var(--danger); color: white; padding: 6px 15px; border-radius: 50px; font-weight: 900; font-size: 13px; z-index: 10; }
        .timer-container { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; border: 1px solid var(--gold); margin: 15px 0; text-align: center; }
        .timer-clock { font-size: 20px; font-weight: 900; color: var(--gold-light); }
        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 8px; margin: 15px 0; max-height: 350px; overflow-y: auto; padding: 10px; background: #0f172a; border-radius: 15px; }
        .numero { height: 50px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 10px; font-weight: bold; border: 1px solid #475569; }
        .numero.seleccionado { background: var(--gold) !important; color: black; box-shadow: 0 0 15px var(--gold); }
        .numero.ocupado { opacity: 0.3; background: #000 !important; text-decoration: line-through; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(45deg, var(--gold), #fbbf24); color: black; font-weight: 900; border: none; padding: 18px; border-radius: 15px; cursor: pointer; width: 100%; }
        #adminPanel { background: #f8fafc; color: #1e293b; display: none; margin-top: 30px; border: 3px solid var(--gold); }
        .admin-section { background: #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; color: #475569; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="pantallaInicio" class="animate__animated animate__fadeIn">
    <div class="header"><h1>SORTEOS ELITE 🍀</h1></div>
    <div id="gridRifasActivas" class="grid-rifas">Cargando sorteos de lujo...</div>
    <button onclick="toggleHistorial()" style="background:none; color:#64748b; margin-top:30px; width:100%; border:none; text-decoration:underline;">Ver Ganadores Pasados</button>
</div>

<div id="rifaContenedor" class="container animate__animated animate__fadeInUp">
    <button onclick="volverInicio()" style="background:none; color:#94a3b8; border:none; margin-bottom:10px; cursor:pointer;">← CERRAR</button>
    <div id="badgePromoVer" class="promo-badge animate__animated animate__pulse animate__infinite"></div>
    <img id="premioImgVer" src="" style="width:100%; border-radius:20px; border: 2px solid var(--gold);">
    <div class="timer-container"><span id="relojCalculado" class="timer-clock">00d 00h 00m</span></div>
    <h2 id="tituloRifa" style="margin:10px 0; color:var(--gold-light)"></h2>
    <p id="precioInfo" style="font-size: 26px; font-weight: 900; color:var(--success); margin:0;"></p>
    <div style="margin-top:20px;">
        <input type="text" id="nombre" placeholder="Tu nombre">
        <input type="tel" id="telefono" placeholder="WhatsApp">
        <div id="tablero" class="grid-numeros"></div>
        <button onclick="registrar()" class="btn-gold">APARTAR NÚMERO 🚀</button>
    </div>
</div>

<button onclick="accesoAdmin()" style="opacity:0.05; margin-top:100px; width:100%;">ADMIN</button>

<div id="adminPanel" class="container">
    <h2 style="text-align:center; margin-top:0;">🛠 EDITOR MASTER</h2>
    
    <div class="admin-section">
        <label>1. Título de la Rifa (No cambiar si solo editas)</label>
        <input style="background:white; color:black;" type="text" id="confTitulo">
        <label>2. URL de la Foto (Postimages)</label>
        <input style="background:white; color:black;" type="text" id="confFoto">
        <label>3. Cantidad de Números</label>
        <input style="background:white; color:black;" type="number" id="confTotal">
        <label>4. Precio del Boleto $</label>
        <input style="background:white; color:black;" type="number" id="confPrecio">
        <label>5. Texto de Oferta (🔥 Vacío para quitar)</label>
        <input style="background:white; color:black;" type="text" id="confPromo">
        <label>6. Fecha del Sorteo</label>
        <input style="background:white; color:black;" type="date" id="confFecha">
        <button onclick="guardarConfig()" class="btn-gold">💾 GUARDAR O ACTUALIZAR</button>
    </div>

    <div class="admin-section" style="background:#fee2e2;">
        <p style="margin:0; font-size:12px;">Rifa Seleccionada: <b id="adminRifaNombre">-</b></p>
        <button onclick="borrarSinHistorial()" style="background:red; color:white; border:none; padding:10px; border-radius:10px; margin-top:10px; width:100%; font-weight:bold;">ELIMINAR POR COMPLETO</button>
    </div>
    <div id="listaAdmin" style="color:black; font-size:12px; max-height:200px; overflow:auto;"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M",
        authDomain: "rifa01-6ff39.firebaseapp.com",
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com",
        projectId: "rifa01-6ff39",
        storageBucket: "rifa01-6ff39.firebasestorage.app",
        messagingSenderId: "644348151229",
        appId: "1:644348151229:web:c71ed82967edecb6a7bed4",
        measurementId: "G-X287LPW130"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let rifaActualID = "", numeroSeleccionado = null, compradores = [], configRifa = {}, timerInterval;

    db.ref('rifas_activas').on('value', snap => {
        const grid = document.getElementById('gridRifasActivas');
        grid.innerHTML = '';
        const data = snap.val();
        if(!data) return;
        for(let id in data) {
            grid.innerHTML += `
                <div class="card-rifa animate__animated animate__fadeInUp" onclick="abrirRifa('${id}')">
                    ${data[id].config.promo ? `<div class="promo-badge">${data[id].config.promo} 🔥</div>` : ''}
                    <img src="${data[id].config.foto}">
                    <div style="padding:15px">
                        <h3 style="margin:0; color:var(--gold-light)">${id}</h3>
                        <p style="color:var(--success); font-weight:900; margin:5px 0;">$${data[id].config.precio} MXN</p>
                    </div>
                </div>`;
        }
    });

    function abrirRifa(id) {
        rifaActualID = id;
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'block';
        db.ref('rifas_activas/'+id+'/config').on('value', snap => {
            configRifa = snap.val();
            if(!configRifa) return;
            // Actualizar vista pública
            document.getElementById('tituloRifa').innerText = id;
            document.getElementById('premioImgVer').src = configRifa.foto;
            document.getElementById('precioInfo').innerText = "$"+configRifa.precio;
            const b = document.getElementById('badgePromoVer');
            b.style.display = configRifa.promo ? "block" : "none";
            b.innerText = configRifa.promo + " 🔥";
            
            // Auto-llenar el panel admin para edición fácil
            document.getElementById('adminRifaNombre').innerText = id;
            document.getElementById('confTitulo').value = id;
            document.getElementById('confFoto').value = configRifa.foto;
            document.getElementById('confTotal').value = configRifa.total;
            document.getElementById('confPrecio').value = configRifa.precio;
            document.getElementById('confPromo').value = configRifa.promo || "";
            document.getElementById('confFecha').value = configRifa.fechaSorteo || "";

            iniciarContador(configRifa.fechaSorteo);
            dibujarTablero();
        });
        db.ref('rifas_activas/'+id+'/participantes').on('value', snap => {
            compradores = [];
            const d = snap.val();
            for(let k in d) compradores.push({key:k, ...d[k]});
            dibujarTablero();
            actualizarListaAdmin();
        });
    }

    function iniciarContador(f) {
        if(timerInterval) clearInterval(timerInterval);
        const reloj = document.getElementById('relojCalculado');
        timerInterval = setInterval(() => {
            const d = new Date(f + "T23:59:59").getTime() - new Date().getTime();
            if(d < 0) { reloj.innerText = "¡SORTEO EN VIVO! 🎰"; return; }
            const dias = Math.floor(d / 86400000), horas = Math.floor((d % 86400000) / 3600000), mins = Math.floor((d % 3600000) / 60000);
            reloj.innerText = `${dias}d ${horas}h ${mins}m`;
        }, 1000);
    }

    function dibujarTablero() {
        const tab = document.getElementById('tablero'); tab.innerHTML = '';
        const ocupados = compradores.map(c => parseInt(c.numero));
        for(let i=1; i<=configRifa.total; i++) {
            const div = document.createElement('div');
            const ocu = ocupados.includes(i);
            div.className = 'numero' + (ocu ? ' ocupado':'');
            div.innerText = i;
            if(!ocu) div.onclick = () => {
                document.querySelectorAll('.numero').forEach(n => n.classList.remove('seleccionado'));
                div.classList.add('seleccionado');
                numeroSeleccionado = i;
            };
            tab.appendChild(div);
        }
    }

    function registrar() {
        if(!numeroSeleccionado) return alert("Elige un número 🍀");
        const n = document.getElementById('nombre').value, t = document.getElementById('telefono').value;
        if(!n || !t) return alert("Faltan datos");
        db.ref('rifas_activas/'+rifaActualID+'/participantes').push({nombre:n, tel:t, numero:numeroSeleccionado, pagado:false});
        const msg = `¡Hola! Aparté el # ${numeroSeleccionado} para ${rifaActualID}. Mi nombre: ${n}. ¿Cómo pago?`;
        window.open(`https://wa.me/523310711283?text=${encodeURIComponent(msg)}`, '_blank');
        numeroSeleccionado = null;
    }

    function guardarConfig() {
        const tit = document.getElementById('confTitulo').value;
        const fot = document.getElementById('confFoto').value;
        const tot = document.getElementById('confTotal').value;
        const pre = document.getElementById('confPrecio').value;
        const pro = document.getElementById('confPromo').value;
        const fec = document.getElementById('confFecha').value;
        if(!tit || !fec) return alert("Título y Fecha son obligatorios.");
        
        db.ref('rifas_activas/'+tit+'/config').update({
            foto:fot, total:parseInt(tot), precio:parseInt(pre), promo:pro, fechaSorteo:fec
        });
        alert("¡Datos actualizados correctamente! 🚀");
    }

    function accesoAdmin() { if(prompt("Contraseña:")==="1234") document.getElementById('adminPanel').style.display='block'; }
    function volverInicio() { location.reload(); }
    function borrarSinHistorial() { if(confirm("¿Seguro?")) { db.ref('rifas_activas/'+rifaActualID).remove(); volverInicio(); } }
    
    function actualizarListaAdmin() {
        const l = document.getElementById('listaAdmin');
        l.innerHTML = '<table>';
        compradores.sort((a,b)=>a.numero-b.numero).forEach(u => {
            l.innerHTML += `<tr><td>#${u.numero}</td><td>${u.nombre}</td><td><button onclick="db.ref('rifas_activas/${rifaActualID}/participantes/${u.key}').update({pagado:true})">${u.pagado?'✅':'$'}</button></td></tr>`;
        });
        l.innerHTML += '</table>';
    }
</script>
</body>
</html>

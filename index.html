<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos Elite 🍀</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root { --gold: #f59e0b; --danger: #ef4444; --dark: #0f172a; --success: #22c55e; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: white; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: #1e293b; border-radius: 28px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        /* GANCHOS DE VENTA */
        .promo-badge { background: var(--danger); color: white; font-weight: 900; padding: 5px 15px; border-radius: 50px; display: inline-block; font-size: 14px; animation: pulse 1s infinite; margin-bottom: 10px; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .timer-box { background: rgba(255,255,255,0.1); border: 1px dashed var(--gold); padding: 10px; border-radius: 15px; text-align: center; margin: 15px 0; }
        .timer-text { font-size: 18px; font-weight: 800; color: var(--gold); }

        /* RIFAS GRID */
        .card-rifa { background: #334155; border-radius: 20px; overflow: hidden; margin-bottom: 20px; cursor: pointer; transition: 0.3s; position: relative; }
        .card-rifa img { width: 100%; height: 220px; object-fit: cover; }
        .card-body { padding: 15px; }
        .price-tag { position: absolute; top: 15px; right: 15px; background: var(--success); padding: 5px 15px; border-radius: 50px; font-weight: 900; }

        /* TABLERO */
        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 8px; margin: 15px 0; max-height: 350px; overflow-y: auto; padding: 10px; background: #0f172a; border-radius: 15px; }
        .numero { height: 50px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 10px; font-weight: bold; cursor: pointer; border: 1px solid #475569; }
        .numero.seleccionado { background: var(--gold) !important; color: black; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(245,158,11,0.4); }
        .numero.ocupado { background: #1e293b !important; color: #475569 !important; opacity: 0.5; cursor: not-allowed; }

        input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #334155; color: white; margin-bottom: 10px; font-size: 16px; }
        button { border: none; padding: 18px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; font-size: 16px; text-transform: uppercase; }
        .btn-main { background: linear-gradient(45deg, #f59e0b, #fbbf24); color: black; }
        .btn-wa { background: #22c55e; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }

        #rifaContenedor, #historialSeccion, #adminPanel { display: none; }
        .admin-input { background: #eee !important; color: black !important; }
    </style>
</head>
<body>

<div id="pantallaInicio" class="animate__animated animate__fadeIn">
    <div style="text-align:center; padding: 20px;">
        <h1 style="margin:0; font-size: 32px;">🍀 SORTEOS ELITE</h1>
        <p style="color: #94a3b8;">¡Tu momento de suerte es hoy!</p>
    </div>
    <div id="gridRifasActivas"></div>
    <button onclick="toggleHistorial()" style="background:none; color:#94a3b8; font-size:14px; text-decoration:underline;">📜 Historial de Ganadores</button>
</div>

<div id="rifaContenedor" class="container animate__animated animate__slideInUp">
    <button onclick="volverInicio()" style="width:auto; background:none; color:white; padding:0; margin-bottom:10px;">✕ Cerrar</button>
    <div id="promoRifa" class="promo-badge">PROMO 🔥</div>
    <img id="premioImgVer" src="" style="width:100%; border-radius:20px;">
    <div class="timer-box">
        <span class="timer-text">🚨 CIERRA EN: <span id="timerDías">5</span> DÍAS</span>
    </div>
    <h2 id="tituloRifa" style="margin:10px 0;"></h2>
    <p id="precioInfo" style="color: var(--success); font-size: 24px; font-weight: 900; margin:0;"></p>
    
    <div style="margin-top:20px;">
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="tel" id="telefono" placeholder="Número de WhatsApp">
        <p style="font-size:12px; color:#94a3b8;">👇 Toca un número para elegirlo:</p>
        <div id="tablero" class="grid-numeros"></div>
        <button onclick="registrar()" class="btn-main">¡LO QUIERO AHORA! 🚀</button>
    </div>
</div>

<button onclick="accesoAdmin()" style="opacity: 0.05; margin-top:50px; width:100%;">Admin</button>
<div id="adminPanel" class="container" style="background:white; color:black;">
    <h2 style="color:red">⚙️ PANEL MASTER</h2>
    <div style="background:#f1f5f9; padding:15px; border-radius:15px;">
        <h4>Crear/Editar Rifa</h4>
        <input class="admin-input" type="text" id="confTitulo" placeholder="Título">
        <input class="admin-input" type="text" id="confFoto" placeholder="Link Foto">
        <input class="admin-input" type="number" id="confTotal" placeholder="Total Números">
        <input class="admin-input" type="number" id="confPrecio" placeholder="Precio $">
        <input class="admin-input" type="text" id="confPromo" placeholder="Texto Promo (ej: 20% OFF)">
        <input class="admin-input" type="number" id="confDias" placeholder="Días para el cierre">
        <button onclick="guardarConfig()" class="btn-main">PUBLICAR</button>
    </div>
    <div style="margin-top:20px; border-top:1px solid #ccc; padding-top:20px;">
        <p>Gestionando: <b id="adminRifaNombre">-</b></p>
        <button onclick="borrarSinHistorial()" style="background:black; color:white;">ELIMINAR ESTA RIFA</button>
    </div>
    <div id="listaAdmin"></div>
</div>

<script>
    // TU CONFIG DE FIREBASE (NO CAMBIAR)
    const firebaseConfig = {
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M",
        authDomain: "rifa01-6ff39.firebaseapp.com",
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com",
        projectId: "rifa01-6ff39",
        storageBucket: "rifa01-6ff39.firebasestorage.app",
        messagingSenderId: "644348151229",
        appId: "1:644348151229:web:c71ed82967edecb6a7bed4",
        measurementId: "G-X287LPW130"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let rifaActualID = "", numeroSeleccionado = null, compradores = [], configRifa = {};

    db.ref('rifas_activas').on('value', snap => {
        const grid = document.getElementById('gridRifasActivas');
        grid.innerHTML = '';
        const data = snap.val();
        if(!data) return;
        for(let id in data) {
            grid.innerHTML += `
                <div class="card-rifa animate__animated animate__fadeInUp" onclick="abrirRifa('${id}')">
                    <div class="price-tag">$${data[id].config.precio}</div>
                    <img src="${data[id].config.foto}">
                    <div class="card-body">
                        <span style="color:var(--gold); font-size:12px;">🍀 NUEVO SORTEO</span>
                        <h3 style="margin:5px 0;">${id}</h3>
                    </div>
                </div>`;
        }
    });

    function abrirRifa(id) {
        rifaActualID = id;
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'block';
        db.ref('rifas_activas/'+id+'/config').on('value', snap => {
            configRifa = snap.val();
            document.getElementById('tituloRifa').innerText = id;
            document.getElementById('adminRifaNombre').innerText = id;
            document.getElementById('premioImgVer').src = configRifa.foto;
            document.getElementById('precioInfo').innerText = "$"+configRifa.precio + " MXN";
            document.getElementById('promoRifa').innerText = configRifa.promo || "OFERTA 🔥";
            document.getElementById('timerDías').innerText = configRifa.dias || "5";
            dibujarTablero();
        });
        db.ref('rifas_activas/'+id+'/participantes').on('value', snap => {
            compradores = [];
            const d = snap.val();
            for(let k in d) compradores.push({key:k, ...d[k]});
            dibujarTablero();
        });
    }

    function dibujarTablero() {
        const tab = document.getElementById('tablero');
        tab.innerHTML = '';
        const ocupados = compradores.map(c => parseInt(c.numero));
        for(let i=1; i<=configRifa.total; i++) {
            const div = document.createElement('div');
            const isOcu = ocupados.includes(i);
            div.className = 'numero' + (isOcu ? ' ocupado':'');
            div.innerText = i;
            if(!isOcu) div.onclick = () => {
                document.querySelectorAll('.numero').forEach(n => n.classList.remove('seleccionado'));
                div.classList.add('seleccionado');
                numeroSeleccionado = i;
            };
            tab.appendChild(div);
        }
    }

    function registrar() {
        if(!numeroSeleccionado) return alert("¡Elige tu número de la suerte primero! 🍀");
        const n = document.getElementById('nombre').value;
        const t = document.getElementById('telefono').value;
        if(!n || !t) return alert("Necesitamos tu nombre y WhatsApp para el premio");
        
        // GUARDAR EN BASE DE DATOS
        db.ref('rifas_activas/'+rifaActualID+'/participantes').push({nombre:n, tel:t, numero:numeroSeleccionado, pagado:false});
        
        // AUTOMATIZAR WHATSAPP
        const msg = `¡Hola! Acabo de apartar el número *${numeroSeleccionado}* para: *${rifaActualID}*. Mi nombre es *${n}*. ¿Cómo realizo el pago de $${configRifa.precio}?`;
        const waLink = `https://wa.me/523310711283?text=${encodeURIComponent(msg)}`;
        
        alert("¡Apartado! Serás enviado a WhatsApp para confirmar.");
        window.open(waLink, '_blank');
        numeroSeleccionado = null;
    }

    function guardarConfig() {
        const tit = document.getElementById('confTitulo').value;
        const fot = document.getElementById('confFoto').value;
        const tot = document.getElementById('confTotal').value;
        const pre = document.getElementById('confPrecio').value;
        const pro = document.getElementById('confPromo').value;
        const dia = document.getElementById('confDias').value;
        db.ref('rifas_activas/'+tit+'/config').set({foto:fot, total:parseInt(tot), precio:parseInt(pre), promo:pro, dias:dia});
        alert("¡Sorteo Lanzado! 🚀");
    }

    function volverInicio() { location.reload(); }
    function accesoAdmin() { if(prompt("Contraseña:")==="1234") document.getElementById('adminPanel').style.display='block'; }
    function borrarSinHistorial() { if(confirm("¿Borrar definitivamente?")) { db.ref('rifas_activas/'+rifaActualID).remove(); location.reload(); } }
</script>
</body>
</html>

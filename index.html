<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Sorteos Pro - Galería</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 700px; margin: auto; padding: 10px; background: #f4f6f9; color: #333; }
        .container { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; }
        
        /* Cuadrícula de Rifas Activas VISTOSA */
        .grid-rifas { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .card-rifa { background: white; border-radius: 12px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s; border: 1px solid #eee; }
        .card-rifa:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .card-rifa-img { width: 100%; height: 120px; object-fit: cover; }
        .card-rifa-txt { padding: 10px; text-align: center; font-weight: bold; color: #007bff; font-size: 0.9em; margin: 0; }

        /* Imagen Premio dentro de la Rifa */
        .premio-img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }

        /* Tablero */
        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); gap: 6px; margin: 10px 0; max-height: 320px; overflow-y: auto; padding: 8px; border: 2px solid #f0f0f0; border-radius: 10px; background: #fafafa; }
        .numero { border: 1px solid #ddd; padding: 10px 3px; text-align: center; cursor: pointer; background: #fff; font-weight: bold; border-radius: 6px; font-size: 0.85em; }
        .numero.seleccionado { background: #007bff !important; color: white; border-color: #007bff; }
        .numero.ocupado { background: #e9ecef !important; color: #adb5bd !important; cursor: not-allowed; text-decoration: line-through; border-color: #e9ecef; }
        
        input, button, textarea { padding: 10px; width: 100%; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 8px; box-sizing: border-box; font-size: 15px; }
        .btn-success { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; padding: 12px; }
        .btn-whatsapp { background: #25D366; color: white; border: none; font-weight: bold; text-decoration: none; display: block; text-align: center; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 0.9em; }
        
        #adminPanel, #historialSeccion, #rifaContenedor { display: none; }
        .historial-card { border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin-bottom: 12px; background: white; }
        .historial-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-top: 8px; border: 1px solid #eee; }
        .btn-back { background: #6c757d; color: white; border: none; margin-bottom: 12px; cursor: pointer; padding: 8px; width: auto; display: inline-block; font-size: 0.8em; }
    </style>
</head>
<body>

<div id="pantallaInicio" class="container">
    <h2 style="text-align: center; color: #333; margin-top: 0;">🔥 Rifas en Juego</h2>
    <div id="gridRifasActivas" class="grid-rifas">Cargando...</div>
    
    <a href="https://wa.me/523310711283?text=Hola,%20me%20interesa%20rifar%20un%20artículo." class="btn-whatsapp">
        🤝 ¿Quieres rifar algo? Contáctanos
    </a>

    <button onclick="toggleHistorial()" style="margin-top: 15px; background: #343a40; color: white; border: none; font-size: 0.9em;">📜 Ver Ganadores Anteriores</button>
</div>

<div id="rifaContenedor" class="container">
    <button class="btn-back" onclick="volverInicio()">⬅️ Volver</button>
    
    <img id="premioImgVer" src="" class="premio-img" onerror="this.src='https://via.placeholder.com/600x150?text=Premio+de+la+Rifa'">
    <h2 id="tituloRifa" style="text-align: center; color: #007bff; margin: 0;"></h2>
    <p id="precioInfo" style="text-align: center; font-weight: bold; color: #28a745; margin: 5px 0 10px;"></p>
    
    <div id="userForm">
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="tel" id="telefono" placeholder="WhatsApp">
        <div id="tablero" class="grid-numeros"></div>
        <button onclick="registrar()" class="btn-success">RESERVAR MI NÚMERO</button>
    </div>
</div>

<div id="historialSeccion" class="container">
    <button class="btn-back" onclick="volverInicio()">⬅️ Volver</button>
    <h2 style="text-align: center; margin-top:0;">🏆 Rifas Finalizadas</h2>
    <div id="listaHistorial"></div>
</div>

<button onclick="accesoAdmin()" style="margin-top:50px; opacity: 0.05; border:none; background:none; width:100%; cursor:default;">⚙️ Admin</button>

<div id="adminPanel" class="container">
    <h2 style="color:red; text-align:center; margin-top:0;">🛠️ PANEL CONTROL</h2>
    
    <div style="background:#f8f9fa; padding:12px; border-radius:10px; border:1px solid #ddd;">
        <h4>Crear/Editar Rifa:</h4>
        <input type="text" id="confTitulo" placeholder="Nombre de la rifa (ej. Rifa S25)">
        <input type="text" id="confFoto" placeholder="Link (URL) de la Foto del Premio">
        <input type="number" id="confTotal" placeholder="Cantidad de números">
        <input type="number" id="confPrecio" placeholder="Precio boleto $">
        <button onclick="guardarConfig()" style="background:#007bff; color:white;">PUBLICAR RIFA CON FOTO</button>
    </div>

    <div style="background:#fffcf0; padding:12px; border-radius:10px; border:1px solid #ffc107; margin-top:15px;">
        <h4>Finalizar Rifa Seleccionada:</h4>
        <p>Rifa actual: <b id="adminRifaNombre">-</b></p>
        <input type="text" id="histGanador" placeholder="Nombre del Ganador">
        <input type="text" id="histFoto" placeholder="Link de Foto de Evidencia (Entrega)">
        <button onclick="finalizarRifa()" style="background:orange; color:white; font-weight:bold;">CERRAR Y MOVER A HISTORIAL</button>
    </div>

    <h4>Participantes:</h4>
    <div id="listaAdmin" style="font-size: 0.8em; background:#fff; padding:8px; border-radius:5px;">Cargando lista...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAchA8tvM4Hum-anybTex8nzLNxKa8yz_M",
        authDomain: "rifa01-6ff39.firebaseapp.com",
        databaseURL: "https://rifa01-6ff39-default-rtdb.firebaseio.com",
        projectId: "rifa01-6ff39",
        storageBucket: "rifa01-6ff39.firebasestorage.app",
        messagingSenderId: "644348151229",
        appId: "1:644348151229:web:c71ed82967edecb6a7bed4",
        measurementId: "G-X287LPW130"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let rifaActualID = "";
    let numeroSeleccionado = null;
    let compradores = [];
    let configRifa = { total: 0, precio: 0, foto: "" };

    // --- CARGAR RIFAS ACTIVAS (GALERÍA VISUAL) ---
    db.ref('rifas_activas').on('value', (snap) => {
        const grid = document.getElementById('gridRifasActivas');
        grid.innerHTML = '';
        const data = snap.val();
        if(!data) { grid.innerHTML = "<p style='text-align:center;'>No hay rifas activas.</p>"; return; }
        for(let id in data) {
            const foto = data[id].config.foto || 'https://via.placeholder.com/150x120?text=Premio';
            grid.innerHTML += `
                <div class="card-rifa" onclick="abrirRifa('${id}')">
                    <img src="${foto}" class="card-rifa-img" onerror="this.src='https://via.placeholder.com/150x120?text=Error+Foto'">
                    <p class="card-rifa-txt">${id}</p>
                </div>`;
        }
    });

    // --- CARGAR HISTORIAL ---
    db.ref('global_historial').on('value', (snap) => {
        const lista = document.getElementById('listaHistorial');
        lista.innerHTML = '';
        const data = snap.val();
        if(!data) { lista.innerHTML = "No hay historial."; return; }
        for(let key in data) {
            lista.innerHTML += `
                <div class="historial-card">
                    <h3 style="margin:0; color:#007bff; font-size:1em;">🏆 ${data[key].premio}</h3>
                    <p style="margin:5px 0;">Ganador: <b>${data[key].ganador}</b></p>
                    <img src="${data[key].foto}" class="historial-img" onerror="this.src='https://via.placeholder.com/300x120?text=Evidencia+Rifa'">
                </div>`;
        }
    });

    function abrirRifa(id) {
        rifaActualID = id;
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('rifaContenedor').style.display = 'block';
        document.getElementById('tituloRifa').innerText = id;
        document.getElementById('adminRifaNombre').innerText = id;

        db.ref('rifas_activas/' + id + '/config').on('value', (snap) => {
            configRifa = snap.val();
            if(configRifa) {
                document.getElementById('premioImgVer').src = configRifa.foto || '';
                document.getElementById('precioInfo').innerText = "Costo: $" + configRifa.precio;
                dibujarTablero();
            }
        });

        db.ref('rifas_activas/' + id + '/participantes').on('value', (snap) => {
            compradores = [];
            const data = snap.val();
            for(let k in data) compradores.push({ key: k, ...data[k] });
            dibujarTablero();
            actualizarUI();
        });
    }

    function volverInicio() {
        document.getElementById('pantallaInicio').style.display = 'block';
        document.getElementById('rifaContenedor').style.display = 'none';
        document.getElementById('historialSeccion').style.display = 'none';
        rifaActualID = "";
    }

    function toggleHistorial() {
        document.getElementById('pantallaInicio').style.display = 'none';
        document.getElementById('historialSeccion').style.display = 'block';
    }

    function dibujarTablero() {
        const tablero = document.getElementById('tablero');
        tablero.innerHTML = '';
        const ocupados = compradores.map(c => parseInt(c.numero));
        for (let i = 1; i <= configRifa.total; i++) {
            const div = document.createElement('div');
            const esOcupado = ocupados.includes(i);
            div.className = 'numero' + (esOcupado ? ' ocupado' : '');
            div.innerText = i;
            if (!esOcupado) {
                div.onclick = () => {
                    document.querySelectorAll('.numero').forEach(n => n.classList.remove('seleccionado'));
                    div.classList.add('seleccionado');
                    numeroSeleccionado = i;
                };
            }
            tablero.appendChild(div);
        }
    }

    function registrar() {
        const nom = document.getElementById('nombre').value;
        const tel = document.getElementById('telefono').value;
        if (!nom || !tel || !numeroSeleccionado) return alert("Faltan datos");
        db.ref('rifas_activas/' + rifaActualID + '/participantes').push({
            nombre: nom, tel: tel, numero: numeroSeleccionado, pagado: false, fecha: new Date().getTime()
        });
        alert("¡Apartado con éxito!");
        document.getElementById('nombre').value = ""; document.getElementById('telefono').value = "";
        numeroSeleccionado = null;
    }

    function accesoAdmin() {
        if (prompt("Clave:") === "1234") {
            document.getElementById('adminPanel').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    }

    function guardarConfig() {
        const tit = document.getElementById('confTitulo').value;
        const foto = document.getElementById('confFoto').value;
        const t = parseInt(document.getElementById('confTotal').value);
        const p = parseInt(document.getElementById('confPrecio').value);
        if(!tit || !t || !foto) return alert("Llena nombre, total y link de foto");
        db.ref('rifas_activas/' + tit + '/config').set({ total: t, precio: p, foto: foto });
        alert("Rifa publicada");
    }

    function finalizarRifa() {
        const ganador = document.getElementById('histGanador').value;
        const foto = document.getElementById('histFoto').value;
        if(!rifaActualID || !ganador) return alert("Selecciona una rifa y pon al ganador");

        if(confirm(`¿Cerrar definitivamente la rifa "${rifaActualID}"?`)) {
            db.ref('global_historial').push({ premio: rifaActualID, ganador: ganador, foto: foto || "" });
            db.ref('rifas_activas/' + rifaActualID).remove();
            alert("Rifa finalizada y movida al historial.");
            location.reload();
        }
    }

    function actualizarUI() {
        const lista = document.getElementById('listaAdmin');
        lista.innerHTML = '<table style="width:100%; border-collapse:collapse;"><tr><th>#</th><th>Nombre</th><th>Acción</th></tr>';
        compradores.sort((a,b)=>a.numero-b.numero).forEach(u => {
            lista.innerHTML += `<tr><td style="border-bottom:1px solid #eee;"><b>${u.numero}</b></td><td style="border-bottom:1px solid #eee;">${u.nombre}</td>
                <td style="border-bottom:1px solid #eee;"><button onclick="marcarPago('${u.key}')" style="width:auto; padding:2px;">${u.pagado?'✅':'$'}</button>
                <button onclick="eliminar('${u.key}')" style="background:red;color:white;width:auto; padding:2px;">X</button></td></tr>`;
        });
        lista.innerHTML += '</table>';
    }

    function marcarPago(key) { db.ref('rifas_activas/' + rifaActualID + '/participantes/' + key).update({ pagado: true }); }
    function eliminar(key) { if(confirm("¿Eliminar?")) db.ref('rifas_activas/' + rifaActualID + '/participantes/' + key).remove(); }
</script>
</body>
</html>
